body:
  text: 重修宣和博古圖卷十八簠簋豆鋪總說簠簋四器周叔邦父簠銘二十二字太師望簋銘一十八字亰叔簋銘一十一字素簋豆六器周四器魚豆疑生豆銘八字蟠虺豆一蟠虺豆二漢二器輕重雷紋豆一輕重雷紋豆二鋪一器周劉公鋪銘一十字甗錠揔說甗一十四器商七器父己甗一銘三字父己甗二銘七字父乙甗銘四字祖己甗銘六字鬲甗一銘一字鬲甗二銘一字饕餮甗周五器垂花雷紋甗盤雲饕餮甗雷紋饕餮甗純素甗一純素甗二漢二器偃耳甗直耳甗錠一器漢虹燭錠銘一十八字簠簋豆鋪總說禮始於因人情而為之盖以義起而制之使歸於中而已明以交人幽以交神無所不用必寓諸器而後行則簠簋之屬由是而陳焉然去古既逺禮文寖失况遭秦滅學之後其書焚矣疑以傳疑而無所考證則諸儒臨時泛起臆說無足觀者故見於禮圖則以簠為外方而内圜以簋為外圜而内方穴其中以實稻梁黍稷又皆刻木為之上作龜盖以體蟲鏤之飾而去古益逺矣曽不知簠盛加膳簋盛常膳皆熟食用匕之器若如禮圖則略無食器之用今三代之器方圜異制且可以用匕而食復出於冶鑄之妙而銘載燦然則先王制作尚及論也豈刻木鏤形者所能髣髴哉至於豆則乃其實水土之品亦所以養其隂者夏以楬豆商以玉豆周以獻豆制作雖殊所以為實濡物之器則一也昔醢人掌四豆之實凡祭祀供薦羞則豆之用於祭祀者如此士昏禮設六豆於房中則豆之陳於昏禮者如此以之示慈惠訓恭儉之饗亦待此以有行者也是以天子之豆二十有六諸公十有六諸侯十有二上大夫八下大夫七凡以尚徳也鄉老六十者三七十者四八十者五九十者六凡以尚齒也然則用豆之義其可忽諸嘗考制字之法禮必從豆以禮之不可廢也豐必從豆以時之不可緩也戲必從豆以交際之不可忘也故孔子於造次之間與夫答問之際嘗眷眷於此者盖為是爾若夫劉公鋪與夫君養鋪之二器舊以其鋪之聲與簠相近因以附諸簠今考簠之器方而鋪之器圜又自與豆登略無少異故其銘前曰君作養鋪而疑生之豆亦曰養豆右髙三寸四分深二寸一分口徑長一尺闊八寸一分容四升一合重四斤八兩兩耳銘二十二字曰叔邦父莫知其誰特春秋轅氏名邦盖季晳之子也今所藏寅簋銘曰叔邦父豈非一種器耶曰用征用行則叔夜鼎亦銘以征以行按王安石字說征正行也凡言征者皆以正行銘之臣有從君之義故又繼之曰用從君王是器飾以蟠螭周以重雷耳作螭首實周器也右通盖髙六寸七分深二寸八分口徑長七寸二分闊五寸腹徑長七寸九分闊五寸六分容三升七合共重八斤十有四兩兩耳四足銘共一十八字曰太師小子師望作䵼彝按齊世譜太公出於姜姓而呂其氏也故曰呂尚西伯獵於渭陽得尚與語說之曰自吾先君太公云當有聖人適周周以興子真是邪吾太公望子久矣故號之曰太公望載與俱歸立為師銘曰太師者語其官也曰望者語其號也曰小子則孤寡不穀侯王自稱之義也今簋也而謂之䵼彝盖䵼訓煮熟食簋盛黍稷惟熟然後可食耳右通盖髙六寸二分深三寸口徑長六寸八分闊五寸腹徑長七寸一分闊五寸三分容四升共重五斤十有二兩兩耳四足銘十一字按春秋隱公元年經書鄭伯克段于鄢左傳言鄭武公娶于申曰武姜生莊公及公叔段姜氏愛叔段請京邑使居之因謂之京城大叔者疑出於是也諸簋銘款有言旅簋有言寳簋而此曰饗者因饗禮以錫其器若彤弓言一朝饗之者是也右髙四寸二分深一寸六分口徑長八寸四分闊七寸七分腹徑長九寸闊八寸二分容三升重五斤十有二兩兩耳無銘是器如豆而方如鋪而橢要當歸之簋然其下四面作䟽櫺之状則又與他簋特異豈為簋之制則同而種種施其智巧則不同耳古人制器類皆如是右髙五寸二分深一寸八分口徑七寸六分足徑五寸四分容二升五合重三斤一十兩無銘夫豆盛濡物則醢菹在焉是器飾以魚鱗而魚醢物之屬又為豐年衆多之兆故詩言衆維魚矣寳維豐年古之以多為貴者莫不取此右髙四寸五分口徑五寸四分重二斤一兩銘八字單疑生考之傳記無見惟周有單穆公號為盛族然所謂疑生者盖指其名若左氏言寤生書言宜生皆言其名也此器上若盤狀而復穿鏤於濡物宜非所設然純旁尚餘四拱意其必有承盤是必亡之矣前一器髙七寸深一寸二分口徑七寸四分足徑六寸容二升重六斤有半無銘後一器髙七寸二分深一寸一分口徑七寸四分足徑五寸五分容二升重六斤十有二兩無銘右按禮家言木曰豆竹曰籩瓦曰豋今豆以銅為之則知禮家之學多出漢儒臆度爾盖昔人於彝器未始不用銅也此二器皆著以蟠虺亦與著饕餮以革貪得同意是器周物周官言用豆之禮為詳宜其設飾者致理為多也前一器通盖髙六寸九分深四寸口徑五寸七分容五升有半共重五斤九兩兩耳無銘後一器髙六寸深四寸一分口徑五寸七分容五升重四斤十有二兩兩耳􅇅盖無銘右二器皆以雷紋為飾或輕或重非它紋之比下作垂花前盖端状荇葉間錯粟紋與漢鼎盖全相類其為漢器無疑右髙五寸五分深一寸六分口徑七寸六分容二升三合重五斤銘十字按周靈王時有劉定公景王時有劉獻公此曰劉公未審其誰也然言公而不言諡以其劉公自作是器追享杜嬬宜乎不言其謚也劉字當從卯金刀而說文止有鎦字從卯金田此以又易田乃近刀意而許慎解金字今聲也下從土注兩旁象金生於土中此去其聲單取生金意其省文如此曰杜嬬者無見於書傅觀此形制雖承槃小異於豆然下為圈足宜豆類也攷禮圖有所謂豐者亦與豆不異鄭𤣥謂豐似豆而卑者是也是器形全若豐然銘曰鋪者意其銘鋪薦之義鋪雖無所經見要之不過豆類盖銘之有或異者是宜列之於豆左也甗錠總說甗之為器上若甑而足以炊物下若鬲而足以飪物盖兼二器而有之或三足而圜或四足而方考之經傳惟周官陶人為甗止言實二鬴厚半寸唇寸而不釋其器之形制鄭𤣥乃謂甗無底甑而王安石則曰從獻從瓦鬲獻其氣甗能受焉然後知甑無底者所以言其上鬲獻氣者所以言其下也然說文止謂為甑盖舉其具體而言之耳五方之民言語不同故各為方言以自便是以自關以東謂之甗或謂之鬵至梁乃謂之鉹或謂之酢􅿰名雖不同所以為器則一而已是甗也有銘曰彝者謂其法度之所寓而有常故也惟有常而不作竒巧此所以為軌物歟其後復有名錠者用以薦熟物其上則環以通氣之管其中則置以蒸飪之具其下則致以水火之齊盖致用實有類於甗故有所謂虹燭錠與夫素錠者於是咸附之於甗末焉前一器髙一尺三寸深自口至隔六寸有半自隔至底三寸口徑八寸九分耳髙二寸二分闊二寸五分容自口至隔一斗一升自隔至底三升九合重一十四斤十有四兩三足銘三字後一器髙一尺二寸一分深自口至隔五寸八分自隔至底三寸口徑九寸耳髙二寸闊二寸一分容自口至隔九升自隔至底三升三合重十有一斤三足銘七字右按三代之間惟商人號為尊神率民以事神先鬼而後禮陳之祭祀者曲致其盡故於此特以見為銘盖以祭神如神在而僾然必有見乎其位故也非事亡如事存者曷以至此後一器曰亞者廟室之形曰無儔者疑其作器者之名也右髙一尺一寸九分深自口至隔五寸九分自隔至底四寸一分口徑八寸八分耳髙二寸一分闊二寸二分容自口至隔八升自隔至底三升五合重十有一斤四兩三足銘四字曰子虎父乙子商器類銘之盖子商姓也乙商君之號曰虎則取似其形而所藏器有五虎父丁鼎亦作此虎形盖饗禮形鹽亦虎也以人道事神故宜有此而司尊彝用虎以為追享之器則虎之為義其或取此是器純緣之外三面作雷電饕餮而隔腹皆不加文飾為商物也右髙一尺一寸四分深自口至隔五寸八分自隔至底二寸八分口徑八寸六分耳髙二寸二分闊二寸一分容自口至隔七升自隔至底二升五合重九斤有半三足銘六字或以商髙宗朝有臣嘗作髙宗肜日以訓王曰祖已則祖己者疑商之臣乎然按彝器間類多以祖乙祖丁祖戊祖辛為銘則凡稱祖者孫之所作也乙丁戊辛云者乃其號耳用是考之祖己者其惟商之雍己歟言癸者商有天癸癸為己作祭器也此甗而謂之尊彝非周官所謂六尊六彝之謂盖商制未分凡可尊可法者則曰尊彝前一器髙一尺一寸八分深自口至隔五寸九分自隔至底四寸耳髙二寸二分闊二寸二分口徑九寸一分容自口至隔八升三合自隔至底三升二合重十有一斤七兩三足銘一字後一器髙一尺二寸一分深自口至隔六寸自隔至底三寸三分口徑九寸三分容自口至隔九升自隔至底三升二合重十有一斤四兩兩耳三足銘一字右二器銘各一字皆象鬲之形盖甗之為器上體作甑下體作鬲王安石嘗釋其義以謂鬲獻其氣甗能受焉取鬲以為銘可謂得之矣右髙一尺一寸五分深自口至隔五寸五分自隔至底二寸八分口徑八寸六分耳髙二寸闊一寸八分容自口至隔五升八合自隔至底二升四合重七斤三足無銘足間所飾饕餮與商甗皆相類而兩耳純緣文鏤至隔又與商立戈甗無少異製鍊精工非商物不能及此右髙一尺四寸二分深自口至隔一尺自隔至底六寸口徑九寸耳髙二寸一分闊二寸三分容自口至隔九升自隔至底三升重九斤八兩三足無銘是器甗也所以為炊物之具三面設饕餮之飾間以雷紋如連珠相屬下有垂花隔作三象出鼻為足中有隔可以熟物古人創物之智其所以造形窮理為備於此是必周器也右髙一尺七寸七分深自口至隔八寸二分自隔至底三寸八分耳髙四寸三分闊三寸七分口徑一尺三寸九分􅇅隔通容三斗六升重三十五斤三足無銘且甗常隔而能通所以獻其氣於上以為飪物之具以達水火之氣盖熟物自下始也飾以􅐻雲以象其氣􅐻結不散致雨之道也氣之熟物其猶是歟飾以饕餮所以思患豫防之義存焉右髙一尺二寸三分深自口至隔六寸自隔至底四寸六分口徑九寸三分耳髙二寸四分闊二寸五分容自口至隔九升有半自隔至底三升六合重十有一斤八兩三足無銘是器甗也甗之為飾類以饕餮雷紋間錯而耳作綯紐足為象鼻盖先後製作相承故無少異非若尊彝各有取法所以無嫌於沿襲也前一器髙一尺三寸深自口至隔七寸一分自隔至底三寸八分口徑八寸六分耳髙二寸二分闊二寸六分容自口至隔一斗一升自隔至底三升有半重一十五斤十有二兩三足無銘後一器髙一尺二寸一分深自口至隔五寸八分自隔至底三寸九分口徑八寸七分耳髙二寸三分闊二寸六分容自口至隔九升自隔至底二升九合重十有二斤六兩三足無銘右二器純素不加雕鏤其上則甑而無底其下則隔以獻氣合二體而甗之所以備焉周禮則陶人為甗而此悉銅為之考其所自由關而東謂之甗至梁乃謂之鉹鉹之字从金則甗未必為陶器也右髙六寸深五寸七分口徑八寸三分耳髙二寸一分闊二寸容一斗六合重四斤無銘耳外附如釴而偃底踈通不設隔與蟠䕫甗一類惟腹著蟬紋為少異盖亦漢物也右髙一尺六寸深自口至隔七寸自隔至底三寸五分口徑一尺四分耳髙一寸三分闊二寸二分容自口至隔一斗九升自隔至底六升八合重二十一斤六兩三足無銘是器腹間微歛可以承隔而無鼻鋬雖鍊冶未盡善而形制近古必漢初物也右髙五寸四分深四寸五分口徑三寸容四升八合重四斤八兩三足銘一十八字自三代至秦器無斤兩之識此器顯其斤重又字畫與漢五鳯罏款識相類實漢物也說文以錠為鐙鐙則登而有用者銘曰虹燭者取其氣運如虹之義殆薦熟食之器但􅇅其盖而不完曰王氏者未審其為誰也曰第一則知為虹燭者數不特此耳重修宣和博古圖卷十八
