body:
  text: 重修宣和博古圖卷三十鑑三三十八器龍鳳門唐一十五器龍鑑雲龍鑑雲龍八花鑑雲龍花雀鑑鸞鳳鑑舞鳳狻鑑蓮鳳鑑鳳銜花鑑鹿鳳蒲萄鑑象鑑饕餮鑑瑞圖鑑銘四十三字寳花鑑海獸鑑海獸蒲萄鑑素質門漢一器純素鑑鐵鑑門隋一器十六符鐵鑑銘三十四字唐二十一器二十八宿鐵鑑銘六十一字八卦鐵鑑一銘二十二字八卦鐵鑑二銘二十八字十二辰鐵鑑銘二十四字日月鐵鑑銘四十字鳳龜八卦鐵鑑八卦龜鳳鐵鑑四靈八卦鐵鑑八卦方鐵鑑八角八卦鐵鑑千秋萬歲鐵鑑銘八字玉堂鐵鑑銘一十六字自明鐵鑑銘二十字晉陽龍鐵鑑銘四十六字戲水龍鐵鑑鳳花鐵鑑雙鳳鐵鑑花雀鐵鑑寳花鐵鑑一寳花鐵鑑二素圜鐵鑑龍鳳門唐龍鑑徑八寸八分重三斤十有五兩無銘唐雲龍鑑徑三寸八分重十有一兩三分無銘唐雲龍八花鑑徑六寸三分重十有二兩無銘唐雲龍花雀鑑徑六寸二分重一斤九兩無銘唐鸞鳳鑑徑六寸一分重二斤十有五兩無銘唐舞鳳狻猊鑑徑七寸五分重三斤無銘唐蓮鳳鑑徑八寸二分重三斤一十兩無銘唐鳳銜花鑑徑七寸六分重四斤六兩無銘唐鹿鳳蒲萄鑑徑六寸五分重一斤十有四兩無銘唐象鑑徑六寸五分重二斤七兩無銘唐饕餮鑑徑五寸四分重一斤三兩無銘唐瑞圖鑑徑六寸五分重二斤三兩銘四十三字唐寳花鑑徑一尺二寸重八斤四兩無銘唐海獸鑑徑五寸重一斤十有四兩無銘唐海獸蒲萄鑑徑八寸三分重四斤五兩無銘右三十五鑑凡致養之道不特人然也鳥獸草木皆有之是以至治之世百獸率舞鳳皇來儀以至萬物之生各得其宜有如由儀萬物得極其高大有如崇丘皆致養然也此又次之以龍鳳花鳥海獸焉素質門右一鑑徑五寸四分重一斤一兩無銘列子曰太初未見氣也太易氣之始也太素質之始也然則氣變而有形形具而有質則色色自是而起矣故以純質者終之鐵鑑門隋十六符鐵鑑徑七寸九分重一斤十有一兩銘三十四字唐二十八宿鐵鑑徑七寸二分重二斤五兩銘六十一字唐八卦鐵鑑一徑八寸重三斤六兩銘二十二字未詳唐八卦鐵鑑二徑七寸二分重二斤十有一兩銘二十八字唐十二辰鐵鑑徑七寸九分重三斤一十兩銘二十四字未詳唐日月鐵鑑徑五寸八分重十有一兩銘四十字唐鳳龜八卦鐵鑑徑一尺二分重四斤有半無銘唐八卦龜鳳鐵鑑徑八寸三分重三斤四兩無銘唐四靈八卦鐵鑑徑七寸二分重三斤無銘唐八卦方鐵鑑徑四寸九分重一斤十有二兩無銘唐八角八卦鐵鑑徑七寸八分重二斤七兩無銘唐千秋萬歲鐵鑑徑七寸六分重三斤十有五兩銘八字唐玉堂鐵鑑徑一尺一寸六分重九斤有半銘一十六字唐自明鐵鑑徑七寸一分重二斤十有四兩銘二十字唐晉陽龍鐵鑑徑八寸三分重二斤一十四兩銘四十六字唐戲水龍鐵鑑徑七寸四分重一斤十有二兩無銘闕重修宣和博古圖卷三十
