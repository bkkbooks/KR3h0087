body:
  text: 重修宣和博古圖卷十一卣三二十器周一十九器伯寳卣一銘一十字伯寳卣二銘一十字伯寳卣三銘一十字父乙卣銘四字州卣銘一十二字孫卣銘一字大中卣銘六字尹卣蓋銘六十四字夔龍卣蟠夔卣一蟠夔卣二蟠夔卣三饕餮卣垂花卣雷紋卣方紋卣魚紋方卣四足卣一四足卣二漢一器四足卣通蓋高六寸八分深四寸五分口徑長四寸一分濶二寸二分腹徑長五寸六分濶四寸五分容一升九合共重三斤有半兩耳有提梁盖與器銘共一十字通蓋高八寸深四寸八分口徑長三寸八分濶二寸六分腹徑長五寸三分濶四寸一分容二升四合共重四斤四兩有半兩耳有提梁蓋與器銘共一十字通蓋高七寸二分深四寸四分口徑長二寸九分濶二寸二分腹徑長四寸五分濶三寸九分容一升七合共重三斤五兩兩耳有提梁蓋與器銘共一十字右前一器蓋與脰腹於雷紋地隱起夔狀蓋之蒂復著一夔腹之兩面分其中為獸首足飾黄目提梁為綯紐耳作兩象首後二器腹皆純素惟盖器之純縁與足作夔狀間以雷紋提梁無文采而耳作獸首與前一器稍異然三器銘文皆曰伯作寳尊彞當是一時物且古之以官稱伯者有二焉曰侯伯此五等之爵也曰方伯連率則在五等之外所以率諸侯者盖其為伯則宜有以作彞器以告于前人如作寳彞之類是也或以伯仲稱者或以其字稱者必有一於是也然是器乃卣而識曰作寳彞今所藏古器有鼎一彞一尊一皆作寳尊彞為銘蓋先王之於器用未有不以常法為貴者也右通蓋高一尺一寸深八寸六分口徑長三寸一分濶三寸腹徑長六寸濶五寸九分容四升七合共重七斤四兩兩耳有提梁蓋與器銘共四字盖與器足之上各為八蟠夔亦周以連珠以雷紋間之盖上又飾以兩獸以夔首為提梁且有連鼻然而亞形中為父乙字葢有上而下為之亞有左而右為之亞言乙則亞甲也析葢古之姓氏如衛大夫析木鉏是也析氏子孫仲軺者用作父乙卣則其理明矣右通蓋高六寸六分深四寸五分口徑長三寸九分濶三寸五分腹徑長六寸五分濶五寸八分容三升二合共重四斤十有二兩兩耳有提梁蓋與器銘共一十二字曰州作父乙寳彞按州出於來國之後以州為氏在晉有大夫州綽在衛有大夫州吁其為氏則一耳卣非庻人可有是乃當時公侯卿士世禄之家此所以以著姓言之也是器特以四鳳飾於蓋與器之上鳳之為物有其時則見非其時則隱其出處語黙類有道者故翔於千􅌇則覽徳而下九成之後則番然來儀然將以是飾之於器豈可非其所有而命之耶右通蓋高八寸深五寸六分口徑長三寸七分濶二寸九分腹徑長七寸一分濶五寸五分容四升共重五斤十有二兩兩耳有提梁銘一字曰孫狀尸形蓋孫可以為王父尸而神依人而行託物而見則其視聼食息有足以形容此古人所以事死如事生事亡如事存其尸而祝之者蓋不逃乎此理是器特刻其人形以銘之豈不欲其神之有依託歟卣正祀神之器而盛祼也所以求神者得無推其類哉古人作字象形盖莫不有㫖意耳右高四寸五分深四寸口徑長三寸八分濶二寸八分腹徑長五寸濶四寸容二升重二斤一兩兩耳闕蓋有提梁銘六字曰大中作父丁尊大中當是父丁之子言丁者十日之號自商之君以是為紀而周亦有之商之器有父戊爵父已斝父庚爵父辛爵父癸爵父乙觚是皆以日為號也至於父丁爵招父丁爵父丁盉則又與此言父丁者同耳於周則復有父乙鼎丁父鬲是亦父丁之義蓋以類求之則於古庻不謬焉右高三寸一分濶四寸一分長五寸三分重二斤有二兩銘六十四字獨一字澷㓕不可考按是器蓋尹休高對揚君命而作父丙寳尊彞也昔人作器未嘗不尊君命而謹其時日故曰惟十有二月王初祭旁又曰辰在庚申言旁者如書之言哉生魄旁死魄之類也言庚申則又指其日辰矣涓日之設不獨用於祀事至於錫命造器罔不先此而况卣所以格有廟昭功德以示臣子之孝可不謹其始耶又曰尹其亘萬年受乃永則受讀當作夀古人用字或如此示其理之所在是器之蓋兩面狀饕餮作四觚稜如山形而屹起純縁之上飾以八虺雷紋間之精製且古但其器不存耳右髙七寸深五寸四分口徑長三寸五分濶二寸八分腹徑長六寸七分濶五寸三分容三升九合重四斤兩耳闕蓋有提梁無銘是器純縁兩面并足間皆飾以四夔龍以雷紋間之夫夔龍之起蟄正須以雷而雷之興茍非其時則為害皆所以示其義於飲器提梁作綯紐状復示其縶維之理然則觀其器得不求其象耶前一器通蓋髙六寸八分深四寸二分口徑長二寸九分濶二寸三分腹徑長四寸七分濶三寸七分容一升有半共重三斤五兩兩耳有提梁無銘次一器通蓋髙八寸二分深五寸七分口徑長三寸八分濶二寸九分腹徑長六寸六分濶五寸三分容三升八合共重七斤二兩兩耳有提梁無銘後一器髙六寸四分深五寸五分口徑長三寸八分濶二寸七分腹徑長六寸四分濶四寸九分容三升七合重四斤十有四兩兩耳闕蓋有提梁無銘右三器皆作蟠夔説文謂夔神魖也如龍一足蓋殘物之獸著之於器將以防患耳前一器純縁與蓋紋以八夔素其腹足提梁又為夔首要是舊物正如刓印追蠡想見其嵗月之久非三代無此物也次一器器與蓋大抵與前器相類但蓋之頂偽為一龜置於上當是後人益之者以前器方之當真贋自判也後一器腹足純縁間皆作夔狀與雷紋間錯比前二器加華惟闕其蓋耳右通蓋髙九寸三分深五寸六分口徑長三寸六分濶三寸三分腹徑長六寸七分濶五寸八分容四升一合共重八斤四兩兩耳有提梁無銘是器飾以饕餮之狀夫古之彞器未有不形諸饕餮者每以示飲食之戒而此卣乃祀神之器而亦復飾此者以人道而事神故也蓋鬱合鬯臭所以求神於幽其用之序盛之則有卣受之則有彞祼之則有瓉於是彞器亦有象饕餮者其義可以類舉也右通蓋髙六寸八分深四寸九分口徑長三寸七分濶二寸六分腹徑長六寸濶四寸三分容二升四合共重二斤十有三兩兩耳有提梁無銘是卣比它器特匾而小提梁作綯紐狀蓋之上設一爵柱柱之下環以蟠螭螭之外飾以垂花至於純縁圈足則以連珠周之而間以雷紋其下兩面各作饕餮起稜為介製作雖繁縟而中藏簡古意葢周器宜有此也右通蓋髙九寸五分深六寸八分口徑長三寸八分濶二寸八分腹徑長七寸八分濶五寸七分容五升共重九斤兩耳有提梁無銘是器葢與器皆作方斜雷紋以連珠環之其提梁作綯紐狀且圈其足土花碧暈如藍田玉色然蓋瘞藏之久與土俱化良可寳者但無銘識以紀之當是以雷紋為義蓋古人字畫繪事各以見意非徒設耳右通蓋髙九寸七分深五寸八分口徑長三寸七分濶三寸腹徑長七寸七分濶五寸三分容五升二合共重八斤四兩兩耳有提梁無銘夫卣實尊之類耳故賈公彦謂卣為中尊而頂之上設爵柱柱之下作方紋周以連珠而純縁之下亦以方紋為飾兩面各設獸首兩耳作圜環與提梁相連腹間與圈足皆純素製作形模全與商父舉卣相類而無款識殆亦周監商而有作焉右通蓋髙一尺一寸四分深四寸三分口徑長三寸五分濶二寸八分腹徑長五寸濶三寸六分容二升六合共重七斤一十兩兩耳有提梁無銘是器比諸卣特方而腹葢四旁皆作魚紋夫魚之性柔巽隱伏得其道則易取失其道則難制故書傳以魚譬民且有天下有一國有一家非得其民則何以為也以魚狀其器則象其有得民之道有道以得民則有是器也可無愧矣前一器通蓋髙六寸深三寸四分口徑長三寸七分濶二寸七分腹徑長五寸濶三寸七分容一升六合共重二斤六兩兩耳有提梁無銘後一器通蓋髙五寸五分深三寸五分口徑長三寸八分濶三寸腹徑長四寸七分濶四寸容一升七合共重三斤一十一兩兩耳有提梁無銘右二器形模若一而其足皆四蓋之兩端為獸首旁附以翼雖歛而有展意自兩端視之完然各一獸也按山海經所載異獸挾翅者多矣有如狐之獙如魚之鯥如豹之蟲雕犲之化蛇犬之鴞䑕之寓其形皆非此類是獸之鼻昂然而起小類象形豈山澤之怪不可得而考者耶提梁作綯紐取其穿牛絡馬之義後一器小異而蛟眉特隆蹙頂柱稍鋭要之一類物也右通蓋髙五寸九分深三寸五分口徑長三寸八分濶二寸八分腹徑長五寸五分濶四寸四分容一升五合共重二斤十有二兩兩耳四足有提梁無銘按此器似盉無流如卣有足然於卣為近故附於卣葢古之彞器其致用則同而所以致飾取象則種種不一是卣又下著龜魚腹與蓋相合為獸形紋鏤竒巧宛若刻瑑然擬之三代則已失其典雅矣考其時蓋漢器也重修宣和博古圖卷十一
