front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0087_WYG_004-1a, image: WYG0840/WYG0840-0445a.png}
body:
  text: 重修宣和博古圖卷四鼎四三十一器周百乳方鼎一百乳方鼎二龍鼎蟠虬鼎一蟠虬鼎二蟠虺鼎蟠螭鼎一蟠螭鼎二蛟螭鼎一蛟螭鼎二蛟螭鼎三蟠䕫鼎蟬紋鼎一蟬紋鼎二蟬紋小鼎蟠夔鼎一蟠夔鼎二蟠䕫平蓋鼎夔龍雷紋鼎夔龍侈口鼎饕餮鼎圜腹饕餮鼎盤雲饕餮鼎素饕餮鼎獸足鼎一獸足鼎二獸足鼎三鱗紋鼎一鱗紋鼎二獸緣素腹鼎一獸緣素腹鼎二前一器高二尺二寸耳高五寸八分闊六寸深一尺二寸六分口徑長一尺七寸闊一尺二寸容一石九斗一升重八十六斤七兩四足無銘後一器高二尺一寸六分耳高六寸一分闊七寸深一尺一寸七分口徑長一尺六寸三分闊一尺三寸六分容一石七斗重一百斤四足無銘右二器方之諸鼎特為高大所同者周以乳形純緣之下環以饕餮所不同者前一器乃夔足而眉作蛇虺蟠屈之狀後一器足亦作夔形而鼻稜四翼屹起然款足與體俱徹恐致水火之齊欲其易熟爾但形制質朴為衆鼎之雄寔可寳于後世者右高七寸一分耳高一寸七分闊一寸五分深四寸四分口徑六寸三分腹徑六寸八分容五升三合重五斤三足無銘是器著象若龍傳曰龍以不制為龍以其升降自如能小能大或潛或躍善于變化而有利澤以及于物也鼎之烹餁可以享上帝可以養聖賢其為用大矣所以特取象于龍葢以求配其類也前一器通蓋高一尺二寸八分耳高三寸二分闊二寸二分深七寸三分口徑九寸八分腹徑一尺二分容二斗共重一十九斤十有二兩三足無銘後一器高五寸耳高一寸五分闊一寸六分深三寸二分口徑七寸六分腹徑六寸七分容四升重三斤七兩三足無銘右前一器通蓋以蟠虬為之飾三足皆獸狀腹周以約紐蓋頂設六拱乘環後一器底平與他鼎稍異三足素而無紋惟純緣飾蟠虬之形二器皆以蟠虬為之飾亦以示其不可妄動之意右高六寸五分耳高一寸五分闊一寸八分深三寸二分口徑八寸一分腹徑八寸二分容四升七合重七斤有半三足無銘形制簡古耳足純素周腹作蟠虬狀以虺為飾蓋取其備物者鼎所以為象也此虺之紋有自作焉前一器高一尺二寸七分耳高三寸七分闊三寸六分深七寸口徑一尺五寸七分腹徑一尺五寸容四斗四升重二十四斤八兩三足無銘後一器高一尺二寸九分耳高四寸闊三寸六分深七寸二分口徑一尺五寸腹徑一尺五寸四分容四斗七升重二十六斤三足無銘右二器腹間飾以蟠螭狀隠起觚稜兩耳皆偃而純素三足各設獸首製作悉同尤為珍異前一器高八寸二分耳高二寸闊二寸五分深四寸八分口徑一尺八分腹徑一尺五分容一斗四升重十有六斤八兩三足無銘次一器高八寸二分耳高二寸四分闊二寸五分深四寸四分口徑九寸容一斗一升重十有三斤三足無銘後一器高八寸四分耳高二寸闊二寸四分深四寸八分口徑一尺八分腹徑一尺五分容一斗三升五合重十有六斤六兩三足無銘右前一器耳有粟紋腹有垂花左右蟠以蛟螭而足如之次一器以牛足為三足耳作綯紐而周以蛟螭之飾後一器耳足純素純緣之外作蛟螭盤紆之狀比它鼎侈口而底稍平蛟龍類而小螭似龍而無角皆為物之害昔人故象之于此焉右高一尺耳高二寸六分闊三寸一分深六寸五分口徑一尺三寸二分腹徑一尺二寸五分容二斗六升重二十五斤三足無銘是器通體作蟠夔狀兩耳飾以雷紋足為獸首口侈而圜厯年滋久土花浸漬考之製作實三代物與周器無異故以周云高五寸九分耳高二寸三分闊一寸五分深三寸七分口徑五寸八分腹徑五寸二分容三升重三斤十有三兩三足無銘高五寸耳高一寸闊一寸一分深二寸八分口徑四寸三分腹徑四寸四分容一升四合重二斤一兩三足無銘右前一器形制類乙毛鼎飾以饕餮間之雷篆下以蟬紋狀垂花之形後一器腹作蟬紋加以夔龍間錯蓋易以鼎言象其擬諸形容者故自有理蟬雖曰微物而可以喻大者以其繩貪汚者之義也右高四寸八分耳高九分闊六分深二寸七分口徑四寸二分腹徑四寸五分容一升三合重一斤二兩三足無銘按此器著以夔龍垂以蟬紋而下極銳製鍊之工與周􅒋鼎相類昔徐廣謂侍臣加貂蟬以取清高鼎之為飾安知其無是意耶况五德圜具廉儉兼足是亦食器之間所宜尊者也前一器高九寸三分耳高二寸六分闊二寸九分深六寸一分口徑九寸六分腹徑一尺四分容一斗七升有半重十有五斤三足無銘後一器高七寸二分耳高二寸闊二寸一分深四寸六分口徑八寸腹徑八寸三分容七升六合重七斤二兩三足無銘右二器素耳獸足腹著皤夔間以雷紋與蟠夔平蓋鼎切相類蓋一等物也右通蓋高六寸九分耳高二寸六分闊一寸八分深四寸九分口徑七寸腹徑七寸四分容七升共重四斤十有二兩三足無銘是鼎製作蟲鏤精妙而腹著蟠夔非秦漢冶鑄之所能及頂蓋平上設四環周以雷紋比他周鼎為小異實晚周物也右高八寸八分耳高二寸二分闊二寸八分深五寸三分口徑七寸九分腹徑八寸七分容一斗三升重一十三斤五兩三足無銘按是鼎三面各作夔龍形而間以雷紋夔一足山林之異獸又曰神魖古人作字以象其首足蓋防其為害昔禹之治水十一年於外非惟水之為治凡所以為民害者莫不去之故孟子謂驅龍蛇而放之菹及其已事則貢金九牧鑄鼎象物使民入川澤山林不逢不若故雖有魑魅魍魎莫能侵之今鼎之三面各為夔龍得不傚是焉右高一尺八寸六分耳高三寸七分闊三寸五分深一尺一寸六分口徑一尺六寸腹徑一尺三寸四分容五斗一升重五十斤三足無銘是器比他鼎特大純緣外作䕫龍狀夔雖以足而其行或止龍雖不測而其用反弱鼎著夔龍義取諸此又其製作華妙侈其口頗與孟鼎略相似右高八寸九分耳高一寸八分闊二寸三分深五寸九分口徑八寸一分腹徑九寸一分容一斗一升有半重九斤四兩三足無銘素耳直足不設文飾純緣作雷篆間以饕餮之狀雖無欵識以稽考世次蓋周初器也猶有商之遺風焉右高六寸三分耳高一寸六分闊一寸五分深三寸九分口徑五寸八分腹徑五寸三分容三升有半重五斤一兩三足無銘鼎之為此象者多矣往往底分若鬲而惟此作圜腹狀且腹著饕餮加以夔龍頗近類商公非鼎豈周人取法於此耶右高一尺五寸四分耳高四寸七分闊五寸一分深八寸六分口徑一尺二寸四分腹徑一尺三寸五分容四斗八升重三十六斤一十兩三足無銘兩耳與腹皆素純緣之下飾三饕餮有鼻屹然而起間作雲氣盤鬱之象大概與周獸緣素腹鼎相類蓋彝器著雲者頗多然其狀各隨其巧思或為旋雲或為垂雲或為盤雲要之莫不有施澤之意焉右高一尺二寸九分耳高二寸八分闊三寸五分深八寸口徑一尺一寸四分腹徑一尺一寸六分容三斗重三十五斤三足無銘製作渾厚然略無華藻腹間飾以饕餮循環又間作回顧狀至三足則各為蟠夔以角戴其器蓋取象羊豕鼎也但羊豕鼎有首有足而此足特作蟠夔耳前一器高九寸耳高二寸一分闊二寸三分深六寸七分口徑九寸腹徑九寸六分容一斗五升六合重八斤三足無銘次一器高六寸九分耳高一寸七分闊二寸深四寸五分口徑七寸三分腹徑七寸八分容七升三合重八斤十有二兩三足無銘後一器高一尺二寸五分耳高四寸一分闊三寸九分深七寸三分口徑一尺六寸三分腹徑一尺四寸八分容四斗七升三合重四十斤三足無銘右前一器獸齧其耳腹著旋紋純緣之下飾以蟠虬復以獸為之足次一器純緣周以雲紋而足狀以獸與前器頗相類後一器三足為獸形純緣脰腹之間遍著蟠虬兩耳偃然如翼政與周偃耳鼎相似蓋器之製作自三代而下文縟勝之其所以純厚簡古則與時為後先也是器為周物無得而疑焉前一器高七寸八分耳高二寸五分闊二寸五分深五寸一分口徑九寸四分腹徑九寸五分容一斗二合重七斤二兩三足無銘後一器高六寸二分耳高一寸六分闊一寸八分深四寸口徑七寸三分腹徑七寸八分容五升有半重三斤八兩三足無銘右二器耳為對獸腹著鱗紋隠隠若動純緣連絡間以蟠螭形制頗古蓋三代器也高一尺一分耳高二寸闊一寸四分深六寸五分口徑八寸九分腹徑九寸七分容一斗三升七合重十有二斤八兩三足無銘高六寸耳高一寸八分闊一寸二分深三寸四分口徑五寸四分腹徑五寸七分容二升八合重三斤三足無銘右前一器耳腹純素緣足作獸紋後一器亦以獸飾其緣而純素其腹既以示其樸而又以戒其貪則鼎之為象至矣然形模雖殊製作一類惟周器有此自秦漢而下冶鑄所不能為也重修宣和博古圖卷四
