body:
  text: 重修宣和博古圖卷二十一匜二七器周五器弡伯匜銘一十三字季姬匜銘四字徧地雷紋匜䕫匜牛足匜漢二器注水匜銘二十二字螭匜匜盤二器周楚姬匜盤銘一十七字魯正叔匜盤銘一十八字洗六器周三器七星洗負龜洗龜魚洗漢三器陽嘉洗銘六字蟠䕫洗雙魚洗盆一器漢獸耳盆鋗一器漢梁山鋗銘一十五字杅二器周一器季姜杅銘一十七字漢挈杅右髙四寸三分深二寸八分口徑長八寸闊四寸五分容二升一合重二斤十有四兩有流有鋬四足銘十有三字曰弡伯者恐其姓與諡也然有弡仲作寳簠則又知弡之一族爾此稱伯彼稱仲昆季之序也右髙五寸一分深二寸七分口徑長七寸三分闊四寸一分容一升五合重二斤三兩有流有鋬四足銘四字昔晉文公重耳母曰季姬齊悼公娶季康子之妹亦曰季姬而文公母乃翟狐氏女太史公嘗以狐季姬稱之則此曰季姬者必有一於斯焉是匜盥器也易謂盥而不薦則潔以致誠而已奉祭祀者夫人之職此以季姬自銘葢其職歟右髙四寸五分深二寸六分口徑長五寸闊三寸容八合重一斤十有二兩有流有鋬闕盖圈足無銘是器通作䕫状色如精金但下有翅足其首背在盖而亡之其體間復作雷紋間以小夔考其制度非周不能為也右通盖髙六寸深二寸八分口徑長四寸八分闊二寸三分重二斤四兩有流有鋬無銘是器通體飾以夔紋盖亦如之製作華􅇨大槩與周祖戊匜形制相近但闕其銘耳右髙四寸三分深二寸九分口徑長九寸四分闊五寸容三升四合重三斤九兩有流有鋬四足無銘是器以牛首為鋬易曰坤為牛牛地類故其足斥以地之數偶而不奇馬天類故其足圜以天之形圜而不方今其足牛也斥而偶方而不圜乃知莫不有法象耳匜盥潔之器将以達其誠是亦若郊牛繭栗以将其誠而已右髙一寸二分深一寸一分口徑三寸容三合重五兩有流銘二十二字曰始建國元年正月癸酉朔日制按漢新室當孺子嬰初始元年戊辰十二月改為建國此言元年正月則當是明年己巳嵗制此器也此器形制如盂而淺且其旁復出一流與匜略不相類迨見其識文乃知匜也然所容三合其器特小恐几格間所用者耳右髙四寸三分深二寸四分口俓長八寸闊四寸九分容二升重二斤八兩有流有鋬四足無銘鋬飾以獸而有首足鱗爪如龍廼螭也匜盥手之器而所飾如此意亦有寓焉盖螭為少仁多威之獸未審厥意果何在也右髙四寸五分深一寸八分口俓一尺四寸三分耳髙二寸二分闊二寸八分容一斗重十七斤有半三足銘十有七字曰齊侯作楚姬寳盤先是得楚姬匜其銘曰齊侯作楚姬寳匜今復見其盤正一時物也故名之曰匜盤焉按齊與楚從親在齊涽王之時所謂齊侯則涽王也周室之末諸侯自王乆矣銘其器以侯稱之尚知止乎禮義彞器法度所自出故其銘如此右髙二寸一分深一寸五分口徑一尺闕耳髙二寸闊二寸八分足徑九寸五分容闕升三合重一十斤十兩銘十有八字曰魯正叔作按魯周公所封自伯禽之國而蕃衍始大為天下顯諸侯且號禮義之邦者以周公之聖風化所本餘膏賸馥澤後世而不竭焉其世葉與周相為盛衰至戰國時而仲叔季之氏族遂分其國然所謂正叔雖不見於經傳必魯之公族也右髙五寸深四寸三分口徑一尺一寸容一斗四升六合重四斤六兩三足無銘洗所以貯水也是器隠起七星兩兩三三參差相比幾至千百燦然可數夫水之於五行於方為北斗之於天於位亦為北故詩曰維北有斗然則飾以七星以方求之耳又况水氣之在天為雲水象之在天為漢而斗實運於其間曰且有挹酌之形則又以類得之矣古者之設洗亦嘗祖天地之左海故洗當東榮水在洗東其設洗猶然矧夫設飾之義可無意歟是器致飾稠疊特為縝細非他洗可比良足寳者右髙六寸深三寸一分口俓一尺四寸足徑五寸九分容八升二合重七斤有半無銘洗中環以三魚而中作一大龜負一小龜於上昔者河出圖龍載之洛出書龜載之以河出於天而龍天類也洛出於地而龜地屬也且介蟲三百六十龜為之長是謂四靈昔人以㫁吉凶别是非莫不本於此故於是飾之洗而法象焉盖取其負圖之状此易所謂天生神物聖人則之故伏羲氏體之而畫八卦也因其所飾而寓以微意乃尚象之義兹三代之器宜其法如此右髙五寸一分深三寸一分口徑一尺四寸足徑六寸三分容九升二合重七斤無銘中飾一龜而三魚環之龜於鱗屬為之首故魚從之且器環以三魚者從之之象也洗貯水之器言其類故有取於龜魚焉是器復有足而足間復有三竅可以為繚絡之地此尤異於它器也右髙四寸一分深四寸口徑八寸八分容六升三合重一斤兩耳銘六字曰陽嘉四年朔令按孝順帝即位之十年改年紀曰陽嘉凡四年兹器曰陽嘉四年葢謹其所造之歳也曰朔者朔月也曰令者時令也字之右状魚之形字之左復作鷺以鷺習水而捕魚其猶習於禮而得民之譬也洗盥手之器於此以奉祭祀交神人非茍然者謹其歳時且象而規之蓋不能無微意耳右髙三寸四分深三寸二分口徑一尺四分容八升有半重三斤六兩兩耳無銘兩漢去古未逺而製作之間尚有三代典刑故方之後世為有法是器以蟠夔為耳而雷紋相錯考諸鼎彞莫不飾此而漢得以宗之於是自漢而下無傳焉然則求三代之遺法當於漢得之耳右髙三寸四分深三寸三分口徑七寸八分容四升有半重二斤三兩無銘其器類陽嘉洗然中飾以二魚筆畫不繁縟而簡古真漢物也且魚與水相須之物於是洗皆旌以魚又漢之姜詩嘗有雙鯉之祥當時頗髙其行得非用為雅製耶昔人於動作間無所不致其義豈特於此見之右髙四寸一分深三寸四分口徑七寸五分足徑四寸四分兩獸面鼻串圜環環徑各一寸二分容五升重一斤十有一兩無銘是器純素無紋特自然之色青碧相間非智巧所能到者右髙四寸二分深四寸一分口徑七寸四分腹徑七寸六分容六升重二斤十有三兩有銘在其脣曰梁山銅二斗鋗重十斤元康元年造外復有一扶字按漢孝宣帝即位之十年乃改元康而是器葢元康元年造也其扶字乃號耳如好畤鼎之用山字是也梁山銅者紀其貢金之地梁山於漢初為孝王之封梁山依山鼓鑄為國之富故在孝王時有罍尊直千金戒後世寳之則梁山之銅有自來矣其後梁之子孫分其國為五則在孝宣時亦不替貢金之職耳右髙六寸二分深六寸口徑一尺一寸九分兩耳各長二寸二分各闊二寸容一斗五升重九斤十有二兩銘十有七字曰伯索史作季姜寳盂其萬年子子孫孫永用夫季姜之稱於書傳多指婦人言之如詩所謂孟姜是也彼曰孟姜而此曰季姜者乃其序耳伯索史作季姜盂則知為季姜而作也是器圜而銳其底非執不能定也宜古人於此寓意焉右髙四寸六分深四寸五分口徑五寸九分兩耳連提鋬容六升重一斤十有二兩無銘是器形如罌純素無紋連貫以提梁便於将挈也然與商周之器制度不類宜列於漢重修宣和博古圖卷二十一
