body:
  text: 重修宣和博古圖卷十七敦二一十七器周兕敦一銘二字兕敦二銘二字兕敦三銘一字刺公敦一銘二十八字刺公敦二銘二十八字䧹侯敦銘二十八字師望敦銘九字敦銘四十字毛父敦銘四十七字孟姜敦銘二十八字仲奠父敦銘一十七字䖍敦一銘六字䖍敦二銘六字史張父敦盖銘一十二字仲酉父敦盖銘六字乕耳敦䕫足敦前一器通盖髙一尺二寸深四寸四分口徑七寸五分腹徑八寸二分足自方七寸六分髙三寸九分容七升共重二十一斤兩耳有珥盖與器銘共二字次一器通盖髙一尺一寸九分深四寸二分口徑七寸四分腹徑八寸足自方七寸五分髙三寸八分容六升八合共重二十一斤九兩兩耳有珥盖與器銘共二字後一器髙八寸六分深四寸四分口徑七寸三分腹徑七寸七分足自方七寸四分髙三寸八分容六升三合重十有八斤兩耳有珥􅇅盖銘一字右三器製作一律皆以雲雷為飾其銘上為屋室之状而下一字曰兕盖薦之宗廟之器也前二器乃頃所藏者盖上各有犀兕之形故皆以兕名之後一器近得於長安水中但恨􅇅其盖耳王黼曰周兕敦款識一上為屋室之状下一字曰兕盖宗廟之器御府所藏與近獲於長安水中者其制度款識與此一同實周敦云髙六寸四分深四寸二分口徑六寸八分腹徑八寸容八升重十斤四兩兩耳有珥三足􅇅盖銘二十八字髙六寸四分深四寸二分口徑六寸八分腹徑八寸容七升六合重十斤十四兩兩耳有珥三足􅇅盖銘二十八字右二器其文曰作皇考刺公敦且􅂒敦曰刺祖乙伯按太公望子丁公伋伋子乙公得是知刺公乃乙公族也二器銘欵悉同亦一時宗廟之器故皆曰用享用孝右通葢髙六寸一分深四寸一分口徑六寸腹徑七寸七分容六升共重七斤兩耳有珥葢與噐銘共二十八字曰䧹侯其後乃有䧹姓則䧹者周武王之子曰作姬邍母尊敦於是又言邍者武王之姬䧹侯之母也邍字與原同義且同音葢古之姓氏耳右髙五寸深三寸九分口徑六寸二分腹徑八寸容六升有半重一十斤四兩兩耳有珥􅇅盖銘九字純緣與足皆有飾蟠夔間以雲紋耳為螭形按史記齊世家太公望吕尚東海人其先祖嘗為四嶽佐禹平水土有功或封於申或封於呂本姓姜氏從其封姓故曰呂尚尚年老窮困以漁釣干周西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔獵至渭陽得尚與語大說曰自吾先君太公言當有聖人適周周以興子真是邪吾太公望子久矣故􅃅太公望載與俱歸遂立為師其銘曰太師者盖紀其官也望則稱其􅃅耳是器與周師望簋銘文政相同殆一時物耶右髙六寸五分深四寸三分口徑七寸腹徑九寸五分容八升一合重十有二斤二兩兩耳有珥三足􅇅盖銘三十九字按此器乃敦而銘文謂之彝者舉器之揔名故不言敦必諸侯也故祭及四世盖以古之諸侯有五廟大夫有三廟而𫝊言學士大夫則知尊祖謂過祖則無及矣武伯龔伯以謚配字為言如文仲穆伯之類益公文公則言其爵盖不沒其實也如周有天下至於不窋古公亦或不以爵稱又况於諸侯哉右髙五寸二分深四寸口徑五寸六分腹徑七寸三分容四升九合重四斤九兩兩耳有珥三足􅇅盖銘四十七字曰太室太室廟中之室言太以别其次者如魯有世室是也戠敦云王格于太室牧敦云格太室盖周之時受四方諸侯之朝必於其廟示不敢専耳詩言嗣王朝於廟者此也是廟皆謂室也曰毛父則史稱武王克商毛叔奉明水盖史稱叔者字也春秋書毛伯者爵也􅌏敦亦云毛伯内門立中庭佑則毛父其人歟以古者始字之曰伯仲及其徳劭則又言父焉若夫言内史冊命者以内史凡命諸侯及孤卿大夫則冊命之耳右髙六寸二分深四寸五分口徑六寸八分腹徑八寸七分容七升八合重十有二斤兩耳有珥三足闕盖銘二十八字曰叔孫者盖叔孫氏出於桓公之後曰父者尊之也曰作孟姜尊敦姜齊姓也齊魯婚姻之國孟則長矣以别於仲季之稱與詩所謂孟姜同意右髙五寸六分深四寸口徑六寸腹徑八寸容六升一合重五斤有半兩耳有珥三足􅇅盖銘一十七字曰仲奠父者其字也上言蒯者恐言其姓又恐言其名春秋之時有曰蒯聵是有以蒯為姓者有曰南蒯是有以蒯為名者此敦耳足皆状獸形純緣之下雷紋為飾腹間純素其形制與伯庻父敦大槩相類但􅇅盖耳髙四寸三分深三寸五分口徑五寸三分腹徑七寸九分容四升重四斤四兩兩耳圈足銘六字髙五寸六分深四寸一分口徑七寸六分腹徑六寸容三升七合重三斤十有四兩兩耳有珥圈足銘六字右二器夫師之出征則有宜社造禰之事而奉齋車以行是敦銘之以旅車則必旅之所用以舍奠於齋車者且師行一軍而為旅者已衆故其敦不一則一二以數之此特得其二而已其曰䖍者必當時主將之名盖不可得而考矣右髙二寸三分圜徑六寸二分重一斤十有四兩銘一十二字史張父作尊敦其萬年永寳用曰史著其官也曰張稱其氏也而父又見其尊焉純素無文形若疊環而為之製作純古土花青紫相間燦然瑩目惜乎不得其全者右髙二寸一分口徑六寸四分重一斤三兩有半銘六字其曰仲酉父經傳無所見而曰旅敦者與周䖍作旅車敦同盖旅取其衆耳如弡伯旅匜叔作旅匜審其皆非一器耳右髙五寸二分深三寸九分口徑六寸一分腹徑八寸二分容六升二合重五斤有半兩耳有珥三足􅇅盖無銘是器耳飾虎形通體純素略無設飾製作質朴頗有商之遺風然周器之至佳者也右髙五寸六分深四寸口徑五寸六分腹徑七寸四分容五升四合重五斤四兩􅇅盖無銘虎耳䕫足飾以雷帶比他器文鏤簡古製作去商為未逺盖周初器也重修宣和博古圖卷十七
