body:
  text: 重修宣和博古圖卷十六斗二器漢匏斗一匏斗二巵四器漢建光巵銘六字蟬紋巵雲雷巵螭首巵觶五器商三器立戈父辛觶銘三字立戈觶銘作立戈形山觶周二器父貝觶銘一十一字饕餮觶角一器周雙弓角銘八字杯一器漢犧首杯敦一十一器總說商一器巳丁敦銘六字周一十器散季敦銘六十六字毁敦銘一百一十三字仲駒父敦一銘三十六字仲駒父敦二銘三十六字仲駒父敦盖銘一十八字敔敦銘一百四十字姜敦銘一十六字宰辟父敦一銘一百五十字宰辟父敦二銘一百五十字宰辟父敦三銘七十五字前一器長一尺一寸五分深一寸二分口徑三寸三分容三合重六兩有柄無銘後一器長一尺一寸深一寸一分口徑三寸六分容三合重六兩有半有柄無銘右二器皆斗也如匏而半之樂之八音匏居一焉盖以象天地之性今斗取象於匏斯亦古人遺意歟右髙四分口徑長七寸一分濶四寸三分重十有二兩兩耳銘六字曰建光中室有四按東漢孝安帝即位之十六年名其年紀曰建光是器盖於建光中造也中室之稱者宜其有五室而此特中室之器耳盖漢武立帳則有甲乙言中室有四則其他亦或有數也是器之形若桮圈而復有兩耳以金塗之圈之口已下不完盖所得之處如此惜乎不全耳兩耳囬旋不齊盖於製作有取焉前一器髙二寸五分深二寸四分口徑長三寸九分闊三寸一分容九合重一十二兩有半兩耳有鋬無銘次一器髙二寸四分深二寸三分口徑長四寸闊三寸五分容八合重六兩兩耳無銘後一器髙二寸二分深二寸一分口徑長三寸七分闊一寸八分容八合有半重七兩兩耳有鋬無銘右三器皆巵也巵之為義上窮而危一而節則無危矣謂之危已寓戒於其間也一為圈形二無足而平取清髙而不貪則著之以蟬紋欲時動而澤物則文之以雲雷至於飾以螭首又欲其仁威兼濟也按周之酒壺亦有以交螭為飾者盖仁以相交威以有制古人飲器其著戒也大率如此右髙三寸九分深二寸四分口徑長三寸闊二寸六分容六合重一十三兩有半銘三字曰戈父辛盖父辛者稱其􅃅立戈者表其功也是器純素無紋形制比他觶而橢以商言之爵也觚也甗也皆有立戈之形類銘之父辛此為商器斷可見矣右髙四寸六分深四寸口徑二寸七分容四合重八兩銘作立戈形其制比他觶為特圜且無文飾真商器也夫戈㦸者刺而傷物銘以著之盖將以貽酒戒而觶之為義取夫其窮為單亦曰飲以禮而不可過也古人寓諸形器豈茍然哉右通盖髙五寸九分深三寸一分口徑長三寸三分闊二寸六分容八合共重一斤十有四兩無銘是器觶也通體作雷紋間以饕餮純緣下環以十二山今尊罍觚爵類以山形為之飾觶其類也故設飾略相似獨比他觶有盖雕鏤尤工為可寳者右髙四寸七分深四寸口徑長二寸五分闊二寸二分容五合重九兩三錢銘十一字曰何作父貝丁辛尊彝又寓之以象其制圜而橢旁著饕餮之紋足有四目以取尊寓黄目之意其腰則雷紋饕餮互為􅐻結稽之爵卣或以父舉或以父庚為􅃅此云父貝者書其名也而是觶則設之祭祀燕享之間所不可廢者此書名所以示其謹耳右髙三寸五分深二寸八分口徑長二寸七分闊二寸一分容五合重一十二兩有半無銘夫觶在飲器中所取最寡然昔人於此防閑其沉湎淫佚猶以饕餮示其訓則知列鼎盛饌未嘗不有戒心此亦先王慎微之意焉右髙八寸三分深三寸四分口徑長五寸五分闊三寸一分容七合重二斤二兩有鋬器與鋬銘共八字曰作祖乙為雙弓之形旁作兩冊又為亞形中有倒戈是器略類父已角而特小兩面為雷紋饕餮鋬飾以牛首然兩弓状皆㢮而不張盖示其耀徳不觀兵之義亦若倒戈示其不用耳古者有文事必飾之以文有武備必飾之以武於其大饗之禮猶有白黑形鹽以昭其武而况用於飲器間哉勝者飲不勝於習射固存此義則夫象諸形器者可後是哉右髙二寸七分深二寸六分口徑二寸三分闊三寸二分容三合共重八兩鼻連環索無銘是器作牛首頸頷状可為飲器角間又絡以綯紐仍以魚骨小索貫其鼻而鎔冶之工非今人可到詩所謂酌彼兕觥者其近似之敦總說厥惟禮初汙尊抔飲蕢桴土鼓惟時通誠導和而鬼神可致若乃後世烝享盡九州之味韶濩備九成之舉然後視禮初之制者為不足施於今是豈古拙而今乃工耶此制作之君與時為損益五帝不相沿三王不相襲亦非好異而作古也時異則迹異耳若乃敦者以制作求之則制作不同上古則用瓦中古則用金或以玉飾或以木為以形器求之則形器不同設盖者以為㑹無耳足者以為廢或與珠槃類或與簠簋同以名求之則名不同或以為土簋或以為玉齍以用求之則用不同或以盛血為尸盟者之所執或以盛黍稷為内宰之所贊以數求之則數不同明堂位曰有虞氏之兩敦小宰則曰主婦執一金敦黍此敦之制故不可以類取之也今厯觀其器書畫蟲鏤因時而制踵事增華變本加厲求合於古則不可得而定論故今所見形器一體而類多者有若鼎三足腹旁有兩大耳耳足皆有獸形其盖有圈足却之可置諸地者如􅌏敦伯庶父敦宰辟父敦之類是也其間形器不一方之􅌏敦諸器小異而無盖若哆口圈足下連方座者毁敦是也上釴兩耳者周姜敦是也耳有珥足作圈者伯敦􅂒敦周䖍敦是也自毁敦而下四器雖形器不一終不失敦制而又皆銘之為敦因以附諸敦之末豈古人制器與時為宜而有所不同耶抑道衰禮壊度數與之為因革也於是若稽上古而議禮之臣因兹以成一代之典由是禮文燦然革弊陋於前古可謂盛矣彼若禮圖之制鏤龜為盖繪形赤中與古制無略似者殆亦學禮之士沿襲傳注之謬補遺完缺止能傳其所聞使夫觀乃器稽乃時雖俟百世其無惑矣右通盖髙七寸一分深四寸六分口徑四寸二分腹俓六寸六分容五升三合共重六斤十有二兩兩耳盖與器銘共六字盖曰孫己丁器曰己孫丁按商之君有以己為號者有以丁為號者然不應併銘其器則己丁者當是其享祀之日故於是又以孫銘之且享祀者孫子之職也盖先言孫後言己丁明是器孫所自致也器以孫居己丁之中又以言孫用其日而祀之耳觀其盖足純緣周以䕫龍又著兩螭以聳其耳通腹皆列饕餮之紋比之他敦尤為特異右通盖髙八寸四分深四寸一分口徑七寸三分腹徑九寸一分容六升七合共重十有三斤二兩兩耳有珥三足盖與器銘共六十六字攷其銘乃散季為王母叔姜作也昔之人神祀饗之禮其彝器食飲每通用之既以人道事乎神又以神道饗乎人此家廟中與夫平日燕居之器皆得銘而用之初無别也散季之銘叔姜敦必有一於是矣當商之末世周之盛徳文王在下遵養時晦於是四方之賢者盍歸乎來如太公望散宜生之徒莫不咸在文王者得此數臣以為之輔故丕顯之謨足以貽於初丕承之烈得以繼於終迨夫天之厯數有歸於周武王作太誓以告于衆則太公望有鷹揚之從散宜生有執劍之衛事業昭昭載之史冊盖彼皆以文王舊臣受顧命之託而成此武功焉今觀是敦考諸款識在惟王四年八月也且文王之世散季已為之輔而厯數猶未歸則知所紀之四年肇而作此者盖武王時明矣右髙八寸一分深四寸三分口徑七寸五分腹俓七寸四分容五升有半重十有二斤兩耳銘一百一十三字且敦之名見於虞氏之時而特無其制至周兼用四代之禮而敦亦不廢然而時不相襲故形器類皆不一此器圈足而下連方座比他器為稍異且銘伯和父者和衛武公也衛自康叔有國至武公已三世矣武公能修康叔之政平戎有功故周平王命之為公今觀銘文著伯和父稱若曰則知代王而言者也其謂師毁乃祖考婚于我家則知為周室之姻婭舊族耳方兹時師毁治其東偏西偏為有功焉故銘厥功而錫是敦以章其善且復見兼戈矛錞鐘之物不一等可謂盛矣然世系所出則前史既􅇅無所考證不得其傳焉前一器通盖髙九寸一分深四寸三分口徑六寸五分腹徑九寸六分容七升九合共重一十七斤六兩兩耳有珥三足盖與器銘共三十六字次一器通盖髙八寸九分深四寸一分口徑六寸六分腹徑八寸九分容七升五合共重一十七斤兩耳有珥三足盖與器銘共三十六字後一器髙二寸八分口徑七寸七分重二斤十有四兩銘一十八字右三器皆曰仲駒父其國氏及世次皆未詳功臣表有騏侯駒左傳有駒伯為郤克軍佐則駒其姓也若曰齊景公卒冬十月公子駒奔衛則駒其名也豈非公子駒以伯仲稱而曰仲駒父耶檀弓云㓜名冠字五十以伯仲稱周道也子生三月父名之二十而冠尊其名而立其字五十為大夫則尊其字而呼以伯仲也仲姜者盖仲駒父之母或祖也或以為仲駒父妻則禮曰夫不祭妻是以知為母或祖也按春秋凡婦人皆以字配姓伯姬仲子季姜之類是也仲姜亦字配姓也齊許申呂皆姜姓此則未詳其何國女夫器有用器有祭器凡銘有享孝追孝祀禪者皆祭器九嬪職云凡祭祀賛玉齍而玉齍之制不見於傳注今宗廟中迺與瑚璉遂為闕器豈鄭𤣥所謂敦瑚璉簋皆黍稷之器者歟噫兩漢去聖未逺煨燼之餘禮樂度數所泯絶者眇邈已不可追當是時綴學之士所得斷簡遺編補緝詁訓斷以臆說故三代禮文雜以漢儒之學由是後世祖述者異端紛糾無所指歸今復得見三王之完器乃可以知聖人製作之㫖俾有志於古者有所考信豈小補之哉右髙五寸八分深四寸口徑六寸三分腹徑七寸九分容六升重八斤一十兩兩耳有圈三足􅇅盖銘一百四十字首曰惟王十月猶春秋之言春王正月之意盖言王所以尊王言月所以謹時也曰王在成周者猶詩之言王居鎬亰周公既成洛邑明天下知所歸往也曰及内伐浪昴猶詩之所謂薄伐玁狁至于太原者矣曰王命敔追迎于上洛猶詩之出車以勞還枤杜以勤歸者矣執傒臼雜孚人三百泮宫之執訊獲醜之意也曰十有一月格于成周大廟告厥成功于廟之意也曰敔告禽馘百傒臼者有同乎獻囚獻馘曰尹氏受釐有若乎告廟之終並受其福曰圭鬲幣貝五十朋者盖錫以圭璧以作爾寳鑄以鼎彝以著其功與之幣帛以將其意而其數之多至五十朋足矣猶以為未也又錫以土田之衍則受錫者豈得傲然自居其寵耶宜乎對揚天子之休命而歸羙以報其上焉亦猶詩所謂乕拜稽首天子萬年之意歟是敦也不惟製作精工而又字畫竒古其間辭意與商周之書雅頌之文相為表裏揚雄言周書噩噩爾殆有見於兹也右髙四寸深三寸口徑六寸七分腹徑六寸七分容二升五合重二斤有半兩耳圈足銘一十六字此敦上釴其耳下圈其足銘之曰寳敦作者伯景父也且書景命曰予命女作大正正於羣僚侍御之臣則伯景周僕卿也按史記年表自厲王以上有世次而無年數共和以後接乎春秋年數乃詳盖自穆王𫝊共孝懿夷厲五王而至於共和至今盖千有九百餘年斯敦之作在穆王時也古之人噐存乎久逺者必託於金石然岐陽十鼓今雖皆在而文字剥􅇅者已十三四惟古器銅者皆完則石之堅又不足恃是以古之人噐必用銅取其不為燥濕寒暑所變為可貴耳且古之賢臣名見詩書者常為後世想望今得其器讀其文自可寳而藏之矣前一器通盖髙八寸三分深四寸二分口徑六寸七分腹徑八寸五分容七升二合共重八斤有半兩耳有珥三足盖與器銘共一百五十字次一器通盖髙七寸三分深四寸一分口徑六寸六分腹徑七寸六分容六升六合共重九斤六兩兩耳有珥盖與器銘共一百五十字後一器髙六寸一分深四寸三分口徑六寸七分腹徑八寸六分容七升二合重七斤二兩兩耳有珥三足􅇅盖銘七十五字右三器形制款識悉同乃一時物也其銘曰周者公子周悼公也悼公文襄之後故有用作文考寳敦之辭古者錫有功則必有彝器以紀其事且以告于家廟焉如秬鬯一卣告于文人是也卣飲器敦食器宜其為銘一也是敦之名亦曰用養乃祖考者謂此重修宣和博古圖卷十六
