body:
  text: 重修宣和博古圖卷十卣二一十八器商一十五器父丙卣銘一十二字父已卣銘三字父辛卣銘八字執匕父丁卣銘六字持干父癸卣銘三字婦庚卣銘七字父舉卣銘三字史卣銘一字持刀父已卣銘一十四字母乙卣銘二十二字冀父辛卣銘一十四字祖庚卣盖銘三字夔龍卣一夔龍卣二夔龍卣三周三器淮父卣銘八十二字單癸卣銘五十八字樂司徒卣銘二十二字右通盖髙一尺三分深六寸三分口徑長三寸九分濶三寸二分腹徑長七寸八分濶六寸二分容六升三合共重一十一斤十有二兩兩耳有提梁盖與器銘共一十二字曰父丙禾孫其上又為弓形并手執二矢飾以弓矢者意其平日之所嗜好而子孫之所以享祖考者當以是求之也然禾字全作禾穟之形亦固有義夫卣所盛者祼也為之祼者其秬鬯也秬有一稃二米禀冲氣最盛故昔人用以為鬯而享神亦示其誠之不可虛拘也銘禾於卣義固有在耳右高七寸三分深六寸五分口徑長三寸六分濶三寸腹徑長七寸四分濶五寸八分容五升有半重六斤十有二兩兩耳闕盖有提梁銘三字曰父已上有立戈形按商之十世君曰雍已此曰父已則是其子銘其父之祀器也考雍巳之子是為小甲是器當小甲之世為之作立戈形亦以嗜好求其神也盖古之尚象未有不及是者故於是有立戈爵有立戈甗有立戈癸尊有立戈父癸卣盖與此意同也其製作質古真商物也但特亡其盖耳右通盖高一尺深七寸五分口俓長三寸五分濶二寸六分腹俓長六寸七分濶五寸四分容四升九合共重七斤五兩兩耳有提梁盖與器銘共八字象三矢之形而以一格立之曰貝父辛按書文侯之命以言平王錫晉文侯也曰用賚爾秬鬯一卣繼之以彤弓一彤矢百盧弓一盧矢百則卣之銘三矢者得不紀君惠耶一生二二生三三生萬物則三者總數耳又詩言菁菁者莪此育材之詩也而曰既見君子錫我百朋而釋者謂古者貨貝五貝為朋則人君之錫臣下亦有及於貝者書言大貝在西房盖國之所寳也以貝銘之卣間是亦象矢之義也父辛則指其人而已右通盖高九寸四分深六寸七分口徑長四寸四分濶三寸二分腹徑長七寸七分濶五寸九分容五升九合共重七斤有半兩耳有提梁盖與器銘共六字曰父丁又作手執七形於其上祭祀之義以養為主而七所以示其養也於禮見之夫雍人掌割烹之事也而曰概鼎七爼于雍爨則七所以載鼎實耳又廩人掌米入之藏也而曰概匕與敦于廪爨則亦以七黍稷焉詩曰有饛簋餐有捄棘七則敦與簋皆盛黍稷器其為用於食明矣然則匕於飲食無所不用宜以養為主也卣之為器豈非以養為先哉右高七寸八分深六寸七分口俓長四寸五分濶三寸三分腹徑長七寸六分濶五寸九分闕蓋有提梁容六升三合重八斤四兩銘曰父癸而上為人形兩手各持干按周官司干掌舞器祭祀舞者既陳則授舞器既舞則受之賔饗亦如之然則祭於廟用於賔設於饗禮莫不皆有干舞焉蓋干武舞也有是功斯有是舞以稱之非是則君子不取然古者舞有文武若羽舞皇舞文舞也千舞人舞武舞也詩曰左手執籥右手秉翟又曰值其鷺羽皆指文舞而言之禮曰朱干玉戚以舞大武詩曰萬舞有奕皆指武舞而言之於是有王者興以武得天下則其廟樂皆有武舞是器商物而卣乃薦秬鬯之器實用於宗廟然其銘曰父癸則明為子以奉其父者在商之時號報癸者惟成湯之父故今所藏彞器凡商物銘癸者皆歸之報癸然則用舞於癸廟亦宜以其子之所有而薦之湯以武得天下其所舞者朱干玉戚也故於器以干銘之然其銘象人形兩手各執干而不以玉戚兼之者亦取夫干以自衛不事乎兵之道歟且黄帝堯舜以至三王其所謂文武之樂莫不有之故有樂則舞從焉是以舞文者若黄帝之雲門堯之大咸舜之大韶夏之大夏是也舞武者若湯之大濩武王之大武是也然而舜用大韶之文舞而亦有所謂舞干者方時有苗為之孽則不可無武備耳要之以徳為主也且頃所藏彞器其銘有持刀父已有立戈父甲又有所謂持㦸父已而獨無持干者夫干以自衛有征無戰非若戈㦸也書云帝乃誕敷文徳舞干羽于兩階則帝者之盛徳成功其在兹歟其在兹歟王黼曰商持干父癸卣今所傳商器有持戈持刀持㦸獨無持干者干以自衛與舞干同義敷文徳之器也大抵上古彞器凡持五兵者皆著伐功云右高七寸二分深五寸九分口徑長三寸七分濶三寸腹徑長七寸七分濶五寸九分容五升四合重六斤十有二兩兩耳闕蓋有提梁銘七字其一字泯㓕不可考餘曰子孫婦甲庚丁夫彞器多以子孫銘之以其承祖考之祀者有在於是若乃中饋之職從其夫以相祀事此又婦之於姑舅禮所不廢蓋以人道而事神則宗廟致欽之義婦宜預焉詩言君婦莫莫為豆孔庻是也關睢之羙后妃采蘩之詠夫人采蘋之語大夫妻莫不皆以供祭祀為先耳然古者婦之預祭惟宗廟則從至於外祀則莫從也故必言子孫婦以别其宗廟之祀歟曰甲庚丁者祭之日也夫外事用剛日内事用柔日宗廟之祀當用柔日而此兼甲庚何哉蓋春秋言辛巳有事于太廟壬午繹則宗廟正祭必用柔日而至於繹祭則無害其用剛日也天有十日地有十二辰日辰未嘗不相配而言如辛巳壬午之類是矣且此獨言日而不言辰者以言日則辰從之昔人言簡而意足故其銘如此右通蓋高九寸五分深六寸一分口徑長三寸六分濶二寸六分腹徑長七寸九分濶五寸四分容五升二合共重六斤有半兩耳有提梁銘三字曰辛父舉按周有天下立二王後乃封紂子武庚于宋以續商祀武庚被誅又命㣲子啓代商後俾得用天子禮樂故凡器用服飾一遵商制詩所謂亦白其馬以商尚白而不從周之尚赤也然則宗廟祭祀其亦遵商明矣自㣲子至于僖公舉實為八世則其得用商禮可知是卣商卣也曰父舉則是為僖公舉也右高七寸一分深六寸一分口徑長四寸一分濶三寸腹徑長七寸三分濶五寸四分容五升二合重五斤兩耳闕提梁銘一字曰史者史言其官有以史為氏族者因官而受氏焉今有爵銘三字曰史父辛字畫相類則知史名其官是卣狀饕餮而環以連珠文縟典雅真商物也右通盖高六寸八分深四寸三分口徑長四寸濶三寸一分腹徑長六寸濶四寸九分容二升八合共重三斤十有三兩兩耳有提梁蓋與器銘共一十四字父己者商君也子字象形而右手持刀按商祖乙卣亦作此象蓋欲示孝子親職其勞以明割牲之義詩云執其鸞刀以啓其毛取其血膋凡以是也右通蓋高八寸六分深五寸六分口徑長三寸八分濶三寸腹徑長七寸一分濶四寸二分容三升五合共重五斤一兩兩耳有提梁蓋與器銘共二十二字曰丙寅王錫者以甲子推之商建國始於庚戌歴十七年而有丙寅正在仲壬即位之二年也其曰王錫則王之錫賚功臣之器如周公文侯之卣亦王之所錫也故記禮者以謂賜圭瓉然後為鬯則知此器非臣下之所専有又曰作母乙彞者如詩言文母同意考商周之時立子生商者有娀也故長發之禘及之厥初生民者姜嫄也故雝之禘及之是皆率親之義耳盖知是卣乃王錫臣工以追享其母氏歟以夫家廟未嘗無合食者也右通蓋高六寸三分深四寸二分口徑長三寸九分濶二寸九分腹徑長五寸五分濶四寸容二升三合共重四斤有半兩耳有提梁蓋與器銘共一十四字冀者國名也昔人受封於此則後世食采於所封之地復以為氏焉父辛商號也曰旅彞者昔人嘗謂有田一成有衆一旅則旅舉其衆也考諸款識甗曰旅甗敦曰旅敦匜曰旅匜簋曰旅簋義率如此其後作亞形者又以象其藏主石室之制蓋宗廟之器也右高四寸二分長五寸九分濶四寸七分重二斤六兩銘曰祖庚史且商二十五代之君曰祖庚實為武丁氏之子是器銘曰祖庚史則祖庚時史之卣也人臣之享家廟非君錫彞器則不可専有故以祖庚史銘之盖之銘如此則其器亦當有是銘此特失其器耳按周宰辟父敦蓋與器之銘各七十五字周􅌏敦蓋與器之銘各一百七字略無少異獨周仲駒敦蓋與器銘雖同而器銘則可以順讀蓋銘則反是以此少異耳異時兹器一出其器與蓋銘亦必相合焉前一器通蓋高七寸六分深五寸一分口徑長三寸四分濶二寸七分腹徑長五寸五分濶三寸九分容二升六合共重四斤九兩兩耳有提梁無銘次一器通蓋高一尺二分深六寸六分口徑長四寸五分濶三寸七分腹徑長六寸五分濶四寸九分容五升一合共重九斤十有五兩兩耳有提梁無銘後一器高五寸八分深四寸四分口徑長五寸二分濶三寸二分腹徑長七寸二分濶四寸四分容三升四合重四斤六兩兩耳闕蓋闕提梁無銘右三器俱飾以夔龍前二器有稜若觚後一器形如瓠三闕其蓋與提梁然皆卣也但形制不同商之文物視周猶為尚質故其設飾取象特簡古耳右通蓋高六寸八分深四寸四分口徑長三寸九分濶二寸九分腹徑長五寸八分濶四寸七分容二升三合共重五斤一兩兩耳有提梁蓋與器銘共八十二字其曰穆從師淮父戍于古者穆與淮父索諸經傳悉無所見戍則如詩言遣戍役之戍謂穆從淮父以戍役于古也按曲禮生曰父曰母死曰考曰妣則此曰文考者盖後世追享之器耳夫卣非燕饗之器惟祀宗廟之神則用之其所盛則秬鬯也且君錫臣以秬鬯之祼其始則盛於卣其終則祼於彞所以求神於隂者曰日乙者舉其日之吉也亦猶大夫始鼎曰日已寳鼎文考尊曰日癸尊彞之類舉日之吉者所以嚴其事也右通蓋高五寸八分深四寸口徑長三寸六分濶二寸七分腹徑長六寸五分濶四寸三分容二升一合共重三斤二兩兩耳闕提梁蓋與器銘共五十八字曰夙夕饗爾宗則是饗禮所用之卣宗者如禮記所言大宗小宗之類非諸侯之傳姓者也是器乃單作父癸卣然先曰饗爾宗則癸於單族蓋是其宗耳初河南岸圯張燾者得十数物而此卣是其一復有數器雖形制不同皆有單景字疑皆一時物如所謂單從彞單從舟單從鼎單從盉者是也獨單父乙鼎單字頗異又文皆少於癸卣豈詳於此則略於彼其互相備耶右高九寸深八寸九分口徑長三寸八分濶三寸三分腹徑長七寸五分濶六寸容七升八合重五斤有半銘二十有二字周官有天地四時之職是為六卿惟大司徒實掌地事曰樂大司徒則樂者姓氏也宋戴公四世之孫有曰樂莒而後世子孫因以為氏又曰司徒子象之子洪作旅卣蓋言司徒之孫作是器也按王安石字説衆曰旅則知旅卣者非一器也蓋旅進旅退非一之狀猶編鐘編磬之類是矣是器比它卣而復有􅈹且著地無足當是旅卣之别耳重修宣和博古圖卷十
