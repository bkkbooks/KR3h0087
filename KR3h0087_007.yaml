body:
  text: 重修宣和博古圖卷七尊二罍附共二十三器周尊一十五器乙舉尊銘二字犧尊一犧尊二象尊鳬尊瓠尊夔龍尊叨餮大尊叨餮壺尊三獸叨餮尊叨餮尊著尊一著尊二壺尊一壺尊二罍八器犧首罍一犧首罍二犧首罍三犧首罍四素犧罍象首罍麟鳯百乳罍叨餮罍右髙一尺一寸二分深八寸口徑七寸二分腹徑二寸三分容二升重四斤三兩銘二字此器銘曰乙舉按王安石字説舉字從手從與以手致而與人之意獻酬之義也記禮者言杜蕢洗而揚觶以飲晉平公而公曰毋廢斯爵至于今謂之杜舉然則觶亦謂之舉實基於此昔蔡出龜而謂之蔡冀出馬而謂之驥琴張謂其善琴巫咸謂其善巫皆相因而得名也是知舉之為器其義亦爾前一器通蓋髙七寸七分耳髙二寸闊九分深三寸四分口徑一寸九分通長一尺一寸七分闊五寸容四升共重七斤四兩以口為流四足無銘後一器通蓋髙九寸四分耳髙二寸二分闊一寸深三寸五分口徑二寸通長一尺二寸闊五寸二分容三升三合共重七斤二兩以口為流四足無銘右二器按周官有司尊彞之職而犧尊乃其一取其犧牲享食之義又以示其性順而德重以興稼穡助民功致民力以出作入息而服畎畝之事而已后稷教民稼穡種藝五穀而人民育文武之功所自起周人於此蓋貴其本也魏太和間得尊於青州其制樣正與此類王肅注禮以犧象二尊並全牛象之形而鑿背為尊則其説蓋有自來也漢儒之説以謂犧讀如婆娑之義而刻鳯皇之象其形婆娑然方是時其器祕於潛壤未之或見則曲從臆斷而遷就其義以今觀之蓋可笑矣右通蓋髙九寸八分耳髙一寸五分闊九分深四寸五分口徑二寸二分通長一尺二寸七分闊三寸八分容三升三合共重四斤四足有提梁無銘象之為物感雷而文生是尊取形於象以明乎夏德而已夏者假也萬物之所由而化也方時天氣下降地氣上騰文明盛大而物趨於侈靡此象尊所由設也周禮司尊彝云春祠夏禴其再獻用兩象尊者其是歟又況象南越大獸也以鼻致用而不以口先王於是以見逺夷來賔昭德之致與夫養口體者異矣然則用之於祭祀豈徒然哉今全作象形而闊背為尊禮記曰犧象周尊也鄭氏則曰以象骨飾尊阮氏則曰以畫象飾尊殊不合古此作象形而出於冶鑄則鄭阮之謬槩可考矣其所以然者三代之器遭秦滅學之後禮樂掃地而盡後之學者知有其名而莫知其器於是為臆説以實之以疑傳疑自為一家之論牢不可破安知太平日久文物畢出乃得是器以證其謬耶右髙七寸四分深四寸八分口徑一寸八分腹徑長五寸九分首尾積長一尺九分容一升九合重三斤九兩有流有鋬闕蓋無銘按周官六尊有犧有象皆取其形似而鳧不與焉則知鳧尊者古人用於宴飲之間非宗廟祭祀之器蓋鳧習水而假以況則間於禮者也故詩人以鳧鷖歌太平言君子之有禮酒所以為禮而飲酒者雖始乎治常卒乎亂則間於禮而不繼以淫者固亦鮮矣此鳧尊之象寓意甚深宜為宴飲之戒云右髙六寸三分深六寸口徑一寸腹徑二寸二分容六合重一斤上有兩鼻無銘是器以口為流置之則可立若尊形焉然旁設兩鼻所以安提梁亦可挈之以行也且飾以雲雷之文復以示其戒焉其在上古匏器而酌水所以尚質後世則之於是乎有瓠尊焉此其遺法耳右髙六寸八分深五寸口徑一尺八分腹徑一尺一分容一斗七合重一十一斤有半無銘是器比諸尊為最小者而足與腹及頸間皆作夔龍狀間以雷紋於兩旁又飾以連珠周之脰足對峙有方竅不識為何用它器皆無此蓋莫可考也右髙二尺三寸深一尺八寸一分口徑一尺九寸八分腹徑一尺二寸九分足徑一尺一寸二分容七斗四升有半重四十七斤無銘純緣皆素腹足飾以叨餮間之雷紋考古大尊以陶瓦成形猶登之用瓦也登變製以銅而見於世者時有焉尊或如之今是尊特大而其質則銅固宜為大尊大以名其體而不言所飾之物蓋若壺尊著尊之類異乎名之犧象者矣右髙九寸深七寸四分口徑五寸二分腹徑八寸二分容八升三合重六斤十有二兩無銘尊作壺形蓋上尊曰彝中尊曰卣下尊曰壺是器必下尊也其脰飾叨餮腹著風雲不獨示其有節止而又明其施澤之及時也右髙九寸八分深七寸七分口徑六寸八分腹徑一尺二寸一分容二斗二升重十有五斤無銘其形如瓿而小異脰上有鼻作叨餮狀周身悉被叨餮之飾與雷紋相間錯土花漬染銅色蒼翠如瑟瑟紋鏤華好觀其製作之妙非周莫能至也右髙八寸深六寸六分口徑五寸八分腹徑七寸容七升二合重三斤十有一兩無銘是器純緣與足皆無文飾特三面狀以叨餮且若鼎若爵若斚若甗若瓿之類莫不有叨餮之形皆所以示其戒故至於尊亦然也前一器髙一尺六分深一尺三分口徑五寸腹徑九寸八分容一斗七升四合重十斤十有三兩無銘後一器髙一尺四分深一尺二分口徑五寸腹徑九寸八分容一斗七升四合重八斤十有五兩無銘右按明堂位商尊曰著釋者以謂著地而無足此二器脰作夔龍蟠屈之勢腹著雲雷回旋之狀而底著地無足誠所謂著尊者也然著為商尊宜其質素無文而此器著飾如是者何也蓋周人於朝獻亦嘗用兩著尊則是尊也豈非周因商器而益之以文者乎孔子所謂周因於商禮所損益可知者於此亦可推矣然成周之時其禮樂庶事襲用四代之制亦不止用商一代之器而已前一器髙一尺二寸八分深一尺一分口徑七寸八分腹徑一尺一寸一分容二斗二升三合重十一斤十有四兩無銘後一器髙一尺深八寸二分口徑六寸一分腹徑九寸一分容一斗二升八合重七斤十兩無銘右二器肩腹並設雲雷之飾以禮圖所載考之比犧象而有脰比著尊而有足謂之泰尊則此非瓦也謂之山尊則此無山文然其形制類壺而與禮圖壺尊相肖豈其為壺尊耶周禮曰秋嘗冬蒸其饋獻用兩壺尊則此其是歟然議禮者故不可按圖而求合於古要之必有所自焉亦未可忽也第一器髙一尺四寸深一尺二寸三分口徑六寸四分腹徑一尺五寸容二斗八升六合重十有五斤四兩一鼻兩耳無銘第二器髙一尺二寸九分深一尺二寸口徑五寸五分腹徑一尺二分容一斗三升二合重九斤有半一鼻兩耳連環無銘第三器髙八寸九分深七寸三分口徑三寸八分腹徑七寸六分容六升一合重四斤十有一兩一鼻兩耳連環無銘第四器通蓋髙一尺二寸七分深九寸八分口徑三寸九分腹徑八寸一分容一斗三升五合共重一十斤二兩一鼻兩耳連環無銘右四器皆以犧首為耳為鼻而製作又復相類故皆以犧首名之然其不同者特髙下致飾色澤環耳之類敻非一手之製前三器腹著叨餮下作垂花蟲鏤隱起間錯雲雷後一器色赤無紋要之皆周物也故合之於一律焉右髙八寸四分深七寸一分口徑三寸六分腹徑六寸五分容六升二合重四斤十有三兩兩耳連環無銘考犧之字至漢鄭玄釋犧為莎又或作獻戲其字不同其為義一也後世用莎之語遂飾以鳯皇婆娑之狀曾不知止以犧為飾耳因其字畫形聲舛訛故器亦失其制度考是器耳鼻皆以犧為飾狀若牛首大槩與周犧首罍相類但兩耳連環為小異也右髙二尺四寸五分深二尺四分口徑七寸六分腹徑一尺六寸八分足徑一尺一寸五分容一石二斗七升重五十四斤有半無銘是器罍也佐尊之器肩脰間作兩象首貫以連環腹飾圜花足之上又為一象首且象南越獸齒感雷而文生以象禮之文飾之於罍者蓋周官六尊中有象尊用於春祠夏禴再獻之際則副象尊者宜其有罍正一類器耳右髙二尺二寸七分深一尺七寸五分口徑一尺五寸九分腹徑二尺三寸足徑一尺七寸三分容二石一斗七升重一百三十八斤無銘是器致飾不一通體與足作方斜雷紋中著以乳其稜四起而上立四鳯中間又為四獸各頂一角屹然而起疑其為麟蓋麟鳯王者之嘉致於彞器每每有之其麟鳯之間復以夔龍相間器大精工無如此者及禮圖之陋乃以謂罍畫山形之象以取夫雷出於此其為臆説明矣右髙九寸六分深七寸六分口徑八寸三分腹徑一尺一寸一分容二斗二升四合重九斤四兩無銘罍於酒器中所容最多故釋器者云受一斛此器所容但五分之一豈罍之一類者亦自有等差小大耶又詩云金罍蓋未必以黃金為之以五金皆金耳此罍在諸器中特為精緻髙古可以垂法後世於是詔禮官其製作為之楷式以薦之天地宗廟使三代之典炳然還醇見於今日亦稽古之效也重修宣和博古圖卷七
