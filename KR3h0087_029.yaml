body:
  text: 重修宣和博古圖卷二十九鑑二三十九器善頌門漢一十一器宜君公鑑銘八字宜官鑑銘四十字尚方宜子孫鑑銘四十六字長宜子孫鑑一銘四字長宜子孫鑑二銘四字長宜子孫鑑三銘四字長宜子孫鑑四銘四字四宜鑑銘四字九子鑑銘一十字宜侯王鑑銘一十一字十六花鑑銘八字唐二器武德鑑銘五十三字長宜子孫鑑銘四字枚乳門漢六器百乳鑑七乳鑑四乳鑑一四乳鑑二四乳鑑三素乳鑑龍鳳門漢二十器蟠螭鑑銘一十字龍鳳鑑龍鵲鑑鼉龍鑑銘二字虎龍鑑雙鳳鑑鳳馬鑑雉馬鑑龍麟鑑六花鑑海獸鑑銘四十八字海馬蒲萄鑑一海馬蒲萄鑑二海馬蒲萄鑑三海馬蒲萄鑑四海馬蒲萄鑑五海馬蒲萄鑑六海貝方鑑海獸朱鳳鑑海馬狻猊鑑善頌門漢宜君公鑑徑三寸九分重七兩三分銘八字漢宜官鑑徑三寸四分重四兩三錢銘四十字漢尚方宜子孫鑑徑五寸八分重一十三兩有半銘四十六字漢長宜子孫鑑一徑五寸二分重一十三兩有半銘四字漢長宜子孫鑑二徑四寸六分重一十四兩銘四字漢長宜子孫鑑三徑五寸九分重一十五兩銘四字漢長宜子孫鑑四徑六寸重一斤十有三兩銘四字漢四宜鑑徑四寸五分重一十二兩有半銘四字漢九子鑑徑四寸三分重一十兩有半銘十字漢宜侯王鑑徑四寸四分重一斤銘一十一字漢十六花鑑徑六寸八分重二斤十有五兩銘八字唐武德鑑徑九寸五分重五斤五兩銘五十三字唐長宜子孫鑑徑七寸五分重二斤二兩銘四字右一十三鑑凡頌之非所宜則雖無頌可也然則頌之斯宜之矣詩曰宜民宜王上之所以宜於下也罄無不宜臣之所以宜於君也宜爾室家言家道之宜也宜君宜王言子孫之宜也鑑之為用無所不有故其言有所謂宜君公宜侯王宜官宜子孫焉此所以又以善頌次之也枚乳門漢百乳鑑徑五寸八分重一斤三兩無銘漢七乳鑑徑五寸四分重一斤三兩無銘漢四乳鑑一徑三寸一分重五兩三分無銘漢四乳鑑二徑三寸一分重四兩有半無銘漢四乳鑑三徑二寸六分重三兩無銘漢素乳鑑徑三寸三分重四兩無銘右六鑑鐘有枚枚所謂乳也彝有乳乳所以養也蓋樂之聲所以養其耳酒之味所以養其體此其飾之以枚焉鑑亦有枚者所以燭其形而主養故也人所祝頌以養之至也故以枚乳次善頌之後龍鳳門漢蟠螭鑑徑三寸七分重六兩銘一十字漢龍鳳鑑徑六寸重一斤七兩無銘漢龍鵲鑑徑四寸九分重一十五兩無銘漢鼉龍鑑徑三寸六分重四兩七錢銘二字漢虎龍鑑徑四寸一分重九兩無銘漢雙鳳鑑徑五寸重一斤三兩無銘漢鳳馬鑑徑八寸五分重三斤一十兩無銘漢雉馬鑑徑三寸九分重十有一兩無銘漢龍麟鑑徑五寸二分重一斤二兩無銘漢六花鑑徑二寸九分重三兩無銘漢海獸鑑徑四寸九分重一斤一兩銘四十八字漢海馬蒲萄鑑一徑九寸七分重五斤六兩無銘漢海馬蒲萄鑑二徑九寸六分重五斤五兩無銘漢海馬蒲萄鑑三徑七寸四分重一斤一十五兩無銘漢海馬蒲萄鑑四徑七寸七分重二斤二兩無銘漢海馬蒲萄鑑五徑五寸七分五釐重一十五兩無銘漢海馬蒲萄鑑六徑三寸五分重四兩無銘漢海貝方鑑自方三寸重五兩二分無銘漢海獸朱鳳鑑徑九寸二分重四斤一十二兩無銘漢海馬狻猊鑑徑七寸三分重二斤五兩無銘重修宣和博古圗卷二十九
