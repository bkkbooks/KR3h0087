body:
  text: 重修宣和博古圖卷五鼎五三十一器周一十二器象簠鼎旋雲鼎蟠虺雷紋鼎斜方雲雷鼎山紋垂花鼎垂花鼎一垂花鼎二花足鼎雷帶鼎旋紋鼎純素鼎蟠夔鼎蓋闕漢一十八器孝成鼎銘五十六字好畤供厨鼎銘五十八字汾陰宫鼎銘五十四字定陶鼎銘一十六字李氏鼎銘二字六夔鼎三犧鼎一三犧鼎二雷紋鼎篆帶鼎浮雲鼎輔耳鼎一輔耳鼎二輔耳鼎三輔耳鼎四百乳鼎蟠螭鼎蓋小鼎唐三螭鼎右高六寸四分耳高一寸八分闊一寸四分深四寸口徑長七寸六分闊六寸八分腹徑長七寸七分闊六寸九分容七升重八斤三兩四足無銘按三代之間方鼎多矣惟此器自方如簠深意周人改象于兹若乃足作獸蹏與方鼎殊不相似蓋未可考右高一尺二寸六分耳高三寸二分闊二寸七分深七寸四分口徑一尺三分腹徑一尺八分容二斗五升重二十二斤四兩三足無銘按此器足空耳直純緣作雲氣回旋狀足著饕餮形制與周獸緣素腹鼎相近蓋周物也右通蓋高七寸七分耳高二寸闊一寸七分深三寸五分口徑六寸四分腹徑六寸五分容三升六合共重七斤十有三兩三足無銘是器周以蟠虺間之雷紋其蓋有足仰之如敦之有㑹爵之有坫其形制文鏤之勝殆周末器也右高五寸五分耳高一寸二分闊一寸深三寸三分口徑四寸七分腹徑四寸九分容二升重二斤六兩三足無銘純緣飾以夔龍而腹作斜方之形實以雲雷間以細乳蓋乳所以養人雲雷所以澤物䕫龍者又所以戒其貪也舉一器而衆理備古人規度豈不羙哉雖然器之著雲雷者多矣其狀不一或作旋雲者所以象其觸石而出也故古文雲為以見回轉之形或作垂雲者將以見其不崇朝而雨也故小篆雲為雲以顯雨施之意至於雷則或有以為象者故古文益之為或有以為象者故籀文益之為即此考之則制字者未甞不觀象察形以寓於字畫之間也然雲也雷也為其有澤物之意故後世又加之雨以著其義焉至聶崇義禮圖凡當作雷者既莫之設而所謂雲者亦無回轉下垂之象使見三代鼎彝所以為雲雷者當褫氣䘮膽而自媿其謬矣右高一尺二分耳高三寸闊三寸一分深六寸七分口徑一尺三寸腹徑一尺二寸二分容二斗九升重十有七斤三足無銘是器飾以山紋垂花山以取其仁之靜花以取其禮之文猶十二章之有山有藻也然仁至於泛愛則失己非禮以節之則靡没而莫之反矣制器尚象豈徒為觀羙哉微而飲食古人未甞不致意焉前一器高七寸三分耳高二寸三分闊二寸二分深四寸四分口俓九寸四分腹徑九寸二分容八升四合重十有二斤三足無銘後一器高四寸四分耳高七分闊七分深三寸七分口徑三寸二分腹徑三寸九分容一升重一斤四兩三足無銘右前一器偃耳蹄足腹著交螭下有垂花備成之文後一器圜而上揜腹飾饕餮其垂花作蟬紋狀華藻相勝而蟬又取其趨高潔而不沉于卑穢雖無銘欵以考世次其為周一時之器無疑焉右高五寸七分耳高一寸三分闊八分深三寸二分口徑長四寸八分闊三寸八分腹徑長五寸闊四寸容二升二合重四斤一兩四足無銘足飾以花腹作直紋而緣為夔龍與周庚申鼎形制相近惟著飾為異耳右高一尺一寸二分耳高二寸九分闊三寸五分深七寸三分口徑一尺二寸腹徑一尺二寸六分容二斗九升五合重三十一斤有半三足無銘是器純緣下設雷帶而足與腹間皆純素無紋飾形制高古蓋周之器歟右高七寸七分耳高一寸九分闊二寸深五寸口徑九寸八分腹徑八寸七分容一斗重六斤二兩三足無銘是器耳足上下純素惟腹間飾以旋紋有宛轉回旋之狀形模高古非周制不能臻此右高四寸五分耳高九分闊一寸深二寸八分口徑四寸六分腹徑五寸一分容二升二合重二斤一十兩三足無銘耳與足不設紋鏤之飾土花沁暈如紫玉色然漢鼎類多純素無文而形制則鮮及此者右通蓋高八寸一分耳高二寸八分闊二寸一分深五寸一分口徑六寸二分腹徑七寸八分容七升九合共重九斤三足蓋與器銘共五十六字按孝成帝乃孝元之子西漢第九帝也是鼎雖孝成廟器乃造于孝哀即位之三年其銘又有曰建平三年十月工王褒造蓋孝哀即位改號建平而孝哀又嗣服孝成也右通蓋高五寸耳高一寸九分闊一寸一分深三寸一分口徑四寸八分腹徑五寸六分容二升六合共重四斤三足蓋與器銘共五十八字按畤封土也冢而祀之在昔秦襄以攻西戎始祠少昊作西畤秦文夢黄蛇口止於鄜又為鄜畤秦宣于渭南祠青帝曰宻畤秦靈于吳陽祠黄帝曰上畤祠炎帝曰下畤此畤之所由興也及始皇東游厯祀嶽瀆山川遂祠八神一曰天主二曰地主三曰兵主四曰陰主五曰陽主六曰月主七曰日主八曰時主而地主之祠蓋在泰山之下梁父之地以天好陰祠之必于高山之下故又謂之好畤漢祖有天下覩雍之四畤曰吾聞天有五帝而四何也蓋是秦襄有白帝之畤秦文有黄帝之畤秦宣有青帝之畤秦靈復有黄帝炎帝之畤而獨無黑帝之畤也又曰吾知之矣待我而具五也乃祠黑帝于是後世咸有五帝之畤至武帝時幸五畤因獲白麟以昭神休而旌其年為元狩則好畤起于秦而事于漢也是鼎乃好畤供厨之器而形制則漢物也又其銘曰長樂飼官則又知漢物明矣蓋長樂者漢宫也昔樗里子葬渭南其治時語于人曰吾墓後百歲當有天子之宫夾其左右後漢興而長樂宫乃在其墓東則長樂飼官乃漢官名置官以祠神于古實不廢也右通蓋高五寸八分耳高一寸七分闊一寸五分深三寸二分口徑四寸八分腹徑六寸三分容二升六合共重三斤三足蓋與器銘共五十四字按前漢地理志河東郡屬縣有曰汾陰有曰平陽而平陽有鐵官此曰汾陰宫則宫之在汾陰者也考其欵識既曰汾陰供官銅鼎二十枚又曰汾陰宫銅鼎一者二十所以舉供官之數而一者舉其𨽻于宫者也又曰平陽一斗鼎蓋平陽有鐵官此乃紀所鑄之地耳曰第二十三者捴其器之在汾陰者為之次不必言鼎也按西漢郊祀志云孝武皇帝始建上下之祀營泰畤于甘泉定后土于汾陰而神祗安之則作宫于汾陰者以祀后土之所是宜有列鼎之薦而此特其一器耳銘文稱供官銅鼎亦又明朝廷祀典之物非私享也右通蓋髙五寸五分耳髙一寸六分闊一寸二分深三寸三分口徑四寸五分腹徑五寸六分容二升六合共重三斤三足蓋與器銘共十六字按漢十二年孝恵帝即位始詔郡國諸侯王各立髙廟而是鼎於蓋間有髙廟二字其字畫復有變篆為𨽻之體是其為髙廟祀器無疑也又曰定陶廟者蓋漢初有天下旌功臣以定陶之地封彭越而王之是為梁王而其國則定陶也越既叛命乃削其地更以封髙祖之子恢是為定陶共王恢其在恵帝即位之初許立髙廟則正恢之世也右通蓋髙四寸四分耳髙一寸闊八分深二寸八分口徑三寸七分腹徑四寸九分容一升四合共重二斤一十一兩有半三足銘二字按此器圜弇上而耳外附質素無紋與汾隂宫鼎相類其字畫亦作漢蹟李氏顯於兩漢者如西漢之李廣李陵東漢之李固李膺皆聞家華族甚多此但紀姓而不書名蓋未可考其為誰歟右通蓋髙九寸七分耳髙二寸闊一寸五分深五寸四分口徑七寸一分腹徑八寸二分容八升共重六斤十有五兩三足無銘蓋作圈如足仰之可以貯物而圈下承以六䕫豈亦取夫六鼇負戴之義然其所飾纎巧多為物象叔向嘗謂器不蟲鏤而今復若此故知非三代之制歸之近古則漢有之也通蓋髙六寸二分耳髙二寸二分闊一寸八分深三寸八分口徑五寸三分腹徑六寸容三升五合共重三斤一兩三足無銘右二器足既如牛復設三犧於蓋書傳言三牲曰牛一羊一豕一則犧乃三牲之最者蓋古人於天地之祭宗廟之享賔客之奉用以將其精純者非此不可此漢器也而有周之遺意焉右通蓋髙八寸七分耳髙二寸七分闊一寸八分深五寸二分腹徑八寸容八升共重六斤四兩無銘三足純素純緣與蓋遍著雷紋或大或小互相間錯腹上維以綯紐周帀其下與耳又作螭形蓋頂復以三環為飾仰而置諸机如足然亦可以盛是器形制頗類輔耳鼎特差大耳右通蓋髙六寸耳髙一寸五分闊一寸四分深四寸一分口徑六寸腹徑七寸一分容四升六合共重四斤有半三足無銘是器兩耳外附而足作股膊若獸蹄狀蓋設三環仰之可以貯物上下飾以篆帶縈紆紏結曲盡華巧然攷其規模則漢制也右通蓋髙八寸三分耳髙二寸四分闊一寸八分深五寸二分口徑七寸四分腹徑八寸二分容八升八合共重六斤九兩三足無銘觀其耳附如釴弇上如鼒足作股膊蓋設三圈稽之商周無與合者究其製作乃漢室之器然體間飾以雲氣作下垂之勢蓋亦取其澤物之象云通蓋髙五寸耳髙一寸六分闊一寸二分深三寸三分口徑四寸五分腹徑五寸五分容二升八合共重三斤四兩三足無銘通蓋髙五寸耳髙一寸八分闊一寸二分深三寸五分口徑四寸三分腹徑六寸四分容三升共重三斤十有一兩三足無銘髙四寸八分耳髙一寸八分闊一寸五分深三寸五分口徑四寸八分腹徑五寸六分容三升四合重三斤一十兩三足闕蓋無銘髙四寸一分耳髙一寸五分闊一寸三分深三寸一分口徑四寸五分腹徑五寸五寸容二升五合重二斤十有一兩三足闕蓋無銘右前二器蓋設三環仰之可以為足與後二器皆無蟲鏤之飾比商器其質有餘但後二器闕其蓋凡漢之鼎器形制類同若好畤供厨鼎銘有曰第八百六十則知非一器也右通蓋髙四寸九分耳圜俓九分深二寸六分口徑六寸一分腹徑七寸容三升二合共重二斤十兩三足無銘是器匾淺若瓿以環為耳殊非古制蓋與器各以三膊為足蓋又貫之三牙可以脗合各周以乳乳形分布蟠虺之間乳有見於致養虺以見於屈伸有時古人尚象豈無意哉特形制漸陋不足以配古也右髙一寸八分口徑五寸七分重一十三兩有半無銘頂有提環周囘隱起三脊錯以蟠螭内外之紋有類秦鑑又塗以黄金爛然照目觀其蓋亦可以髣髴鼎之形製矣雖不能比肩商周非漢亦未易為也右通蓋髙一寸五分耳髙五分闊二分深八分口徑一寸二分腹徑一寸六分容半合共重三兩三足無銘凡鼎之屬大曰鼐中曰鼎小曰鼒故詩言鼐鼎及鼒言自大以及小也王安石字説謂鼒鼎之有才者蓋大鼐則孕其氣而鼒則小有才而巳是器又規倣鼒而為之其小可置諸掌錯金銀為華飾以七寶瑟瑟輝映其上蓋非食飲之器正恐置之几格間如研滴之具然自祖宗以來最為舊物藏之府庫有日矣此器一出便覺映照同類者製作近於凡陋然典刑精緻定非俗工所能模鑄要之漢室物也右通蓋髙三寸耳髙一寸闊九分深一寸二分口徑三寸三分腹徑三寸五分容三合共重一斤二兩三足無銘按此器耳附於外形圜而匾上有三螭以戯於蓋足與耳皆為螭形務作竒巧比漢器尤不典殆唐人所造耳重修宣和博古圖卷五
