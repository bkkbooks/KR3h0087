body:
  text: 重修宣和博古圖譜錄類一器物之屬提要臣等謹案重修宣和博古圖三十卷晁公武讀書志稱為王楚撰而錢曽讀書敏求記稱元至大中重刻博古圖凡臣王黼撰云云都為削去殆以人廢書則是書實王黼撰楚字為傳寫之訛矣曽又稱博古圖成於宣和年間而謂之重修者盖以採取黄長睿博古圖説在前也考陳振孫書録解題曰博古圖説十二卷秘書郎昭武黄伯思長睿撰凡諸器五十九品其數五百二十七印章十七品其數四十五長睿殁於政和八年其後修博古圖頗采用之而亦有刪改云云錢曽所説良信然考蔡絛鐵圍山叢談曰李公麟字伯時最善畫性喜古取生平所得及其聞睹者作為圖狀而名之曰考古圖及大觀初乃倣公麟之考古作宣和殿博古圖則此書踵李公麟而作非踵黄伯思而作且作於大觀初不作於宣和中絛蔡京之子所記皆其目睹當必不誤陳氏盖考之未審其時未有宣和年號而曰宣和博古圖者盖徽宗禁中有宣和殿以藏古器書畫後政和八年改元重和左丞范致虚言犯遼國年號案遼先以重熙建元後因天祚諱禧遂追稱重和徽宗不樂遂以常所處殿名其年且自號曰宣和人亦見鐵圍山叢談則是書實以殿名不以年號名自洪邁容齋隨筆始誤稱政和宣和間朝廷置書局以數十計其荒陋而可笑莫若博古圖云云錢曽遂沿以立説亦失考也絛又稱尚方所貯至六千餘數百器遂盡見三代典禮文章而讀先儒所講説殆有可哂者而洪邁則摘其父癸匜漢注水匜楚姬盤漢梁山鋗及州吁髙克諸條以為詬厲皆確中其病知絛説回䕶時局不為定評然其書考證雖疎而形模未失音釋雖謬而字畫具存讀者尚可因其所繪以識三代鼎彛之製欵識之文以重為之核訂當時裒集之功亦不可没其支離悠謬之説不足以當駁詰置之不論不議可矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
