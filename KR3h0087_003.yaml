body:
  text: 重修宣和博古圖卷三鼎三二十器周叔液鼎銘二十三字單從鼎銘五字舉鼎銘一字威君鼎銘七字鮮鼎銘一字伯􅥇父鼎銘一十八字節鼎銘一字仲稱父鼎銘三十五字太叔鼎銘四字齊莽史鼎銘一十九字乙公鼎銘一十一字妘氏鼎銘一十三字寏父鼎銘八字尨生鼎銘一十六字絲駒父鼎銘九字豐鼎銘六字師秦宫鼎銘四十七字子父舉鼎銘三字􅒋鼎蓋銘六字宋夫人鼎蓋銘八字右髙六寸四分耳髙一寸六分濶一寸四分深四寸口徑六寸二分腹徑七寸一分容五升重六斤四兩三足銘二十三字曰叔液考諸前代叔液之名不見於經傳惟語記周之八士則有叔夜焉豈其族歟是器耳作雷形純緣飾以立螭足作蹄狀形制篆鏤皆周制也右髙四寸七分耳髙一寸三分濶一寸三分深二寸三分口徑長四寸五分濶三寸三分腹徑長四寸一分濶三寸容一升一合重二斤十有四兩四足銘五字曰單冏作從彝周有單子歷世不絶有襄公頃公靖公獻公穆公凡數世特冏者不見諸經傳是器鼎也而曰彝蓋彝言其常曰從則如品之有從亦有所謂陪鼎者是也此鼎兩耳方而四足上飾獸面腹上有雙鳳形間以雷紋鳳之隱顯與夫雷之動作皆以其時著之紋飾豈徒為哉右髙八寸九分耳髙二寸一分濶二寸四分深五寸七分口徑七寸九分腹徑九寸容一斗一升三合重十有三斤二兩三足銘一字曰舉器之銘舉者非特是鼎若父癸尊而銘之曰中舉李公麟得古爵於壽陽而銘之曰已舉王價得古爵於洛而銘之曰丁舉其有見於銘者如此若杜蕢洗而揚觶以飲平公因謂之杜舉則又見於獻酬之制此銘一字曰舉義有在於是歟觀其製作耳足與腹皆純素不設文鏤而三面有叨餮狀間之雷紋銘與商器皆近似而文過之周初器也右髙六寸八分耳髙二寸四分濶二寸二分深五寸九分口徑七寸八分腹徑八寸六分容一升五合重八斤有半三足銘七字曰威涊君光之飼鼎者威􆃒君考諸經傳無所見然飼鼎者質之鼎彝有曰餗鼎取易覆公餗之義有曰饙鼎以為滫飯之器此曰飼者蓋飼糧也王安石以謂行食為糧是鼎得非用之於行食耶腹間作蟠虬耳飾以雲紋足皆狀獸字畫與許子鐘切類乃周末之物但闕其蓋耳右髙一尺四寸九分耳髙四寸二分濶四寸八分深一尺一寸口徑一尺六寸腹徑一尺七寸五分容七升三合重五十八斤三足銘狀一魚形按詩言誰能烹魚溉之釜鬵與夫混元所謂治大國若烹小鮮蓋烹鮮之術止於嚴水火之齊無所用力是鼎煮烹飪奉薦享則烹鮮有職於此故因其魚形而以鮮名之且商之鼎彝多取象於物此鼎周器款識簡古不加紋鏤為一魚形豈周因於商禮去商未逺餘風猶存耶不然何以純素如此右髙六寸二分耳髙一寸九分濶二寸深四寸一分口徑八寸腹徑七寸八分容六升一合重六斤有半三足銘十有八字曰晉司徒伯􅥇父按晉以僖侯諱司徒故廢司徒為中軍稽之周歷晉僖侯之元年實周共和之二年推而下之至周平王之四十八年魯隱公始居攝蓋百有餘年矣孔丘作春秋斷自魯隱始則前乎此列國雖有名卿大夫往往無復考按是以伯􅥇父之名不見於經傳此鼎以獸飾足腹間著以蟠螭兩耳純緣皆素鬱有古風殆成康時物也右髙六寸六分耳髙一寸五分濶一寸八分深四寸三分口徑六寸三分腹徑六寸六分容四升七合重六斤十有二兩三足銘一字曰節未詳其為誰疑其名也是鼎耳足純素純緣之下起六觚稜為三獸面以蟠夔雷紋為飾腹間又作垂花中著以蟬紋蟲鏤精巧其色瑟瑟實晚周精工所制也右髙八寸二分耳髙二寸一分濶二寸三分深五寸五分口徑五寸五分容一斗二升重十有二斤三足銘三十五字夫天下有道禮樂自天子出故凡彝器名物非下可得而專若召虎之平淮夷宣王用以昭有功則於是釐爾圭瓚秬鬯一卣伯臯及仲稱父有伐南淮之勳則賜作寶鼎乃其宜也曰伯仲則又言其昆弟也詩曰伯氏吹塤指昆弟耳昆弟皆知移孝以事其君於是有南淮之烈豈周室之作人其盛有見於斯耶其銘諸蓋所以昭之也右髙三寸九分耳髙一寸濶八分深二寸二分口徑三寸四分腹徑四寸四分容一升重一斤十有三兩三足銘四字按春秋隱公元年書鄭伯克段于鄢蓋鄭伯者鄭莊公也莊公弟有曰共叔段者嘗請京使居之因謂之曰京城太叔則太叔者莊公之弟耳太叔強跋遂繕甲兵以襲鄭而公伐京焉太叔入于鄢公又伐鄢故春秋書其惡以為昆弟之戒而詩人有曰太叔于田以刺其多才而好勇者是也然則是器乃太叔居京而作之耳其為周器可知右髙六寸八分耳髙一寸八分濶二寸深四寸六分口徑七寸八分腹徑七寸九分容七升重八斤四兩三足銘一十九字曰齊莽史喜則古者太史順時瓜見土是為農官曰莽則剃氏掌殺草春始生而萌之夏日至而夷之秋繩而芟之冬日至而耜之故知莽為史之職也喜疑其為名若詩所謂田畯至喜則畯亦立農之官喜或以為田畯至喜之喜商父乙鼎曰辰見北田作册友史亦史以田言之故知為莽史明矣是器耳緣著雲雷之紋足作蹄狀文鏤增華實周器也右髙一尺耳髙二寸濶二寸二分深六寸九分口徑一尺一寸一分腹徑一尺一寸三分容二斗有半重一十九斤十兩三足銘一十一字按史記齊世家太公卒百有餘年乃有乙公得立則所謂乙公者太公之後而君於齊者也觀其器蝕缺成痕蓋非周初上齊之品其亦不純於古矣右髙九寸三分耳髙二寸濶一寸八分深六寸有半口徑一尺五分腹徑一尺容一斗六升四合重一十二斤十有四兩三足銘一十三字按許慎妘通作妘祝融之後姓也富辰有曰叔妘而韋昭以妘為妘姓之女今􅪌伯雖於傳無見蓋亦祝融後姓而叔妘之族歟册也許慎謂象其札一長一短中有二編之形符命也諸侯受命於王者故尊鼎之間類多作此右髙六寸三分耳髙一寸六分濶一寸七分深四寸一分口徑七寸六分腹徑七寸七分容五升有半重六斤三兩三足銘八字師寏父於經傳無所見惟周有簠蓋銘曰姬寏母而此曰師寏父豈非作簠者寏之母而作鼎者寏之父耶姬言其姓師舉其官耳姞姓也左氏外傳有曰伯姞義母作匜有曰仲姞而此曰季姞殆其族耶謂之尊鼎與魯公作文王鼎而曰尊彝同意右髙六寸九分耳髙二寸濶一寸五分深四寸九分口徑八寸六分腹徑八寸五分容八升七合重九斤三足銘十六字按左傳后羿有臣曰尨圉鄭有大夫曰公子尨此鼎雖古而款識曰年已非有夏之制則尨不可為尨圉殆所謂公子尨耶謂之生亦猶韐敦曰屈生之類是歟右髙六寸九分耳髙一寸八分濶二寸深四寸六分口徑八寸一分腹徑七寸九分容六升七合重五斤十有五兩三足銘九字曰絲駒父作旅鼎永寶用絲字頗漫滅未詳曰駒父則今所藏敦有仲駒父作仲薑敦左傳則有駒伯為郤克軍佐駒其姓也有公子駒奔衛則駒其名也此曰駒父其同駒伯為姓耶曰旅鼎則燕禮所謂士旅食左傳所謂庭實旅百之旅也通體純素而商之簡古猶存特銘款加詳知周物也右髙三寸二分耳髙八分濶八分深一寸九分口徑長三寸二分濶二寸七分腹徑長三寸九分濶三寸三分容七合重一斤二兩四足銘六字曰豐用作玖鬺彝豐名也凡彝器不可得而專有必賜於君然後敢製焉謹君命而銘之故於是書其名是器如簋比它器為特小然銘文典古三代物也右髙一尺耳髙二寸五分濶二寸六分深七寸二分口徑一尺八分腹徑一尺容二斗重十有七斤銘四十七字磨滅不可考者十有二字曰惟五月既望者猶書朏望生明生魄以紀時紀日也其曰師秦宫則師秦之宫以名其人猶師􅂒師毁也王格于享廟而有錫焉則錫命而賞于祖也臣受命于君則當有以對揚之詩曰對揚王休書曰對揚天子之休命此言敢對揚天子丕顯休蓋亦如是矣然後可以作鼎保用而祝之以萬年為詞云右髙九寸四分耳髙一寸八分濶一寸九分深四寸一分口徑七寸二分腹徑六寸五分容四升六合重六斤十有二兩三足銘三字是器耳與腹皆素純緣之外以夔龍雷篆間飾足亦作夔狀比他鼎形制為特髙銘曰子父按古者父為大夫子為士則葬以大夫祭以士父為士子為大夫則葬以士祭以大夫是祭父皆從其子而鼎者祭所用之器又以銘表著其祖考之美故祭統曰鼎有銘自名者也是鼎也銘雖無文而特以子父識之其下又為舉字蓋取其以手致而與人之意則知用之於父盡力以致享而不敢虛美其先者也右髙一寸八分深一寸四分三圜環各徑圜一寸重二斤十有三兩銘六字曰宋公欒之餗鼎且春秋帝乙之後微子為宋公都商丘大辰之墟自微子至景公蓋三十六年獲麟之歲景公者名欒是所以為宋公欒也作餗鼎者食器也易曰鼎折足覆公餗則銘以餗亦以為飲食之節而已今所藏一鼎銘曰王命􅪌􅒋一鼎曰􅒋女皆一時物也然二器皆名之周蓋微子得用先王禮樂於周為客是宋也而謂之周右髙一寸九分口徑六寸八分重二斤七兩銘八字曰宋君夫人之餗釪鼎古者邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人此言宋君夫人者邦人稱之也餗鼎實也猶易鼎卦之言公餗也惜乎不得其全考諸款識有曰宋公欒之餗鼎者而此謂之宋君夫人其字畫又切相類殆同時所造也重修宣和博古圖卷三
