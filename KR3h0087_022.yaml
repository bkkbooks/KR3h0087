body:
  text: 重修宣和博古圖卷二十二鐘總説鐘一一十七器周齊侯鎛鐘銘四百九十二字齊侯鎛鐘一銘八十五字齊侯鎛鐘二銘七十三字齊侯鎛鐘三銘八十一字齊侯鎛鐘四銘七十二字蛟篆鐘銘五十二字遲父鐘銘四十字聘鐘銘一十五字寶和鐘一銘二十二字寶和鐘二銘二十二字寶和鐘三銘二十二字宋公䪫鐘一銘六字宋公䪫鐘二銘六字宋公䪫鐘三銘六字宋公䪫鐘四銘六字宋公䪫鐘五銘六字宋公䪫鐘六銘六字鐘總説聖人之作樂也文之以五聲播之以八音而八音之始必原於律吕律吕之氣肇於黃鍾黃鍾之生而平於中正則鑄之金磨之石繫之絲木越之匏竹其大不過宫其細不過羽或戛或擊或搏或拊一合焉一止焉而樂由此以成矣然八音之器語其制作既肇於黃鍾之數而上下相生月律互間周一嵗之月十二數而金奏舉其餘絲竹之類必因鐘律以求協而同歸於和者為備樂然則鐘固樂之始也其大者為特鐘則獨垂其一是律倍黃鍾之數而成者也其小者為編鐘是律數不倍十有六枚而同一簴者也有鎛焉則大於編鐘而減於特鐘者也考之周官鳧氏所以鎔範者有兩欒而為銑銑間則有于而鼓鉦舞與之相次其上為衡甬旋蟲以屬於簴而體備枚篆攠隧之飾焉且特鐘編鐘至於鎛之為器小大雖殊凡兹致飾惟一而已此先王之法也由漢以來浸失其傳枚所以節聲而長短異狀衡甬旋蟲所就以固結而易之為係以下垂枚短則聲不能節而有隆殺易之為係以下垂則動搖而有餘韻參雜相紊雅正或乖而能知之者夔襄不世出良可歎夫今之所獲上追商周下逮秦漢古法具存固可因器以考其聲因聲以為其樂將見濩武之遺音可復傳於斯日矣顧不美歟右髙一尺七寸五分鈕髙二寸一分闊二寸三分兩舞相距一尺一寸八分橫九寸四分兩銑相距一尺四寸七分橫一尺二寸三分重一百二十二斤八兩銘四百九十二字按是器今考其銘文有曰師于淄陲按太公吕望周封于爽鳩之墟營丘之地是為齊郡今臨淄是也曰命汝政于朕三軍肅成朕師旟之政州申以誥戒之辭也曰咸有九州則齊之封域有所謂臨淄東萊北海髙密膠東太山樂安濟南平原蓋九州也曰處禹之都者齊四嶽之後四嶽佐禹有功封于申吕故言處禹之都也曰不顯穆公之孫其配􅀈公之􅀈而􅀈公之女者蓋古之彞器不獨銘其功業而又及其配偶之事是猶詩言齊侯之子衛侯之妻東宫之妹邢侯之姨皆紀其當時婚姻異姓之國也曰擇吉金用作鑄其寶鎛者鎛鐘屬也王安石解其字以謂厚以厚物為大薄以薄物為小鎛從薄訓小故也國語曰細鈞有鐘無鎛尚大故也大鈞有鎛無鐘尚細故也以此推之則鎛比特鐘為小比編鐘為大今此鐘銘曰鎛考其形制乃大於鐘蓋春秋之時禮樂征伐自諸侯出而等夷制度無復先王之法而妄自夸大耳以周官制器則首言鐘師而以鎛師為之次是其大小自異而此制器之時蓋齊之中世其實周鐘也詳其銘彧受錫者三一曰錫汝釐都其縣三百國徒三千二曰錫汝車馬戎都釐僕二百有五十家三曰錫乃吉金鈇鎬錯鏐鋈鑢乃用作鑄其寶鐘彧蓋齊之巨臣以勳庸顯者其錫蕃庶如此其銘之鋪張又如此此臧武仲所謂作彞器銘功烈以示子孫以昭明德者也齊之中世桓公之業替焉文字之傳尚復燦然可觀若此周監于二代郁郁乎文哉信矣第一器髙一尺五分甬長三寸七分徑一寸二分兩舞相距四寸五分橫三寸二分重二十八斤銘八十五字第二器髙一尺一寸六分甬長四寸五分徑一寸兩舞相距六寸五分橫四寸六分重三十一斤有半銘七十三字第三器髙一尺二分甬長五寸五分徑一寸三分有旋兩舞相距七寸橫五寸六分兩銑相距七寸五分橫五寸六分枚三十六各長七分重三十五斤銘八十一字第四器髙九寸三分甬長五寸四分徑一寸二分有旋兩舞相距五寸八分橫五寸兩銑相距六寸二分橫五寸三分枚三十六各長七分重三十斤銘七十二字右四器形制皆相肖但巨細不等自第一器至第四器其銘文敘致初疑當合為一及得齊侯鎛鐘銘觀之則辭語先後果與今所次者適相吻合有曰刻伐履司敗乃靈師伿少臣惟輔咸有九州處禹之都至於錫乃吉金則次三之鐘辭也有曰鈇鎬玄鏐䥈鋁乃用作鑄其寶鐘至於母或承類則次四之鐘辭也合四鐘之辭至是語而止矣此又或詳或略之不同也是鐘齊物也齊自太公望得國而周天子使召康公命之曰五侯九伯汝實征之以夾輔王室東至於海西至於河南至于穆陵北至于無棣皆得而正之故自太公流澤之久迄于桓公凡兵車之會三乘車之會六而終以霸焉是器必首稱於桓公者其以此也至於言封域之出處世次之先後錫賚之多寡此不復論蓋已具於齊侯鎛鐘矣右髙七寸六分甬長四寸九分徑一寸一分有旋兩舞相距四寸八分橫三寸七分兩銑相距五寸五分橫四寸三分枚三十六各長七分重十有五斤銘五十二字字極古間作鸞鵠蛟螭之形其銘不可辨識者凡九字曰惟正月仲春吉日者猶漢麟鳳銘言秋十月也蓋正月之吉適得仲春之節故謹其時而言之昔張懷瓘在翰林時見古鐘紀夏禹之績皆紫金鈿以大篆神彩驚人此鐘款識蓋亦鈿金篆也是鐘甬旋比它鐘蟲鏤尤劇瑰妙當甬旋之間設環象獸形聶崇義所謂旋當甬之中央為環飾之以蟲曰旋蟲者是也爾後甬旋之制或變為龍螭虎紐與夫圜環之類蓋制作不純於古者如此按薛尚功款識法帖當作商器右髙一尺二寸甬長六寸徑一寸五分兩舞相距九寸橫六寸七分兩銑相距一尺三分橫七寸五分枚三十六各長一寸四分重四十五斤銘四十字是鐘遲父為姬齊薑作也曰用昭乃穆穆不顯龍光則穆穆以言其欽和不顯以言其甚顯而龍光者又言其承天子之寵光也詩言為龍為光是矣蓋鐘樂之大者樂所以示其和而銘之所載又以形容其和之之德福以類應故祈此多福亦求福不回之謂也是其所以為子孫無疆之傳焉右髙一尺二分甬長四寸七分徑一寸一分兩舞相距七寸五分橫五寸三分兩銑相距七寸九分橫五寸二分枚三十六各長一寸銘一十五字在昔人臣有功於國者必昭其功而勒諸金石故若魏絳和戎而獲五利則賜之樂而始具金石之奏是也夫編鐘之數十六而聘之所錫十有二足知其為分方應月律者如此耳若夫名氏所出典籍缺漏蓋無得而考焉髙一尺二寸甬長五寸二分徑一寸九分兩舞相距八寸三分橫六寸兩銑相距九寸七分橫七寸一分枚三十六各長一寸重三十四斤銘二十二字髙一尺二寸六分甬長五寸八分徑一寸二分兩舞相距八寸九分橫六寸九分兩銑相距一尺五分橫七寸五分枚三十六各長一寸五分重三十二斤銘二十二字髙一尺一寸二分甬長五寸二分徑一寸七分兩舞相距八寸橫五寸六分兩銑相距九寸三分橫六寸五分枚三十六各長九分重三十二斤銘二十二字右三器皆銘曰走夫走自卑之辭如司馬遷所謂牛馬走是也且孤寡不穀侯王自稱之耳曰文考者如曹楚晉衛或侯或王皆以文稱蓋以德立國者必曰文以功立國者必曰武是則稱文者特不一也然此鐘制樣皆周物豈以追享文王而作歟在周之時於后稷曰思文於文王曰文考於太姒曰文母是皆稱其德也今曰皇祖文考則宜在成康之後作樂以承祖宗時耳髙一尺三寸六分鈕髙三寸九分闊九寸五分兩舞相距一尺橫六寸六分兩銑相距一尺一寸七分橫九寸四分枚三十六各長三分重三十三斤銘六字髙一尺二寸八分鈕髙三寸九分闊九寸三分兩舞相距九寸五分橫七寸五分兩銑相距一尺一寸三分橫九寸三分枚三十六各長五分重三十二斤銘六字髙一尺二寸二分鈕髙三寸七分闊八寸八分兩舞相距九寸一分橫七寸一分兩銑相距一尺五分橫八寸二分枚三十六各長五分重二十八斤八兩銘六字髙一尺一寸鈕髙三寸八分闊八寸四分兩舞相距八寸橫六寸五分兩銑相距一尺橫七寸二分枚三十六各長三分重二十六斤有半銘六字髙一尺一寸鈕髙三寸七分闊八寸七分兩舞相距七寸五分橫五寸五分兩銑相距九寸一分橫六寸七分枚三十六各長四分重十有八斤一十兩銘六字髙一尺三分鈕髙三寸七分闊八寸六分兩舞相距七寸一分橫五寸一分兩銑相距八寸六分橫六寸三分枚三十六各長三分重一十六斤有半銘六字右六器銘文略無小異皆曰宋公成之䪫鐘夫歷代之樂顓帝曰六莖帝嚳曰五英黃帝曰雲門堯曰大章舜曰大韶禹曰大夏商曰大濩周曰大武夫䪫字與莖通用則䪫鐘者是為顓帝之樂宋者商之系二王之後得用天子禮樂則歷代之樂章固當有之蓋此鐘特其一代之名耳宋自微子有國二十世而有共公固成又一世而有平公成又七世而有剔公成則所謂宋公成者不知其為誰也惟太祖有天下實起睢陽故國號大宋是六鐘既出于宋地而銘文又有曰宋公成則其於受命之邦出為太平之符者正其時歟由是作樂之初特詔大晟府取是為式遂成有宋一代之樂焉當知古今符命莫不各有所感召云重修宣和博古圖卷二十二
