body:
  text: 重修宣和博古圗卷十三壺二二十八器漢山龍溫壺如意方壺一如意方壺二圜絡壺一圜絡壺二蟠虬匾壺細紋圜壺匾壺一匾壺二匾壺三小匾壺獸耳方壺一獸耳方壺二獸耳方壺三獸耳方壺四獸耳方壺五素溫壺一素溫壺二素溫壺三素溫壺四粟紋壺一粟紋壺二粟紋壺三鳳魚壺獸耳圜壺素圜壺一素圜壺二素圜壺三右髙九寸八分深八寸九分口徑一寸四分腹徑六寸二分容二升五合重二斤十有一兩無銘觀其形制有類垂瓠上為之口可以貯湯蓋溫手足之器也李公麟以為鈷䥈而丁度以鈷䥈為溫器殆有所受之耳觀其腹脰飾以山龍其文雖華似非冶鑄之所成者考之近古則漢物也蓋守仁而靜者山體仁而變者龍靜變雖殊為仁則一禮以天地溫厚之氣始於東北為天地之仁則溫厚者氣之仁者也此為溫器而飾以山龍義取諸此古人設象豈徒然哉髙一尺二分深九寸二分口徑二寸八分腹徑六寸容七升四合重八斤十兩兩耳連環無銘髙一尺二分深九寸二分口徑二寸八分腹徑六寸容七升四合重七斤九兩兩耳無銘右二器皆方體兩耳取象叨餮腹作方斜實以花紋其形若如意間以金碧燦然可觀規模出於一律頗有古風漢器之至佳者也前一器通蓋髙一尺一寸九分深一尺口徑三寸四分腹徑七寸六分容一斗一升四合共重六斤一十兩兩耳連環無銘後一器通蓋髙一尺二寸深一尺一分口徑三寸四分腹徑七寸六分容一斗一升四合共重六斤六兩兩耳連環無銘右二器制作悉同按小篆字上象蓋中象耳下象足此器不失其象得古多矣然腹間環結如絡稽三代之器無一合者實漢物也右髙八寸六分深八寸三分口徑長三寸五分闊三寸容五升七合重四斤一十兩兩耳連環有提梁無銘周腹純素不加蟲鏤純緣之下作蟠虬糾結之狀形模差匾已失上古壺制然工鑄雖精巧而竊近人情是必漢器也右髙一尺二寸一分深九寸四分口徑三寸三分腹徑七寸容一斗重九斤一兩兩耳連環無銘漢之技巧最號精能故器之出於其時者莫不瑑飾瓌異以極一時之妙工是器文縷縈紆如盤絲髮可謂盡美者也前一器髙一尺二寸深一尺一寸一分口徑三寸五分容一斗一升九合重十斤一兩兩耳無銘次一器髙一尺五分深九寸六分口徑三寸三分容八升五合重六斤五兩兩耳連環無銘後一器通蓋髙九寸六分深八寸口徑一寸容五升一合共重四斤二兩兩耳連環無銘右前二器通體紋飾繁縟後一器特純素皆附兩耳形制特匾故因其形而名之蓋古者卿大夫則用方壺士旅食則用圜壺而方圜有所不同所謂匾者則不著之於經傳亦漢儒不復見先王禮文之盛出後人臆見而有作也右通蓋髙三寸四分深二寸七分口徑一寸三分容二合共重五兩三分兩耳有提梁無銘狀為壺而匾口圜而足方作連環以為提文飾頗雜施設殆未可詳耳大抵後人製器務為竒怪不純乎古故去理愈逺焉正如汙尊抔飲之後而繼之以大巧也通蓋髙一尺二寸五分深一尺六分口徑三寸四分腹徑六寸九分容一斗一升二合共重六斤十有三兩兩耳連環無銘通蓋髙一尺二寸二分深一尺七分口徑三寸腹徑六寸五分容一斗一升九合共重八斤一兩兩耳連環無銘髙一尺一寸八分深一尺口徑二寸八分腹徑六寸容九升八合重五斤十有四兩四耳連環無銘髙一尺二寸深一尺二分口徑三寸五分腹徑七寸容一斗一升重六斤兩耳連環無銘髙九寸深七寸七分口徑二寸八分腹徑五寸七分容五升重三斤十有三兩兩耳連環無銘右五器體制鍊冶與漢如意方壺相類而大小精粗差不同耳壺所以貯酒蓋亦尊之類是器耳皆挾腹獸口銜環而方稜四出自是一類物也髙一尺三寸一分深一尺二寸一分口徑九分腹徑七寸八分容六升四合重四斤三兩無銘髙一尺三寸四分深一尺二寸六分口徑一寸腹徑八寸容六升重三斤一十兩無銘髙一尺八分深一尺二分口徑一寸一分腹徑七寸二分容四升七合重三斤三兩無銘髙一尺三分深九寸七分口徑八分腹徑六寸容三升重二斤有半無銘右四器形制相類自環以上手主之環以下足主之疑亦有所受也觀其製作純素意若簡易然氣韻非古殆漢工所造耳髙九寸五分深八寸九分口徑二寸八分腹徑六寸八分容六升五合重四斤五兩兩耳連環無銘髙一尺六分深一尺一分口徑三寸二分腹徑六寸四分容一斗重五斤十兩兩耳連環無銘通蓋髙一尺一寸深一尺口徑三寸二分腹徑七寸容九升八合共重六斤十有一兩兩耳無銘右前一器腹間隱起粟紋耳作犧首後二器制作相類特粟紋益細巧而耳著獸面為少異耳右髙一尺二寸深九寸一分口徑三寸四分腹徑七寸四分容七升有半重六斤十有二兩兩耳連環無銘紋有魚鳳之形古者制器非徒然也意必有所象鳳皇來儀記之於書魚在在藻歌之於雅飾以二物得無謂焉加以兩耳齧環形模至妙有商周之餘制但文華過之矣右髙九寸深七寸九分口徑三寸三分腹徑六寸二分容五升六合重三斤十有一兩兩耳連環無銘體圜而純素兩獸齧環以為耳不設賁飾比商則質有餘比周則文不勝蓋亦體古而僅得其形模焉以漢去古為未逺也髙一尺四寸七分深一尺三寸三分口徑五寸一分腹徑九寸八分容二斗八升重一十四斤有半兩耳連環無銘髙一尺四寸九分深一尺二寸七分口徑五寸六分腹徑九寸四分容二斗九升重十有五斤兩耳連環無銘髙一尺五寸深一尺三寸二分口徑五寸五分腹徑九寸四分容二斗八升重九斤十有三兩兩耳連環無銘右三器體制不殊惟第一器塗金為飾漢孝武時作太官壺與此無異疑出一時也且周官公食大夫禮門內用兩圜壺是器之設宜本諸此重修宣和博古圖卷十三
