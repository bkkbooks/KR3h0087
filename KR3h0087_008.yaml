body:
  text: 重修宣和博古圖録卷八總説彛二十七器商七器􅭺彝銘五字已舉彞銘二字子孫父辛彞銘七字子孫彞銘二字父丁彝銘七字立戈父甲彝銘三字虎耳彞銘三字周十八器己酉方彞銘三十七字單彞銘三字召父彞銘七字叔彝銘六字雲雷寶彝銘三字雷紋寶彝銘三字伯映彞銘一十字百乳彝乳彝一乳彝二夔龍乳彝夔龍彝高足彝一高足彝二蟬紋雷彝叨餮彝蟠夔彝蟠夔直紋彝舟漢二器敦足舟垂花舟總説周官載六彝之説則雞彝鳥彝斝彝黃彝與夫虎蜼之屬也釋者謂或以盛明水或以盛鬱鬯其盛明水則雞彝斝彝虎彝是也其盛鬱鬯則鳥彝黃彝蜼彝是也彝皆有舟焉設而陳之用為禮神之器至於春祠夏禴秋嘗冬蒸以酌以祼莫不挹諸其中而注之耳然器以藏禮載禮而行之則即器以明其用而器固不能常存也繇是去古既逺或失其傳而當世無從稽考往往遂為一時穿鑿臆説而聚訟紛糾當年莫能破其謬妄焉國家因積德百年之後講禮明樂收攬前代遺製而範金之堅多出於僻陋潛壤之奧者四方來上如鍾鼎尊壺之類動以百數因暇日悉討論其義多得於款識銘文之間於是彝舟亦較然詳辨而悟先儒之失也彼殊不知彝之有舟蓋其類相須之器猶尊之與壺瓶之與罍焉先儒則以謂舟者其形如盤若舟之載而彝居其上豈其然歟今之所存有如敦足舟垂花舟大略與彝僅似則其為相須之器斷可見矣雖然夫所謂彝則法之有常而寓於器者皆可謂之彝故周之伯寶卣其銘有曰尊彝周之召公尊亦曰父乙寶尊彝也若夫特謂之彝則惟周官六彝為正名無二焉右髙五寸七分深四寸五分口徑七寸一分腹徑七寸二分容五升八合重五斤十有二兩兩耳有珥銘五字純緣圈足皆飾以夔龍之形夔之字從夔夔貪獸也今彝以是為飾蓋亦戒其貪曰􅭺者莫知其為名與氏也然作字取象皆商制耳右髙六寸深四寸七分口徑八寸二分腹徑八寸容七升重七斤六兩兩耳銘二字今按此彝腹間作乳乳百四十有一銘曰已舉己者在商八世君有雍已疑謂是也昔李公麟得古爵於壽陽紫金山腹有二字曰已舉而王玠亦獲古爵於洛下有二字曰丁舉字體正與此同舉之為字從手從與以手致而與人之意爵觶皆酒器也因獻酬而舉之故銘其器曰舉是以記禮者言杜蕢洗而揚觶以飲平公因謂之杜舉故以舉銘之右髙四寸八分深四寸三分口徑七寸一分腹徑六寸七分容五升重四斤十有一兩兩耳有珥銘七字凡商器以此銘者多矣言父辛則若祖辛之類是也曰析子孫乃貽厥子孫之義是器純緣間及圈足皆作夔形相環若循走之狀腹間純素其製作與銘文實商物也右髙三寸五分深二寸九分口徑五寸腹徑四寸六分容一升八合重二斤銘二字曰子孫而孫作兩手拱戴日之狀考諸鼎彞銘有曰子子孫孫有曰子孫者皆取其相承之義是器言子孫而有拱日之飾蓋取日以象君道也尊君道則知盡臣子之禮銘辭甚簡於此可見真商物也右髙五寸四分深四寸一分口徑六寸九分腹徑七寸容五升重六斤六兩兩耳有珥銘七字曰古者姓或名耶按淮父卣有曰戍于古則古又言其地矣商以丁為號者六而此曰父丁者未知其為誰也右髙五寸深四寸口徑六寸七分腹徑五寸四分足徑五寸二分容四升五合重三斤十有五兩兩耳有珥銘三字曰戈父甲蓋商之君十有七世以甲稱者有五若沃丁祖乙南庚之類皆甲之子也其間以兄弟繼之者則不可以子稱是器言父甲則子為父設之矣但不知兹器為何甲而設也純緣與足以上並作雷篆於兩旁以螭首為耳致飾精工字畫典重非後世所能及右髙四寸三分深三寸五分口徑六寸三分腹徑六寸五分容三升重二斤十有三兩兩耳有珥銘三字是器也雖不書名然耳作虎首豈非所謂虎彝耶父已彝已嘗取此以飾其耳蓋施於禘祫之間者當致其義焉非特如此虎西方獸於五德為義於五行為金金與義皆主乎剛而有斷其周之虎彞實體於是有制於酒之意也右髙七寸九分深五寸五分口徑長六寸一分闊五寸一分腹徑長六寸二分闊五寸二分容六升七合重十有二斤六兩銘三十七字曰己酉者以紀其歲方周之時卜世三十卜年七百歲己酉者不一故莫知其次也曰戍者守也以地而有所守如春秋齊侯使連稱管至父戍葵丘之謂宜于招黻黻者以言其别故旌以别之如衮衣取其藻米黼黻之類商貝朋方者五貝為朋如詩錫我百朋言其祿之多用室圍宗彞者彝宗廟常器如周官所載六彞之類也其曰惟王一祀則記其即位之始年耳夫商曰祀周曰年然武王克商而訪於箕子亦曰惟十有三祀則知周固常相因如此其器方而通體為盤夔雷紋四隅并腹間峻拔作觚稜之狀精巧絶世為可佳焉右髙五寸八分深四寸一分口徑七寸三分腹徑六寸九分容五升五合重五斤三兩圈足銘三字曰旗雞單上二字作旗雞形曰單則叔向所謂周其再興乎其有單子也故知單所以為姓曰旗則穆公旗也單自襄公至穆公凡六世而世有明德今所藏單父乙鼎銘亦曰旗單而紋鏤竊相似耳右通座髙六寸一分深三寸一分口徑五寸八分座長五寸四分闊四寸八分容二升六合重五斤七兩兩耳有珥是器耳作螭狀下為方座雲雷之紋與夔龍間錯銘七字一字磨滅不可考曰召父則召公奭也凡周器彝有六而因形以為用見於銘載者類書錫命孝享此曰作乃寶彞而又比它彝其制小異特自寶用之器也然銘簡篆古方召公奭時去商為未逺故知其為周初物耳右髙五寸七分深二寸七分口徑五寸三分座自方四寸八分下有響鐸容二升重四斤五兩兩耳有珥銘六字一字不可辨五字曰叔作寶尊彝且尊用以酌彝用以祼是故尊彝之所用也不同此統言尊彝者蓋先王之時用器不中度不鬻於市戒在於作為淫巧以法度為繩約要使其器可尊可法而後已是以沈子作盉而銘曰寶尊孟金作敦而銘曰尊敦父已作彝而銘曰尊彝虢叔作鬲而銘曰尊鬲此曰尊彝者非六尊之謂也曰叔則周之以叔名者如虢叔榮叔祭叔之類是也上字磨滅故不可考其為誰觀其形制則耳為水獸下有方座周身為叨餮狀純緣下與足上有行螭之飾螭亦水獸也蓋有以戒沈湎而使不沒於禮而已是則制器尚象豈虛為文飾也哉右髙五寸五分深四寸二分口徑七寸一分腹徑七寸容五升二合重四斤十有一兩兩耳有珥銘三字曰作寶彝而飾以雲雷夫雲以致澤雷以啓蟄所以養成萬彚也然茍或過焉則亦所以為害人之於食飲猶是也夫有以養其氣體則不能無益矣然而染指者至於傷恩酒薄者以之用戈則害有甚於此者故昔人於是切切致意凡器之所形目之所擊莫不有微意焉右髙五寸二分深四寸口徑六寸三分腹徑六寸四分容四升有半重三斤十有五兩兩耳有珥銘三字曰作寶彝字畫髙古不書名豈諱賢也歟純緣之下與足皆作雷紋蹙成叨餮狀以鹿首為耳蓋雷之為物養神於冬起用於震其動也時而義有在是以其彝者法也著之文飾亦法之所在焉右髙三寸五分深三寸四分口徑六寸腹徑五寸七分容三升三合重二斤一十兩兩耳有珥銘一十字曰伯映者於經傳無見考其形制耳作獸形純緣與足飾以夔龍間之雷紋大槩與周叔彞相似則知伯映為周人無疑曰伯恐其字耳右髙八寸九分深六寸二分口徑一尺二分腹徑九寸五分容一斗七升有半重二十三斤兩耳有珥無銘周身皆乳凡二百一十有六四耳今所存者有二耳足皆飾夔龍內外有二牛首腹間周以直紋其大比諸彝為最乳所以養人者也猶瓜之保子著之於器以示其永保用之意前一器髙五寸九分深四寸四分口徑八寸五分腹徑八寸一分容七升六合重七斤圈足無銘後一器髙五寸深四寸口徑八寸腹徑七寸六分容四升重三斤一兩圈足無銘右彝之為器所以盛秬鬯而祼地求神者神守其幽當以類感而出之斯致養焉故用乳為飾之意其純緣之下分為四獸首兼著叨餮之形夫以昭貪婪之戒二者制作相類特前一器銅滓漸漬黃緑相間後一器黤如鉛色非久於潛壤者不能如此宜皆出於周右髙四寸三分深三寸七分口徑五寸四分腹徑六寸一分容三升四合重四斤六兩兩耳有珥無銘是器純緣之外作夔龍狀間以雷紋而腹間有乳環之足下作叨餮以虎首為耳按六彝有虎彝然無它飾是器雜然取象故以夔龍乳命之庶幾不謬其所稱耳右髙四寸九分深二寸八分口徑五寸四分腹徑五寸二分容二升重二斤四兩兩耳無銘是器腹間純素足與純緣之外夔龍雷紋交錯足間兩竅可以貫繩形模雖與周叨餮彞相類但此器差小然赤緑相間略無銅色為可佳耳前一器髙八寸一分深四寸八分口徑八寸五分腹徑七寸二分容八升重八斤無銘後一器髙八寸七分深五寸九分口徑一尺七分腹徑九寸七分容一斗二升有半重五斤十有二兩無銘右二器其足比它彝稍髙前一器純緣之下及足之上雷紋與夔龍相蹂蹙周以連珠後一器三面作叨餮周體飾以雲雷其足有竅可以貫繩比商彞文鏤過之純質則有所不逮其為周器明矣右髙六寸一分深四寸一分口徑一尺三分腹徑九寸五分足徑六寸六分容一斗一升三合重五斤四兩無銘是器腹間著以蟬紋而腹之上與足則以雷紋飾之純與腹之下則皆無紋豈非周初之時尚存商質之風耶右髙五寸七分深四寸一分口徑七寸四分腹徑六寸六分容四升八合重四斤十有四兩無銘是器彞也純緣之下以叨餮為飾叨餮之間作細雷紋腹足純素不加瑑鏤實周初物耳右髙四寸八分深三寸三分口徑六寸腹徑五寸二分容二升六合重三斤七兩兩耳有珥無銘是器兩旁蟠以四夔以雷紋間之足間飾以飛鳳耳狀螭首製作竒古非周全盛時不能有此夫夔獸之害物者今蟠而不申鳳鳥之瑞世者今翔而來儀則其德及鳥獸昆蟲也至矣彞之為器所以享神於宗廟非盛德成功無以享也於是以其彝器而飾之焉蓋周之尊彝每以鳥獸為飾者固各有義所謂逺取諸物者是也右髙五寸深三寸九分口徑六寸九分腹徑六寸五分容四升七合重五斤四兩兩耳有珥無銘是器純緣下飾以蟠夔腹間密布直紋如疏櫺設飾簡妙而製作去商為未逺大概與商雲雷寶彝略相類耳右髙四寸九分深三寸一分口徑九寸二分容六升六合重六斤二兩兩耳無銘此舟上圜下方取象天地而耳作螭首物之流形圜則行方則止行則能應止則能定夫耳間著螭蓋示其威之能剛制矣又方其足以取能止之義古人垂訓豈不美哉雖然舟之形制通體上下皆圜而此乃變體與毁敦相類故因名之曰敦足云右髙三寸七分深三寸二分口徑八寸五分容五升七合重四斤兩耳無銘以牛首為耳腹間飾以虺紋其下垂花舟之用在於承彞而花萼亦有相承相蔽之義故特取諸此是器與伯戔盫相類但差大爾恐漢人象彼而為之重修宣和博古圖録卷八
