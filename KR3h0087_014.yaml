body:
  text: 重修宣和博古圖卷十四總説爵三十五器商招父丁爵銘九字父乙爵一銘二字父乙爵二銘三字父乙爵三銘二字父乙爵四銘二字父乙爵五銘二字父乙爵六銘二字父乙爵七銘二字祖乙爵銘二字祖丙爵銘四字父戊爵銘三字祖己爵銘二字守父丁爵銘三字飲父丁爵銘三字斧爵銘一字子孫己爵銘四字子爵一銘五字子爵二銘三字已舉爵一銘二字己舉爵二銘二字車爵銘一字秉仲爵銘三字父壬爵銘二字庚爵銘二字父癸爵銘二字中爵銘一字尊癸爵銘二字雷篆爵銘一字素爵一銘一字素爵二繶爵雲雷爵一雲雷爵二雲雷爵三雲雷爵四總説凡彝器有取於物者小而在禮實大其為器也至微而其所以設施也至廣若爵之為器是也蓋爵於飲器為特小然主飲必自爵始故曰在禮實大爵於彝器是為至微然而禮天地交鬼神和賔客以至冠昏喪祭朝聘鄉射無所不用則其為設施也至廣矣考之前世凡觴一升曰爵二升曰觚三升曰觶四升曰角五升曰散則爵之所取者小又其為器至微也信然然周鑒前古禮文大成而特以爵名其一代之器則豈不有謂蓋以在夏曰盞在商曰斝在周曰爵名雖殊而用則一則其取象各具一妙理耳故其形制大抵皆近似之盞從戔故三足象戈斝戒喧故二口作喧爵則又取其雀之象蓋爵之字通於雀雀小者之道下順而上逆也俯而啄仰而四顧其慮患也深今考諸爵前若噣後若尾足修而鋭形若戈然兩柱為耳及求之禮圖則刻木作雀形背負盞無復古制是皆漢儒臆説之學也使夫觀此三代之器則豈復有是陋哉右髙六寸五分深二寸八分口徑長六寸三分闊二寸九分容五合重一斤七兩三足有流有鋬銘九字其文曰父丁尊彝蓋商人作禮器多銘之彝義取有常而無變也是爵曰招者名載其人為父丁而作也形製特無二柱為反坫之用比諸爵為小異未知古人所以立意何如耳髙七寸五分深三寸四分口徑長五寸六分闊二寸四分容五合重一斤有半兩柱三足有流有鋬銘二字髙六寸八分深一寸八分口徑長五寸六分闊二寸五分容五合重一斤兩柱三足有流有鋬銘三字髙六寸六分深三寸一分口徑長六寸闊三寸六分容五合重一斤四兩兩柱三足有流有鋬銘二字髙六寸一分深二寸八分口徑長五寸五分闊二寸五分容四合重一斤三兩兩柱三足有流有鋬銘二字髙六寸七分深三寸口徑長五寸五分闊二寸六分容四合半重一斤三兩兩柱三足有流有鋬銘二字髙六寸六分深二寸八分口徑長五寸四分闊二寸六分容四合重一斤兩柱三足有流有鋬銘二字髙六寸八分深三寸口徑長五寸五分闊二寸六分容五合重一斤兩柱三足有流有鋬銘二字右商之君稱乙者六曰報乙者成湯四世祖也曰天乙者成湯也於後則又有祖乙小乙武乙太乙是諸器皆曰父乙蓋出乎此而未知其決為何乙耳然諸器所同者咸以牛首為鋬以雲紋為柱其小異者或有雷紋雲氣叨餮蟠夔之飾視其簡古不煩真商物也右髙七寸深二寸八分口徑長五寸闊二寸七分容三合重一斤一兩兩柱三足有流有鋬銘二字且商之君以乙名者不一而祖乙與一焉然諸爵之銘有曰父乙蓋謂報乙天乙小乙武乙之君也其子銘之故云父乙此獨曰祖乙則謂成湯以來十四世之君曰祖乙者是也按士虞禮主婦洗足爵釋者謂有足無文而是器純古略不加飾兹所謂足爵者歟右髙六寸五分深三寸二分口徑長五寸五分闊二寸六分容五合重一斤五兩兩柱三足有流有鋬銘上作矢形旁為一孫字其下著祖丙焉商世之君類以十日銘其器而配以乃祖乃父則此爵亦其一耳古之訟者入束矢以自明其直則矢有直之義况於為之孫者固當直已以從祀事於乃祖兹取以寓其意也右髙六寸四分深三寸口徑長五寸六分闊一寸六分容三合有半重一斤兩柱三足有流有鋬銘三字曰父戊丁夫戊者謂太戊也丁則紀其日耳先王之時外事用剛日內事用柔日所謂剛日則甲丙戊庚壬是也所謂柔日則乙丁己辛癸是也宗廟之祀內事也此所以用丁日歟是器純厖之質朴而不雕蓋原其時則商物也故其製作近似之右髙七寸三分深三寸一分口徑長六寸四分闊二寸九分容四合重一斤七兩兩柱三足有流有鋬銘二字曰祖已按商有雍已而無祖己此曰祖已以見其孫之所作也且三代之器銘載不一然愈簡為愈古愈詳為愈近此夏商周之辨也道降而下辭費而已故周人作會而民始疑蓋會出於不信矣若夫大信不約故不言可也此墟墓之間未施哀而民哀社稷宗廟之中未施欽而民欽者是所謂愈簡而愈古者也質是器豈茍云乎哉第一器髙七寸五分深三寸口徑長三寸九分闊二寸八分容三合有半重一斤四兩兩柱三足有流有鋬銘三字第二器髙六寸九分深三寸一分口徑長六寸一分闊二寸七分容四合重一斤二兩有半兩柱三足有流有鋬銘三字右二器一曰守父丁言子之為父丁作也曰守者又示其持盈守成善繼志述事之義易所謂守器者莫若長子是也一曰飲父丁若所謂以飲平公者是歟器以載銘銘以立義視其器而求其義則知古人所以制作豈徒然哉右髙六寸六分深三寸口徑長五寸七分闊二寸七分容三合有半重一斤三兩兩柱三足有流有鋬銘一字作斧形按天子之服十二章而黼作斧形蓋斧之為意取其有斷惟有斷則剛足以立我而不流於沈湎亦飲者之戒也且禮始於飲食之初故汙尊抔飲而禮已在焉今斧作畫形書體未易蓋禮之所藏器已備矣豈在夫曲禮三千而後見諸鋪筵設几之虛文哉右髙六寸五分深三寸一分口徑長五寸七分闊二寸六分容四合重一斤二兩兩柱三足有流有鋬銘四字曰析子孫己爵以飲福貽之子孫者故曰析子孫析之義蓋取夫斂之則在我析之則在下曰己者商之君號有曰雍己也夫為人後之道能享其祖考則是乃所以來其福嘏耳銘之於宗廟之器宜哉前一器髙六寸七分深三寸一分口徑長五寸一分闊二寸四分容三合重一斤四兩兩柱三足有流有鋬銘五字後一器髙六寸五分深二寸九分口徑長五寸闊二寸四分容四合重十有四兩兩柱三足有流有鋬銘三字右前一器銘五字所可辨者子與作二字而已後一器三字曰子父壬嘗考諸姓夏后氏曰姒商曰子周曰姬皆以其祖賜姓於君故子孫得而承之然而論三代之祖則一出於黃帝夏之祖昌意商之祖契周之祖稷皆黃帝之子孫也黃帝四世而禹始有夏又十七世而湯始有商又十九世而武王始有周其三代未有天下之初則皆始封為諸侯於是賜姓此所以有姒子姬之異姓也商之器大抵多銘一子字著國姓也曰壬則商之君有仲壬外壬此銘父壬故知為商爵無疑前一器髙七寸三分深三寸三分口徑長六寸闊二寸六分容四合重一斤十兩兩柱三足有流有鋬銘二字後一器髙七寸深三寸口徑長五寸九分闊二寸六分容三合重一斤六兩兩柱三足有流有鋬銘二字右二器皆曰已舉已者商之雍已也舉者因獻酬而舉之故名其器曰舉至於尊罍鼎彝其銘通謂之彝者蓋此類耳右髙五寸五分深二寸七分口徑長四寸八分闊二寸四分容三合重十有五兩兩柱三足有流有鋬銘一字曰車以牛首為鋬柱上加雲紋流尾與足並皆純素兩面作叨餮而雷紋間之先王之時凡誥戒於酒無所不致其嚴若銘之以車則豈無其義蓋車有量酒亦有量也車載禮酒亦載禮也然則一醉日富鮮克由禮多見其不知量者豈不如覆車之有戒耶蓋以車銘之不徒設也右髙六寸二分深三寸一分口徑長五寸二分闊二寸六分容五合重一斤二兩兩柱三足有流有鋬銘三字曰辛秉仲是器流尾與足純素無紋兩邊作叨餮狀間以雲雷夫辛者紀其日也秉仲無所經見而秉者疑其為名仲則伯仲之稱也前有秉仲鼎而此亦曰秉仲正一類物耳右髙七寸三分深三寸一分口徑長五寸七分闊二寸七分容五合重一斤四兩兩柱三足有流有鋬銘二字曰父壬按商之君有曰仲壬其子曰太甲有曰外壬其子曰祖乙是器必太甲祖乙為其父而銘之然二君未知其孰是也右髙八寸深三寸三分口徑長五寸七分闊二寸七分容四合有半重一斤七兩兩柱三足有流有鋬銘二字按商紀有太庚南庚盤庚祖庚而此謂之庚者必出於是然言庚者自銘也且商庚鼎庚之字作而取形於垂實蓋庚位西方象秋時萬物庚庚有實字適相同比庚鼎字形為已變矣蓋世之相去有先後故字畫亦因世而為損益之右髙五寸五分深二寸九分口徑長五寸五分闊二寸五分容五合重一斤一兩兩柱三足有流有鋬銘二字曰父癸者即商成湯之父蓋子為父作於祭享燕饗之間著癸以正名也右髙六寸深二寸九分口徑長五寸闊二寸五分容四合重十有二兩兩柱三足有流有鋬商人作器尚質而字畫亦簡古非若周之彝器燦然成文故是器特銘一字曰中而己中之為義王安石釋其字云上以交乎下下以交乎上左以交乎右右以交乎左則以禮為飲者其上下左右見於勸酬交舉無過不及之咎也蓋其語簡則義微故耳右髙六寸五分深三寸口徑長五寸闊二寸六分容四合重一斤兩柱三足有流有鋬銘二字曰尊癸按癸者成湯之父此商器宜以是識之然又以尊銘之者則王安石解六尊所謂尊居其所而爵從之也蓋舉彼則知此焉是器兩面作叨餮而間以雲雷上為山形以牛首為鋬三足純素柱上復作雲紋銘飾簡古真周以前物也右髙六寸七分深三寸四分口徑長六寸二分闊二寸七分容四合重一斤五兩兩柱三足有流有鋬銘一字象爵之形而文鏤回轉若古文雷字昔人雖飲食之末尤謹於禮故飲器多取雷象蓋雷也者養神於冬而起用於震其動也時故易有山下雷頤之象頤者養也酒以養陽食以養隂過則失所養矣此著雷以為之戒者凡以示其動惟以時而已前一器髙六寸五分深三寸四分口徑長五寸六分闊二寸四分容四合有半重一斤二兩兩柱三足有流有鋬銘一字後一器髙六寸七分深三寸四分口徑長五寸六分闊二寸五分容四合重一斤一兩兩柱三足有流有鋬無銘右前一器銘一字象人拱物形近類子字蓋商子姓而凡見於器之銘者類多如此且王安石云酒尊居其所而爵者從之蓋制字之義酋者在上拱者在下爵之所從亦以下而拱上也後一器無銘款然此二器其體純古無紋質朴渾厚雖銘載或有或無各有所寓要之皆商物也右髙六寸四分深三寸一分口徑長五寸闕分闊二寸五分容三合重一斤兩柱三足有流有鋬無銘是爵篆飾皆夔龍之象士虞禮所謂繶爵者其是歟爵繶則如屨之繶蓋繶者紃底縫而文在其中故爵之所飾著於口之下足之上正鄭玄所謂口足之間有篆文彌飾者也雖然諸爵非無文也特以是為繶者舉一隅則可以類見矣第一器髙七寸有半深二寸五分口徑長六寸一分闊二寸八分容三合重一斤二兩兩柱三足有流有鋬無銘第二器髙六寸深三寸一分口徑長五寸二分闊二寸有半容三合重一斤兩柱三足有流有鋬無銘第三器髙六寸九分深三寸四分口徑長五寸七分闊二寸有半容三合重一斤五兩兩柱三足有流有鋬無銘第四器髙六寸五分深三寸口徑長五寸六分闊二寸六分容三合有半重一斤兩柱三足有流有鋬無銘右四器制樣蟲鏤若出於一體腹有雲雷為飾其規模頗類父丁爵意其一時之製也重修宣和博古圖卷十四
