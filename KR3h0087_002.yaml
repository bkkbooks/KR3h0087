body:
  text: 重修宣和博古圖卷二鼎二一十八器周文王鼎銘七字晉姜鼎銘一百二十一字伯碩父鼎銘五十字史頙鼎銘四十三字王伯鼎銘五字季㜏鼎銘四十九字中鼎銘四字南宫中鼎一銘五十七字南宫中鼎二銘三十九字南宫中鼎三銘三十九字穆公鼎銘二百三字象鼎銘一字父已鼎銘二十八字言肇鼎銘一十字雝公緘鼎銘四十一字􅒋鼎銘二字單父乙鼎銘五字益鼎銘四字右髙八寸九分耳髙二寸三分濶二寸深五寸八分口俓長六寸一分濶四寸三分腹俓長六寸三分濶四寸五分容三升有半重一十二斤三兩四足銘七字按鹵字許慎說文云以西省象鹽形鹵即魯字也古尚書魯作􅨞古之文字形聲假借如鄦作許咎作臯繆作穆之類是也尊說文云酒器也以酋廾以奉之今尊傍加乃阜字以阜者蓋取髙大之意彝說文云宗廟常器也从糸糸綦也廾持米器中實也王聲也今彝其首作者乃王也其左作㸃者象米形也右作者糸也下作者廾也魯公者周公也文王者周文王也按史記魯世家云武王徧封功臣同姓戚者封周公旦於少昊之墟曲阜是為魯公周公不就封留佐武王今考其銘識文畫尚類于商則知周公之時去商未逺故篆體未有變省以是推之則此為周公作祭文王之器無疑其制足象蜼形上為鼻下為尾髙而且長其兩耳亦鏤蜼文蜼之為物爾雅以為禺屬昂鼻而長尾尾有兩岐遇雨則以尾塞其鼻蓋取其有智袞冕繡宗彝之章而以虎蜼亦此義也其身四周隱起獸面蓋饕餮之象也古者鑄鼎象物以知神姦鼎設此象蓋示飲食之戒銘曰尊彝者舉禮器之總名而已是鼎也仲忽於元祐間進之竒古可愛足以冠周器腐儒挾持異端輒稱墟墓之物以請罪焉方當紹述先烈作新大政故用堲遏朋邪以彰寳器俾一時純正不沮於朝異代神竒復顯於世豈不快哉右髙一尺三寸耳髙一寸二分濶二寸深七寸七分口俓一尺四寸七分腹俓一尺五寸容四斗一升重七十七斤二兩三足銘一百二十有一字晉姜齊侯宗女姜氏以其妻晉文侯故曰晉姜觀其始言君晉邦取其寡小君之稱以正其名中敘文侯威貫通洪征綏湯原以顯已之有助迨其末也又言保其孫子三壽是利則三壽者與詩人言三壽作朋同意蓋晉姜觀其始特保我子孫而外之三卿亦冀壽考也款識條理有周書誓誥之辭而又字畫妙絶可以為一時之冠右髙一尺六寸九分耳髙四寸四分濶四寸八分深九寸九分口俓一尺六寸八分腹俓一尺七寸九分容九斗五合重一百二十斤八兩三足銘五十字耳足皆素純緣之外飾以蟠夔腹間比以鱗紋銘曰惟六年八月初吉已者以年繋月以月繋日也曰子史伯碩父者伯碩父雖不見於經傳然周有太史内史之官謂之子史則稱於父曰子舉其官曰史而伯碩父則又其名也曰追孝于朕皇考釐仲王母乳母者用昭孝享于其考妣也釐諡也而曰釐仲者蓋古人以字為諡因以為族則仲疑其族也若王母乳母則追孝皇考而并及之其曰綰綽則祝以優裕之辭耳右髙一尺四寸六分耳髙三寸九分濶四寸三分深九寸五分口俓一尺五寸腹俓一尺五寸六分容六斗二升三合重七十六斤三足銘四十三字耳足純素純緣之下以雷紋為飾曰史頙者雖不見於經傳蓋史則言其官頙則疑其名是器與前伯碩父鼎言其考妣諡號大率相類然所異者此鼎差小特不紀其歲月雖辭有詳略器有大小不害其為同實一時之物也右髙五寸三分耳髙一寸二分濶一寸四分深三寸口俓長四寸七分濶三寸四分腹俓長五寸濶三寸六分容一升六合重三斤四兩四足銘五字按史傳有曰史伯者著其姓也有曰鄭伯者舉其國也有曰僖伯者稱其諡也今此伯謂之王以為諡則王不可為諡以為國則王未甞名國以為姓則三代之間未見王姓而顯者惟武王初定商以九鼎寳玉封諸侯而書序克商之後亦曰分寳玉於伯叔之國然則王伯者疑其為王之伯父也曰寳齍者考諸周禮雖有掌玉齍之官然形制訖無所考以其方而四足與諸方鼎悉類故附於鼎云右髙五寸五分耳髙一寸濶一寸二分深三寸五分口俓五寸五分腹俓五寸八分容三升重三斤二兩三足銘四十九字昔康王命作冊畢曰分居里成周郊則成周者西周也麓說文以為守山林吏又曰林屬於山為麓則徙於楚麓者謂其山之林麓蓋如書言大麓之類王欲徙楚先命小臣夌往見以相其居王至于居也復遣錫貝錫馬及兩所以賞之曰季㜏者說文㜏通作妘以謂祝融之後姓也富辰甞舉叔妘而韋昭亦以妘為妘姓之女則㜏乃其妃也曰季者又特言其序耳詩所謂彼美孟姜仲氏任只有齊季女皆指其序也右髙九寸三分耳髙二寸一分濶二寸二分深六寸一分口俓八寸七分腹俓九寸五分容一斗五升重九斤四兩三足銘四字曰中作寳鼎純素不加文鏤與父已中獻南宫中鼎皆出一手特南宫中鼎銘文僅百字其略曰王命中先相南國則知是器皆中一時之制也銅色沁暈如碧玉製作典古在周器中最為純厚者焉髙八寸五分耳髙一寸八分濶一寸七分深五寸四分口俓長七寸二分濶五寸四分腹俓長七寸一分濶五寸三分容七升五合重一十斤四足銘五十七字髙八寸四分耳髙一寸九分濶一寸八分深五寸三分口俓長六寸濶五寸二分腹俓長五寸九分濶五寸一分容五升五合重八斤四兩四足銘三十九字髙八寸四分耳髙一寸九分濶一寸五分深五寸四分口俓長六寸濶五寸二分腹俓長六寸濶五寸容五升有半重一十斤四足銘三十九字右三器以南宫為氏者在周有之如書所謂南宫括南宫毛是也中則其名耳然名氏同而款識或異曰作乃采者蓋采事也命以立事則因為此鼎而勒之銘也其曰伐虎方之年者虎方猶鬼方也虎為西方之獸是必因西征而昭其功以銘之也三鼎形模大略相類至其銘文間有不可知者則闕疑以待博識右髙一尺二寸二分耳髙三寸一分濶三寸五分深七寸七分口俓一尺二寸五分腹俓一尺三寸五分容三斗六升重五十斤三足銘二百三字湮滅不可辨者五十九字是鼎得於華陰迺秦故地曰不顯走者詩言有周不顯王安石釋之云不顯者乃所以甚言其顯也走者如太史公以謂牛馬走則走乃自卑之稱皇祖穆公者考秦世次先武公次成公而穆公又其次今銘復先穆公次言成公後言武公者質諸經傳莫不有意義昔商之禘祀自上而推之下尊尊之義故長發之詩曰有娀方將又曰𤣥王桓撥相土烈烈而終之以實維阿衡實左右商王此先言有娀以及卨至於相土成湯而下然後及於阿衡也周之禘祀自下而推之上親親之義故雝之詩曰既右烈考亦右文母蓋自烈考以上逮于文母也自上及下則原其始而知王業之所由興自下及上則舉其近而昭王業之所以成當時各有所主而此鼎之文世次亦有所法也其餘以歴歲既久類多缺泯無從悉考姑就其可以意得者如此右髙九寸三分耳髙三寸濶三寸二分深五寸口俓一尺一寸七分腹俓一尺五分容一斗九升重二十八斤三足銘一字作象形周禮司尊彝春祠春禴其再獻用兩象尊而是器則鼎也且易六十四卦皆象也而於鼎獨言象蓋鼎之為卦上離下㢲以木㢲火有鼎之體此畫象形其亦準易而著之耶是器腹飾交夔兩耳外作連珠紋純緣不加蟲鏤有商之遺制焉右髙一尺五寸六分耳髙三寸二分濶三寸八分深九寸八分口俓一尺二寸一分腹俓一尺三寸四分容四斗九升重五十三斤有半三足銘二十八字其末云作父已寳而已見於商之帝號蓋商以十干名至周則有乙公得於已則未之見焉是器獸足素耳純緣之外作螭紋而雷紋間之文鏤皆周制也右髙五寸耳髙一寸二分濶一寸四分深三寸三分口俓六寸一分腹俓六寸四分容三升二合重三斤十有三兩三足銘一十字曰言肇作尊鼎而周有司徒言曰肇則言其始也言始作此鼎製作與周鼎頗小異然足短而㜑娑其腹耳足純素純緣外有蛟螭之飾華巧雖乏而漢鼎所不能逮也右髙八寸九分耳髙二寸三分濶一寸九分深六寸口俓一尺三分腹俓一尺五分容一斗七升八合重一十八斤有半三足銘四十一字曰惟十有四月者古器多有是文疑嗣王居憂雖踰年未改元故以月數也昔歐陽脩謂雍公不知為何人而曰十四月亦未有定論又疑其惟十有四者書其年月既死霸記其日也觀其腹出雲氣足著饕餮制甚古而韻不凡非周室無以作此右髙二寸四分耳髙一寸濶八分深二寸一分口俓三寸一分腹俓三寸七分容七合重一斤三兩三足銘二字按􅒋於經傳無所見獨於􅪌􅒋鼎有銘曰􅒋用孝享于朕皇考按其文乃曰惟王二十三年九月王在宗周蓋周有成周有宗周則知􅒋者周之時也而曰女者謂􅒋女也右髙六寸八分耳髙一寸二分濶一寸深四寸一分口俓長五寸七分濶四寸四分腹俓長五寸六分濶四寸三分容三升有半重六斤十有二兩四足銘五字昔叔向甞謂單靖公曰吾聞一姓不再興今周其興乎其有單子也又曰單子朝夕不忘成王之徳以佐王室則單者周之族而為周之卿士者也曰旗者穆公旗也而此鼎銘乃曰父乙蓋乙非獨為商之號如齊有乙公周之彝亦曰父乙則乙者豈冏父祖之名乎右髙五寸耳髙一寸濶一寸一分有半深三寸口俓四寸九分腹俓五寸四分容二升四合重二斤十有四兩三足銘四字曰益作寳鼎曰益者春秋文公六年有梁氏益昭公六年復有文公益未知孰是蓋作鼎彝必有大勲徳而後有之梁氏文公正其人耳重修宣和博古圖卷二
