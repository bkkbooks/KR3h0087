body:
  text: 重修宣和博古圖卷二十盦鐎斗瓿罌冰鑑冰斗總説盦一器周交虬盦鐎斗二器漢熊足鐎斗龍首鐎斗瓿八器周方斜瓿魚瓿蟠虬瓿一蟠虬瓿二叨餮瓿一叨餮瓿二叨餮瓿三叨餮瓿四罌一器漢湯罌冰鑑一器唐冰鑑冰斗一器漢冰斗匜匜盤洗盆鋗杅揔説匜一九器商三器啓匜銘八字鳯匜三夔匜周六器父癸匜銘四字司寇匜銘二十字文姬匜銘二十一字義母匜銘一十七字孟皇父匜銘六字螭首匜盦鐎斗瓿罌冰鑑冰斗總説器為天下之用而有合於禮者有適時而便於事者合於禮則若尊罍盞斝籩豆簠簋之屬是也其或燕私之所奉滋味之所養寒暑之所宜則處尊履貴而肉食者固異乎藿食卑賤之等倫又安得無供承之備以致其用乎故有鐎斗焉以待斟酌有瓿焉以具醯醢臡醬方其寒則資諸溫而禦彼重隂凝沍之氣方其暑則資諸朝覿所出之冰而祛其煩燠之憚由是湯罌冰鑑冰斗各順時而出焉雖然尊彞之器考諸漢唐曽無一二而鐎斗冰鑑復不覩商周之制作者何也嘗試議之夫無見於今者未必皆無也但禮隨世變所用有異耳蓋自周而上以禮為實用故禮器之末者或略焉而於本特致詳自周而下以禮為虛文故禮器之大者或略焉而於末為曲盡惟其本末詳略之有殊所以見於世者多寡有無之或異也右髙三寸深二寸九分口徑五寸六分腹徑五寸五分容二升五合重一斤九兩無銘是器純緣外著以交虬兩耳作連環所以便於提擕以圈為足而器之中純素略無文彩大概與周伯戔盦相肖特闕其蓋耳右通蓋髙四寸八分深三寸二分口徑二寸三分容一升四合有半重一斤十兩有流有柄三足無銘此器流蓋與柄多為物象而之古意足飾以熊者秦漢以來奩具印鈕每作此狀蓋熊男子之祥取其有所堪能故也嘗考三代之時九旗名物各有等差惟上得以兼下而下不得以兼上於是有蛟龍之旗熊虎之旗鳥隼之旟龜蛇之旐漢之鐎斗有具四象有為熊足亦豈若九旗之有等差而第其數耶右髙七寸八分深二寸三分口徑四寸三分容一升重三斤一兩有耳有流有柄無銘是器鐎斗也許慎以謂斗之可以溫物者耳趙襄子使厨人撡斗以食代王則古者行食以斗而此有柄有流知其盛羮湇之具詩云酌以大斗則斗亦可以為飲器也右髙八寸四分深七寸二分口徑六寸六分腹徑九寸五分容一斗五升四合重八斤有半無銘是器文飾極精妙肩作電形近類古文申字環腹之飾皆取象於雷肩脰之間文鏤相錯如盤絲髮微起乳形而中作黃目狀茍非成周文備之時疇能至此蓋前此未之或見後此亦未知其能及也右髙六寸六分深五寸四分口徑五寸六分腹徑八寸七分容一斗重五升十有二兩無銘是器銅色制度不減方斜瓿肩腹之間飾以魚形凡器以魚為飾者不一如魚洗魚符之類是矣且詩所謂季冬薦魚春獻鮪則魚者薦獻之所先也又况五齊七醢七菹三臡所實之器歟此器之飾所以因取於魚也雖然魚麗之詩美萬物盛多能備禮而魚之為物潛逃幽眇難及以政至於盛多則王者之政成而薦獻之禮備矣故於牣魚躍為文王靈德之所及白魚躍入王舟為周家受命之符周器以魚為飾者殆以此歟前一器髙九寸五分深九寸一分口徑五寸六分腹徑一尺八分容二斗五升三合重十有二斤無銘後一器髙九寸三分深九寸口徑五寸六分腹徑一尺一寸一分容二斗四升有半重十有一斤四兩無銘右二器皆飾以蟠虬凡食飲之器飾以虬者皆是也若乃瓿所以盛醯醢之物固亦狀此耳第一器髙六寸一分深四寸九分口徑六寸腹徑七寸九分足徑五寸二分容六升六合重三斤十有一兩無銘第二器髙七寸五分深六寸一分口徑七寸二分腹徑一尺三分足徑六寸三分容一斗五升四合重七斤有半無銘第三器髙六寸二分深五寸口徑六寸一分腹徑九寸容七升重三斤十有二兩無銘第四器髙五寸三分深四寸九分口徑五寸一分腹徑八寸二分容五升四合重三斤一兩無銘右四器皆飾以叨餮或間以雷紋形模典雅雖無銘識可求要之非周文物盛時不能有此也右髙五寸二分深五寸一分口徑四寸一分腹徑五寸七分容三升七合重一斤十有一兩有鋬無銘是器蓋溫水器也狀如匏圜而純素有一耳作綯紐若屈巵舉而置之爐竈間以烹水也形制純雅無紋而氣韻自古宜非近世所有殆漢器也右髙七寸七分下盤深一寸徑一尺二寸四分容五升二合重三十二斤三兩四足無銘且冰鑑之説已具於漢鑑矣今其規模上方如斗四旁塵鏤底作風窗承以大盤立之四足豈非置食於上而設冰於盤使寒氣通徹以禦溫氣耶大抵漢唐之器致用設飾略相倣象然所以異者漢鑑圜而唐鑑方漢鑑近於古而唐鑑則近於今矣故不得不辨昔鄭玄謂鑑如甀大口以盛冰觀此鑑與鄭説不同然又非漢之製作宜李唐精工所能到也右髙一寸六分深一寸五分闊六寸二分重一斤九兩有柄無銘三旁掩上其柄可持其底鏤空實冰斗也古人制器皆因時而為之若夏則有冰鑑於此器略相似而有見於周官今冰斗雖不得而考要之後世所作也匜匜盤洗盆鋗杅總説公食大夫禮曰小臣具盤匜鄭玄謂君尊不就洗賈公彥又援郊特牲不就洗之文以謂設盤匜所以為君聶崇義從而和之且陳開元禮謂皇帝皇后太后行事皆有盤匜而亞獻已下與攝事者皆不設以顯君尊不就洗之義是皆執泥不通之説殊不知內則論事父母舅姑之禮而曰杖屨祗欽之勿敢近敦牟巵匜非餕莫敢用夫論事父母舅姑而言及於匜則是亦衆人之所用耳豈人君獨享者哉若或不然則季加弡伯安得而作之也雖非人君所獨享然惟餕乃用則其用亦未嘗敢易也觀其鋬皆作牛甲脊尾狀按易以坤卦為牛而坤以順承為事故物之柔順者莫甚於牛蓋匜為盥手瀉水之具而義取於順乃其理也若夫盥之棄水必有洗以承之禮圖所謂承盥洗棄水之器者是也惟以承棄水故其形若盤抑嘗見有底間飾以雙魚者為其為承水之具故也然古人稱之有曰匜盤而不謂之洗蓋盤以言其形洗以言其用而聶崇義乃以盤洗為二器所謂盤者正與此洗相類而洗復若壺形而無足又以菱花及魚畫其腹外與此頗不相侔然承棄水者宜莫若盤則作壺形者疑非古制矣崇義圗説稽之於器其乖戾不合者非特如此按圖而考者不可不辨也若夫盆鋗者亦盥滌之具但洗淺而鋗深惟盆居中焉又有所謂杅者特大而深如洗之用盥盤之用奠舟之承彞皆其類也故附諸匜洗之未識者當以類得之右通蓋髙七寸七分深三寸四分口徑長六寸三分闊二寸七分容一升有半共重二斤十有五兩有流有鋬圈足蓋器銘共八字曰啓作寶彞按商太丁之子曰乙乙之子曰啓此銘啓者乃乙之子也是器形制渾厚字畫竒古徑若屈鐵非周秦篆畫之可擬倫者以時考之蓋商之器無疑右通蓋髙九寸二分深三寸七分口徑長六寸六分闊三寸容一升有半共重七斤有流有鋬圈足無銘通體設飾不一其狀有夔有螭有兕小者大者起伏偃仰頡頏差池不可名狀又峙二角於其前而腋間别出兩鳯勢若飛動故因此名之右通蓋髙五寸四分深二寸八分口徑長四寸七分闊二寸二分容一升共重一斤十有一兩有流有鋬圈足無銘通體作夔象而蓋紋隱起者有三蜿蜒夭矯如得風雲之狀復螭其鋬觀其製作頗類鳯匜故宜類之於商也右髙四寸五分深二寸九分口徑長五寸闊二寸六分容九合重一斤三兩有流有鋬闕蓋圈足銘四字曰爵方父癸按周之君臣其有癸號者惟齊之四世癸公慈母也太公呂望實封于齊其子曰丁公伋伋之子曰乙公得得之子曰癸公慈母慈母之子曰哀公臣然則作是器也其在哀公之時歟故銘父癸者此也昔之匜通用於人神此銘父癸則其祭祀宗廟之器耶此匜也而銘有曰爵者豈詩所謂洗爵奠斝之意歟方事洗盥則不可無匜爾右髙一寸四分深七分口徑長二寸五分闊一寸一分容一合重二兩二錢有流有鋬四足銘二十字曰作司寇彞按周官大司冦之職掌建邦之六典以佐五刑邦國詰四方小司寇之職掌外朝之政以致萬民而詬焉則司寇在周官蓋有大小之異是器銘文曰維之百僚則非大司寇不足以當是語也然而是匜非他匜之比正如漢金銀錯鼒小而有適於用豈匜亦固如鼐鼒之有别耶特書傳不見其所考爾要之有是理也右通蓋髙一尺一寸二分深四寸五分口徑長八寸三分闊四寸一分容四升共重六斤十有一兩有流有鋬四足器與鋬銘共二十一字初曰丙寅紀其時也次曰錫龜貝作文姬寶彝著其名也通體作犀兕之形鋬亦如之飾以雲雷之紋宛轉盤繞於其上已足貴矣至於字畫仍復奇古宜比於周右髙六寸深三寸六分口徑長九寸七分闊六寸一分容四升重四斤九兩有流有鋬四足銘一十七字按國語晉公子重耳過秦穆公歸女五人懷嬴與焉公子使奉匜沃盥既而揮之韋昭以謂嫡入於室媵御奉匜盥是器銘曰仲姞義母作旅匜者蓋晉文公重耳娶齊女薑為正嫡次杜祁次逼吉次季隗然杜祁以吉生襄公故巽而上之居第二是為仲吉以隗在狄所娶故巽而已次之是為季隗而祁自居第四昔趙孟嘗曰母義子愛足以威民則義母者杜祁也禮曰銘者自名以稱揚其先祖之美則所謂仲吉者自名也義母者襄公謂杜祁也按通禮義纂以謂媵御交盥蓋媵送女之從者御壻之從者夫婦禮始相接廉恥有間故媵御交相為殊以通其志彼其婚姻歟此稱義母則非初嫁之時有子職在焉故也稱旅匜則非交盥所用特其匜之不一耳右髙五寸五分深二寸七分口徑長八寸闊四寸一分容二升重三斤二兩有流有鋬四足銘六字曰孟皇父作旅匜昔魯桓公之後析為三族有仲孫叔孫季孫焉仲孫於三桓氏為長乃曰孟氏此孟族所由出也是則孟乃仲孫之氏而姓則姬也詩十月之交曰皇父卿士而釋者謂皇父字也然則此曰皇父亦其孟之字歟曰作旅匜則又言非止一器所以御賓客供盥濯者宜非一爾右髙一寸九分深一寸口徑長三寸五分闊二寸容二合重六兩二錢有流有鋬三足無銘匜也大小雖殊而其制則同前一器鋬作螭首四足股間復飾以獸狀後一器甚小而鋬亦狀螭口齧其器純緣下環以雷篆紋鏤之工若甚拙而後世所不能及實周一時物也重修宣和博古圖卷二十
