body:
  text: 重修宣和博古圖卷二十五鐘四三十器周二十一器螭紋鐘一螭紋鐘二花乳鐘一花乳鐘二雙螭紐鐘虺鈕鐘環鈕鐘一環鈕鐘二虎鐘荇葉鐘虬鈕鐘一虬鈕鐘二鳳鈕鐘一鳳鈕鐘二辟邪鐘一辟邪鐘二辟邪鐘三辟邪鐘四辟邪鐘五辟邪鐘六大吕鐘漢六器辟邪鐘一辟邪鐘二環鈕鐘一環鈕鐘二對螭鈕鐘饕餮鐘六朝三器匾鐘一匾鐘二匾鐘三髙七寸鈕髙一寸六分闊一寸二分兩舞相距三寸九分横三寸二分兩銑相距六寸七分横四寸三分枚三十六各長三分重四斤六兩無銘髙七寸八分鈕髙一寸九分闊一寸三分兩舞相距四寸四分横三寸七分兩銑相距五寸八分横四寸七分枚三十六各長三分重六斤四兩無銘右二器是鐘即于鼓間皆為螭紋頂亦如之其一於枚景具作螺旋之狀其二則枚景有如金鋪上既不為衡甬而若鐶可係以下垂觀其製蓋亦古鐘之稍變者也髙七寸鈕髙二寸四分闊一寸七分兩舞相距四寸六分横三寸四分兩銑相距四寸八分横五寸五分枚三十六各長四分重五斤無銘髙五寸一分鈕髙一寸五分闊一寸二分兩舞相距三寸五分横二寸六分兩銑相距三寸四分横二寸五分枚三十六各長三分重一斤有半無銘右二器上設小鈕不為衡甬而枚作旋螺著以花紋獸面大體與許子鐘相類云右髙七寸八分鈕髙三寸闊一寸四分兩舞相距四寸横三寸六分兩銑相距四寸五分横四寸二分重八斤無銘是器全與周物不類而形制若鐸復無鉦鼓枚篆之飾甬作雙螭糾錯其尾若環環之中為獸首舞上以四虬蟠屈相向舞間布以細紋承以垂花其聲清越而長非他鐘之比當是周末變易不一遂致是耳此器重厚倍常當是古鈞後同右髙七寸七分鈕髙一寸七分闊一寸五分兩舞相距三寸三分横三寸兩銑相距四寸二分横三寸六分重六斤九兩無銘是鐘比諸鐘特不類而全若鐸變甬而為鈕且無枚焉但兩面作碎乳布之其鈕獨狀以虺按詩言維熊維羆男子之祥維虺維蛇女子之祥則虺隂類凡鐘屬隂而鼓屬陽於是以虺識之蓋昔人所以取象命意皆有微意存乎其間也髙三寸三分鈕髙一寸一分闊八分兩舞相距二寸二分横一寸六分兩銑相距二寸五分横一寸枚三十六各長一分重一斤無銘髙四寸一分鈕髙一寸五分闊一寸兩舞相距二寸七分横二寸一分兩銑相距三寸三分横二寸三分枚三十六各長一分重一斤一兩無銘右二器周官鳧氏所鑄有所謂大鐘有所謂小鐘爾雅謂大鐘曰鏞中曰剽小曰棧而不言其量數樂律所用之處若樂鐘則惟特鐘鎛鐘編鐘三者而已編鐘乃其小者也是鐘上為環鈕不作衡甬於枚介舞間虺紋盤結而形製尤小其編棧之屬歟然乆藏奥壤銅滓凝積扣之略無聲非特如厚石而已其可取者煎鍊鎔範為足觀焉右髙一尺一寸一分鈕髙三寸闊三寸二分兩舞相距六寸一分横四寸五分兩銑相距九寸一分横六寸五分重二十四斤無銘虎為西方之獸在臟則為肺而主乎憂夫樂者樂也樂極而憂必生聖人常戒懼其所未至則鐘之所以有虎焉敔為伏虎用示其止樂之節意亦如是耳右髙九寸七分鈕髙三寸三分闊七寸五分兩舞相距七寸七分横六寸四分兩銑相距九寸二分横七寸九分枚三十六各長四分重十有六斤五兩無銘是鐘無甬而為鈕其鈕又為二辟邪鼓間亦作辟邪之飾三十六枚各狀荇葉且昔之饗祀凡沼沚之毛蘋蘩之菜皆可薦羞然詩人特以荇為后妃之況者以謂荇上出乎水下出乎水以象乎由於法度之中而法度所不能制則荇之薦羞鐘之合樂有得於法度之表耳髙九寸三分鈕髙三寸九分闊七寸九分兩舞相距六寸四分横五寸兩銑相距七寸五分横六寸枚三十六各長三分重一十二斤十有二兩無銘髙九寸鈕髙四寸闊八寸兩舞相距六寸二分横五寸一分兩銑相距七寸六分横六寸三分枚三十六各長三分重十有二斤無銘右二器製作一類略無少異枚介鉦間皆著虬紋糾結交錯隧攠亦如之鼓上復以蟠虬為飾不設甬以虬為鈕蓋變古制也然究其形模非秦漢之所能及要之皆晚周物耳髙八寸五分鈕髙二寸五分闊三寸二分兩舞相距五寸九分横四寸四分兩銑相距七寸二分横五寸四分枚三十六各長五分重十有二斤無銘髙七寸八分鈕髙二寸二分闊三寸五分兩舞相距五寸五分横四寸兩銑相距六寸五分横四寸七分枚三十六各長五分重九斤十有二兩無銘右二器按鐘之設鈕其制多矣而此乃飾以鳳蓋鸑鷟鳴於岐山而為興王之瑞則此鐘疑有所取象焉第一器髙六寸九分鈕髙一寸九分闊一寸二分兩舞相距四寸九分横二寸五分兩銑相距五寸四分横二寸九分枚三十六重五斤一十二兩無銘第二器髙六寸五分鈕髙一寸九分闊一寸三分兩舞相距五寸四分横二寸九分兩銑相距五寸六分横三寸一分重五斤四兩枚三十六無銘第三器髙六寸五分鈕髙一寸五分闊一寸二分兩舞相距四寸六分横二寸一分兩銑相距六寸横三寸重五斤三兩枚三十六無銘第四器髙八寸鈕髙二寸七分闊二寸一分兩舞相距六寸横二寸六分兩銑相距六寸五分横三寸三分重八斤七兩枚三十六無銘第五器髙六寸九分鈕髙一寸九分闊二寸五分兩舞相距五寸三分横三寸五分兩銑相距四寸四分横三寸三分枚三十六各長三分重五斤二兩無銘第六器髙九寸鈕髙二寸二分闊三寸四分兩舞相距五寸八分横五寸兩銑相距六寸八分横五寸枚三十六各長三分重四斤十有二兩無銘右六鐘枚景皆作旋螺設辟邪以為鈕蓋古人造鐘於旋幹之間著蹲熊蟠龍辟邪為飾是鈕也獨取於此古人寓意殆未可詳而製作與周官所載不同又無銘款以稽世次疑其為晚周物也凡鐘飾以辟邪皆漢物右髙四寸七分鈕髙一寸七分兩舞相距三寸六分横二寸七分兩銑相距三寸三分横二寸五分重三斤四兩無銘是鐘與前太簇鐘嘗出以命典樂劉詵扣大晟鐘以參驗之與大吕清聲適相合蓋六吕之鐘也今考其製作維聲及形清越而精緻枚甬又特與漢制不同類其華妙非近世所能為也髙一尺六寸五分鈕髙四寸七分闊一尺二寸兩舞相距一尺三寸四分横一尺一寸二分兩銑相距一尺五寸六分横一尺三寸五分枚三十六各長七分重五十四斤無銘髙七寸五分鈕髙一寸九分闊四寸九分兩舞相距五寸八分横四寸三分兩銑相距六寸七分横五寸枚三十六各長五分重七斤二兩無銘右古之鐘制旋蟲之上或以蹲熊蟠龍辟邪為飾至後世不設旋蟲獨以辟邪為鈕迨漢則俱有此體五鐘是矣篆枚又皆畫出兩銑微歛與古制殊不相類但鈕作辟邪有古人遺意爾髙六寸七分鈕髙二寸三分闊一寸三分兩舞相距四寸八分横三寸八分兩銑相距五寸五分横四寸二分枚三十六各長四分重四斤二兩無銘髙四寸六分鈕髙一寸八分闊一寸二分兩舞相距三寸二分横二寸五分兩銑相距三寸六分横二寸八分枚三十六各長三分重一斤十有五兩無銘右二器漢承秦後制作不醇於古莫能稽三代之意觀此二鐘徒用環為鈕而上無衡甬可知矣煎金模範尚皆精巧猶未失鳧氏之良其可尚已右髙七寸九分鈕髙二寸六分闊五寸兩舞相距五寸横四寸四分兩銑相距五寸七分横五寸枚三十六各長三分重五斤無銘是鐘無甬以兩螭為鈕而兩螭之首復相背其頚鬛間可以置纓索枚作旋螺之状鐘之兩靣一作黄目一作螭形蓋後世去古既逺先王之禮文殘此古人無甬之制或變而為龍不同又無銘欵以稽世次疑其為漢物也右髙九寸八分甬長四寸四分徑一寸七分兩舞相距七寸横四寸七分兩銑相距八寸横五寸九分重一十三斤三兩無銘是器甬中寔而飾以䕫紋鼓間為饕餮乳皆平作旋螺紋考諸鐘有銳乳者有旋乳者有乳之數或多寡者初竊疑焉及觀宋李照論樂以謂乳之設所以節其聲之有韻此即古人為乳之意後世浸失其傳故是鐘雖為乳之紋而無復如乳状者盖出於漢一時之製故名之曰平乳云髙一尺一寸六分甬長三寸六分徑一寸兩舞相距六寸五分横二寸六分兩銑相距八寸横二寸九分枚四十八各長三分重六斤有半無銘髙一尺二寸八分甬長四寸徑一寸二分兩舞相距七寸八分横二寸八分兩銑相距七寸八分横三寸一分枚三十六各長三分重六斤有半無銘髙一尺一寸九分甬長三寸五分徑九分兩舞相距七寸横二寸八分兩銑相距八寸一分横三寸六分枚三十六各長三分重五斤四兩無銘右三器甬虛中通篆帶鉦隧皆無致飾獨前一器枚四十有八嘗稽鐘制枚各有三以至於九合四九之數則為三十有六今又於九數中復加三焉合其數則為四十有八此盖隨其時世變易而為之者後三器枚各三十六不列於鉦之兩旁而特在其上鼓之兩邉别釬雙睛睅然如黄目與周鐘全不相類比漢器亦有所不逮其形制特匾而煎鍊模冶無甚工處方之與六朝物為近也重修宣和博古圖卷二十五
