body:
  text: 重修宣和博古圖卷十五斝觚斗巵觶角等總說斝一十六器周十五器子乙斝一銘二字子乙斝二銘二字父丁斝銘四字山斝盤夔斝雷紋斝一雷紋斝二饕餮斝風紋斝雲雷斝一雲雷斝二雲雷斝三雲雷斝四雲雷斝五虎斝漢一器虎斝觚三十五器商一十六器合孫祖丁觚銘四字子乙觚銘四字女乙觚一銘四字女乙觚二銘四字父乙觚銘三字木觚銘一字立戈觚銘二字奕車觚銘二字父庚觚銘二字父舟觚銘二字龍觚銘一字亞形觚銘二字孫觚銘一字四象觚夔龍觚一夔龍觚二周一十九器四山饕餮觚山紋觚山雷觚蟠夔觚饕餮觚四虺觚蟬紋觚雷紋四山觚雲雷觚雷紋觚一雷紋觚二雷紋觚三雷紋觚四雷紋觚五雷紋觚六雷紋觚七小圜觚一小圜觚二素觚總說夫告戒不生於理之有餘而起於言之不足大道之世天下為公何嘗切切於是迨夫禮義修於後世之偽法度立於至情之衰故創一器則必有名指一名則必有戒異代因襲不一而足自三王以來各名其一代之器至周則又復推廣然皆所以示丁寧告戒之意若曰斝曰觚曰斗曰巵曰觶曰角之類是也嘗讀詩至賔之初筵有曰賔既醉止載號載奴其終也至於由醉之言俾出童羖然後知酒之敗常有如此者敗常若是安得而不喧哉先王制斝所以戒其喧也又曰側弁之俄屢舞傞傞而繼之以醉而不出是謂伐徳然後知酒之敗徳有如此者敗徳若是安得而不孤哉先王制觚所以戒其孤也至於斗亦法度之所在昔人固有酌以大斗者若成王養老乞言而載於行葦之詩者也惟巵不見於禮經而莊周謂巵言日出者以其言猶巵之用有反復而無窮焉且玉巵上夀見於漢祖而樊將軍亦有巵酒之賜則知巵之為器其來尚矣若夫觶與角則以類相從故昔之禮學者謂諸觴其形惟一特於所實之數多少則名自是而判焉故三升則為觶四升則為角及其飲也尊者舉觶卑者舉角如是而已耳然禮失於古逺之後而尊爵飲器之類往往變而用木形製既陋而復加以髹漆内赤外黑彩繪華絢悉乖所傳是非莫得而考正殊不知三代範金以寓典法敻然不同及觀此器一出非徒足以取證其謬而亦悟先儒之可笑矣前一器髙一尺三寸九分深六寸二分口徑六寸五分容三升有半重六斤四兩兩柱三足有鋬銘二字後一器髙一尺三寸九分深六寸二分口徑六寸五分容三升有半重六斤四兩兩柱三足有鋬銘二字右二器形制悉同惟子乙字稍異前器乙向左後器乙向右當是同用之器若旅簋列鼎之類也三面皆作饕餮間以雷紋足間復狀以夔純緣之外作山形十有一真周物也子五等之爵乙蓋其氏在周有乙公徳者則乙恐其後裔耳右髙九寸九分深五寸二分口徑五寸七分容四升八合重七斤兩柱三足有鋬銘四字其一字未詳餘三字曰宁父丁宁其作器者之名也周封丁公伋於齊豈伋之子若孫有以宁為名者歟是器以鋬為牛首之形三足純素雖近於質然觀其製作實周物也右髙一尺深三寸八分口徑五寸五分容二升六合重三斤九兩兩柱三足有鋬無銘是器鋬足純素腹布山紋間以雲雷饕餮爵斝所以從尊昔有山尊而今有山斝宜是斝乃從於山尊之器也其象山之義蓋具於山尊矣攷其形制周器也右髙七寸三分深四寸口徑五寸容一升六合重二斤三兩兩柱三足有鋬無銘斝之屬大畧如爵差大而無流耳其兩柱植立在上而下有三足亦同焉腹足間作雷紋若饕餮不一等蓋設飾惟宜而已此盤夔亦其類也髙一尺一寸深五寸四分口徑六寸二分容三升五合重四斤十有一兩兩柱三足有鋬無銘髙七寸八分深三寸九分口徑五寸一分容一升重二斤十有一兩兩柱三足有鋬無銘右二器形模一律但大小差殊耳俱以雷紋為飾求之經傳惟周官言尊罍靁鼓而記禮者亦作雲雷之字其他未之見迨觀鼎彝之屬則致飾無所不用雷者斝之著雷自宜有之右髙八寸五分深四寸口徑四寸七分容一升一合重二斤一兩兩柱三足有鋬無銘兩柱三戈足素鋬三面為饕餮之形紋鏤簡古雖若不加精巧而後世極冶鑄之工不能到蓋禮文至周為盛而夏商之餘風未殄也右髙一尺一寸深四寸七分口徑九寸容二升一合重三斤一十兩兩柱三足有鋬無銘是器純緣鋬足並皆純素兩柱飾以盤雲腹上作饕餮形間以風紋狀欹斜偃草之勢大抵與周雲雷斝相似乃一物類耳第一器髙一尺二寸二分深五寸一分口徑七寸四分容四升有半重五斤十有二兩兩柱三足有鋬無銘第二器髙九寸四分深四寸六分口徑五寸容一升有半重二斤十有二兩兩柱三足有鋬無銘第三器髙九寸八分深四寸八分口徑五寸四分容二升一合重二斤五兩兩柱三足有鋬無銘第四器髙七寸八分深三寸三分口徑五寸一分容一升一合重一斤十有四兩兩柱三足有鋬無銘第五器髙六寸一分深三寸三分口徑四寸一分容一升三合重一斤十有一兩兩柱三足有鋬無銘右五器著象饕餮雜以雲雷而足皆作戈以示戒周詩言洗爵奠斝而王安石釋之以謂斝非禮之正則所以飲之無所不至此商曰斝而周兼四代之禮爵斝於是乎有辨然則於周亦謂之斝可也右髙一尺五寸六分深一尺三寸口徑七寸三分容六升重九斤兩柱三足有鋬無銘鋬端有虎首之狀三足若鬲而銳雷紋飾其兩柱三面著以饕餮昔周有虎彝本基於帝舜宗彝之象蓋武有力而重則威者君子有取於虎焉古之饗禮或有以昭其文或有以示其武況銘諸飲器哉右髙八寸四分深三寸五分口徑一寸四分容一升三合有半重二斤一兩三足有鋬有流無銘按此器鋬飾以虎亦周虎彝之遺意也然比之諸斝既無柱而揜其口復置以流與他器無可合者其形制特於斝為近故類於斝是必漢物也蓋漢儒不及見三代之器皆相宗以傳習之陋宜是器之去古逺矣右髙八寸五分深五寸六分口徑四寸八分容八合重一斤二兩銘四字兹器著形為兩孫而又曰祖丁者自名也子子孫孫詩人必取象於物所傳有無窮之意觚銘合孫猶是義皆存乎戒此器於當中屹起四稜以考其世書人飲惟祀徳將無醉飾以夔又加以饕餮無貪濁之患而知所毖矣右髙六寸八分深四寸八分口徑四寸二分容七合重一斤銘四字曰父丁子乙按商之君其號丁則有曰沃丁仲丁祖丁武丁庚丁太丁者其號乙則有曰祖乙小乙武乙獨曰乙者然而太丁之子曰乙則知父丁子乙者正謂此耳在昔彝器之銘有止言其父以明其子有止銘其子以昭其皇考者惟此器既言其父又言其子其銘特與他器不類蓋昔人不相沿襲自為一家之語然於義則未始不同焉其所以不同者特其或詳或略耳前一器髙八寸九分深六寸一分口徑四寸九分容六合重一斤六兩銘四字後一器髙九寸深六寸口徑四寸九分容六合重一斤八兩銘四字右二器製作相類乙者商之君號兹女者蓋女之作是器以享於考詩云誰其尸之有齊季女蓋女亦預祀事也帚者許慎曰箕帚也昔吕公息女願為髙祖箕帚之妾曲禮有曰納女於天子曰備百姓於國君曰備酒漿於大夫曰備掃灑鄭康成以謂酒漿掃灑婦人之職也古人之親固當報本反始以致孝享而於器用之間必著所職者蓋亦不忘父母之教而謹其所有事故也是器脰刻四山腹足間作散雲布為饕餮面目雲梢蟠細縷宛轉相間蓋從雲雷生氣所謂刻畫雲氣也與已舉爵文正同所以皆為飲器而足間有稜可握可拱者是臣拜君酢朝服而跪受酢俛身而飲仰而盡奠於地而復拜與圭笏闕用而禮容便具則一器之所該使聖人制噐之意可思過半故曰觚者法度之器也庸可忽哉韓非子曰禹作祭器而觴酌有綵其腰間有可綰繫處上為四蟲所謂小蟲為雕琢也右髙八寸九分深五寸七分口徑五寸一分容八合重一斤六兩銘三字按商紀言乙者有五而此曰父乙莫知其何乙也亞乃藏主廟室之形此器脰間純素不作四稜腹足飾以雲雷取象澤物製作之妙曷以加此右髙一尺一寸深七寸六分口徑五寸二分容八合重一斤九兩銘一字曰木昔之作詩者嘗借仁於樛木而王安石以木為仁類則木者仁也觚爵飲器而取象如此蓋嘗禘鄉射與夫燕饗之間未嘗不以仁為主耳右髙九寸深五寸八分口徑五寸二分容七合重一斤三兩銘二字曰甲者商君也蓋商有小甲河亶甲沃甲陽甲祖甲之五君耳又商人制器多為物象故著立戈以寓其戒觚之為器既以孤為義矣又復作戈以示焉信乎所謂無彝酒者也豈特此哉鼎也甗也皆以是為飾則知古人所欲作者不獨飲而已是觚也腹無四稜而款識髙古非商初之制無以及此右髙九寸九分深六寸六分口徑五寸二分容八合重一斤一十兩銘二字按此器觚也視其隠起雷紋與夫饕餮之飾實符商制其銘文一為奕古無以奕受氏者殆作器多著名於此其一則為輓車之形蓋車軼則致敗而酒之流足以敗徳疑是為卒飲之戒云右髙八寸四分深五寸二分口徑五寸一分容七合重一斤七兩銘二字按商紀有太庚南庚盤庚祖庚而此曰父庚者宜出於是商父庚爵款識頗與此同意皆商一時之制也許慎以謂庚位西方象秋時萬物庚庚有實今此字彷彿垂實之形故知先王取象命意各有攸當又商器銘文特簡略淳古其文一二言而足如此器是也右髙一尺深六寸八分口徑五寸四分容八合重一斤十有二兩銘二字曰父舟此觚也而謂之舟蓋水能載舟亦能覆舟觚飲器也酒能成禮亦能敗徳有舟之義焉是器足腹為饕餮夔虺之狀皆取鑄鼎象物之飾凡所以為飲器者之規焉右髙九寸深六寸四分口徑五寸容八合重一斤五兩銘一字作龍形龍善養人者也所養在下而能蟠蟄則能弱變化不測不可制蓄則能强然一至於亢則蹈於有悔之地觚飲器也飲所以養陽過則有亢之悔是器腹足兩面作饕餮狀間以雲雷皆所以著戒者也右髙一尺五分深六寸八分口徑五寸九分容八合重二斤五兩其銘作亞形而亞形内外二字僅如畫象不可辨昔崔準獲一商卣亦作此而中有足迹是觚之銘蓋此類也或以謂作圈若亞形者皆廟器也蓋亞形所以象廟室耳右髙一尺三分深七寸一分口徑五寸二分容一升重二斤銘一字曰孫而字形小異蓋商畫類取形似而偏旁不拘於上下左右而此銘孫者謂其為王父尸者也故有象於尸足腹兩面作重饕餮象鼻尾之間為四稜腹之上作虺腹之下作夔其上作山皆周以雷紋而蟲鏤頗與所得商饕餮觚竊相似蓋一時物也右髙一尺深七寸口徑五寸一分容八合重一斤九兩無銘是器觚也飾以山雷饕餮蟠虺之狀而腹之下復作四象形儀禮所謂象觚者其亦及見是制而有傳也前一器髙九寸八分深六寸六分口徑四寸六分容六合重一斤六兩無銘後一器髙一尺一寸深七寸六分口徑五寸三分容九合重一斤四兩無銘右二器皆著䕫龍布以雲雷而上下相間觀其鑄冶之工形制之古與商之木觚頗同疑出一時也右髙九寸九分深六寸七分口徑五寸四分容八合重一斤五兩無銘是器純緣之外拱以四山而兩面則為饕餮間以雷紋中又為四夔夫深山大澤實生龍蛇則是宜饕餮螭夔之所宅也今山觚而飾此者宜矣右髙七寸一分深四寸七分口徑四寸容四合重一十二兩有半無銘腹足遍以雷紋饕餮間飾脰設四山復錯雷篆是器比諸觚為最小然製作髙古頗有商人之遺法但文特加勝殆周初物耶右髙九寸九分深六寸八分口徑五寸二分容八合重一斤九兩無銘是器純之外作四山中分其體各為雷篆間以饕餮其稜四出足以上致飾尤繁縟乃周文盛時物也右髙一尺三分深七寸九分口徑四寸八分容一升二合重一斤十有一兩無銘腹間飾以兩面饕餮足間作相顧蟠夔之狀比他觚無稜郭豈非寓破觚為圜之意耶禮之不相沿襲蓋亦有所自矣右髙八寸六分深五寸六分口徑四寸八分容七合重一斤七兩無銘是器純緣不著文飾腹兩面有鼻為饕餮狀三代之器至食飲之具類設饕餮觚主飲故亦象此右髙一尺六分深七寸五分口徑五寸二分容八合重一斤十有五兩無銘四面皆飾虺形以雷紋間錯夫虺之求伸待雷而後動而雷之震驚必以其時觚飲器也其飲得不以時哉右髙九寸七分深六寸四分口徑五寸五分容一升重一斤十有四兩無銘通腹與足兩面為饕餮狀細錯雷紋足之上文以四蟬純之外飾以四山蓋蟬之為物捨汙􅐮而趨髙潔者也古人取象於物豈無義哉右髙八寸五分深五寸七分口徑四寸七分容七合重一斤四兩有半無銘腹足之上作雙夔狀而雷紋間錯純之外飾以山形而下鏤以雷觀其取象於雷者足以示戒右髙九寸三分深六寸三分口徑四寸八分容八合重一斤一十兩無銘觚之為飾類作山形間之饕餮雲雷之象蓋觚為飲器而取象制義皆存乎戒此器雖無銘款以考其世代而比商器則文繁縟故知為周物也第一器髙八寸五分深五寸九分口徑四寸四分容八合重一斤無銘第二器髙八寸四分深五寸五分口徑五寸二分容一升重一斤五兩有半無銘第三器髙一尺深六寸八分口徑五寸二分容八合重一斤九兩無銘第四器髙九寸一分深六寸六分口徑五寸四分容一升二合重二斤五兩無銘第五器髙一尺深六寸六分口徑五寸五分容八合重一斤十有三兩無銘第六器髙八寸二分深五寸四分口徑四寸七分容八合重一斤六兩無銘第七器髙七寸八分深五寸口徑四寸四分容七合重一斤九兩無銘右七器皆以雷紋饕餮為飾所異者第三器腹足之間作四夔腹之上作四山周以雷紋第五器腹足隠起饕餮純外有四山下為虺形觚之為器戒心已黙寓其名而又類為饕餮夔虺者是欲懲其貪婪而將之以徳也髙六寸深四寸三分口徑四寸容六合重一斤一兩無銘髙五寸五分深四寸五分口徑四寸一分容八合重十有三兩無銘右二器形制似觚而四隅無稜腹著饕餮惟後一器設飾少異方之諸觚而類皆短小亦可愛也右髙六寸五分深四寸二分口徑四寸容六合重一十三兩有半無銘凡觚之形必為觚稜狀或飾以山形以至作黄目雷紋種種之異然是器則自純緣而下通體皆純素足間兩旁又有竅略相通貫莫知其何所用也重修宣和博古圖卷十五
