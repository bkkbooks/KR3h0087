body:
  text: 重修宣和博古圖卷二十四鐘三三十一器周雷紋鐘一雷紋鐘二旋紋鐘細雷紋鐘山紋鐘實甬鐘一實甬鐘二實甬鐘三實甬鐘四實甬鐘五盤紆鐘一面篆帶鐘對螭山甬鐘百乳鐘盤雲鐘隧鐘山鐘一山鐘二山鐘三山鐘四山鐘五山鐘六小編鐘一小編鐘二小編鐘三小編鐘四小編鐘五小編鐘六小編鐘七小編鐘八小編鐘九前一器髙九寸六分甬長六寸徑一寸八分兩舞相距七寸一分横四寸兩銑相距九寸横七寸一分枚三十六各長七分重二十六斤十有二兩無銘後一器髙八寸一分甬長四寸七分徑一寸五分兩舞相距六寸横五寸二分兩銑相距七寸二分横六寸枚三十六各長五分重一十三斤有半無銘右二器甬皆中空前一器甬于枚鉦間遍錯雷電之紋後一器旋上隠起雷篆篆帶之間復作花紋於舞銑則純素蓋變古未遠殆是周末器耳右髙八寸七分甬長四寸徑一寸九分兩舞相距六寸七分横四寸五分兩銑相距八寸一分横五寸一分枚三十六各長六分重一十八斤十有一兩無銘是器製作純質而三十六枚各作螺紋旋轉之狀夫作樂之聲貴夫回旋不迫則聲之所以流暢也若乃噍以殺則知其為哀粗以厲則知其為怒是豈回旋不迫之義耶蓋音聲之道與政通而昔人於制器尚象者如此若夫量其小大則非鎛與編鐘之類其特鐘歟但潛秘深壤為日已久叩之嘶鬱無從考其所中者何聲耳右髙五寸三分鈕髙一寸一分闊九分兩舞相距三寸三分横二寸五分兩銑相距四寸横五寸枚三十六各長一分重二斤十有一兩無銘枚作螺紋狀間以蟠螭頂間又為對立純以雷紋飾其鈕考古之鼎彞多著雷紋間錯獨於樂而不然蓋鼓鐘之音所以祀天地享鬼神交賔客錫有功非是數者而淫於樂而為流連之過焉豈不如雷之有害耶又況雷有回旋之義凡樂還相為宫以順四時之氣則亦寓諸回旋之意也隋文帝作樂而惟主黄鍾一鈞世名知樂者莫不非之事不師古則失其深㫖奚可哉右髙九寸二分甬長五寸兩舞相距六寸五分横四寸八分兩銑相距八寸横六寸枚三十六各長六分重二十斤無銘是鐘枚與鼓間飾以隠起山紋而於彞器中飾山者不一有曰山尊有曰山紋觚皆取夫安靜之義鐘扣之小則小鳴扣之大則大鳴體則靜也山亦如之動而出則氣物所自生靜而入則氣物所自藏是以古人之制器其意蓋以類求焉第一器髙九寸甬長三寸八分徑一寸一分兩舞相距五寸五分横四寸四分兩銑相距七寸三分横五寸五分枚三十六各長五分重九斤有半無銘第二器髙六寸甬長三寸徑七分兩舞相距四寸七分横三寸九分兩銑相距五寸一分横三寸九分枚三十六各長四分重四斤有半無銘第三器髙四寸八分甬長二寸二分徑八分兩舞相距三寸五分横二寸七分兩銑相距四寸横二寸九分枚三十六各長三分重三斤二兩無銘第四器髙四寸三分甬長二寸二分徑七分兩舞相距三寸五分横二寸七分兩銑相距三寸九分横二寸九分枚三十六各長三分重三斤一兩無銘第五器髙四寸一分甬長二寸徑六分兩舞相距三寸五分横二寸一分兩銑相距四寸横二寸六分枚三十六各長三分重二斤七兩無銘右五器雖設甬然實而不虚其篆帶枚又皆畫出與它鐘特異大槩與漢辟邪鐘相類云右髙一尺一寸二分甬長四寸六分徑一寸六分有旋兩舞相距六寸六分横四寸三分兩銑相距八寸横六寸六分枚三十六各長七分重十有二斤四兩無銘是器鼓篆間皆飾以螭紋作紆帶盤旋之狀至於鉦舞則皆純素無紋其甬為三節而旋蟲以螭首為之三節之上復有髙下雲氣故與它器小異耳右髙八寸三分甬長四寸一分徑八分有旋兩舞相距五寸横三寸八分兩銑相距五寸七分横四寸枚三十六各長一寸重七斤六兩無銘是鐘枚間飾以篆帶而旋上與鼓間亦作盤結紋其乳則鋭舞銑俱純素然惟飾一面大體與一面雷紋鐘相類耳右髙七寸五分甬長三寸六分徑一寸一分有旋兩舞相距四寸五分横三寸三分兩銑相距五寸三分横四寸枚三十六各長九分重七斤四兩無銘周衰之後制作損益故鐘甬無復舊制或作蹲熊及蟠龍辟邪之狀至漢設飾尤異此鐘周器也甬上作山形兩面出四峰鼓鉦之間有螭紋其形相對故以對螭山甬名之觀其紋鏤粗略又特飾一面其一面枚之外無所飾雖周之物疑作者不相沿襲以致此焉右髙九寸四分甬長四寸九分徑一寸四分有旋兩舞相距八寸二分横五寸二分枚三十六各長八分重一十七斤十有二兩無銘是器枚景之外飾以百乳故與它器稍異且乳所以養人而樂亦養人語曰樂云樂云鐘鼓云乎哉則樂之道雖不在於鐘鼓而樂之作自鐘鼓始也是以禮天地諧人神育萬物莫不本於此則其為養孰大焉昔人取象立法固必有垂世之規兹器是也右髙一尺一寸一分甬長五寸六分徑二寸兩舞相距九寸四分横六寸一分兩銑相距一尺八分横七寸七分枚三十六各長七分重四十二斤有半無銘作盤雲之飾夫雲之為物所以善利萬物者也然既霑既足而或過焉則亦或為害樂之作也似之茍非其時是亦為荒亡流連之害耳右髙八寸八分甬長四寸二分徑一寸二分兩舞相距五寸七分横四寸一分兩銑相距五寸横三寸九分枚三十六各長五分重十有一斤六兩無銘是鐘於鼓間隱起而中微窊則周官鳧氏所謂隧歟蓋墜在鼓之中于之上所擊之處窊而生光有似夫隧然一謂之攠者攠弊也凡物擊之則弊耳第一器髙一尺一寸二分甬長三寸八分徑九分有旋兩舞相距五寸四分横三寸五分兩銑相距七寸八分横四寸六分枚三十六各長一寸一分重九斤有半無銘第二器髙九寸八分甬長三寸六分徑九分有旋兩舞相距五寸一分横三寸六分兩銑相距五寸三分横四寸三分枚三十六各長七分重七斤無銘第三器髙八寸六分甬長三寸徑八分有旋兩舞相距四寸三分横三寸一分兩銑相距五寸五分横三寸五分枚三十六各長七分重五斤四兩無銘第四器髙七寸六分甬長三寸一分徑七分兩舞相距四寸一分横二寸八分兩銑相距五寸横三寸四分枚三十六各長七分重四斤一兩無銘第五器髙七寸一分甬長二寸五分徑七分兩舞相距三寸七分横二寸三分兩銑相距四寸三分横三寸枚二十四各長七分重三斤一十兩無銘第六器髙七分甬長二寸七分徑七分兩舞相距三寸八分横二寸四分兩銑相距四寸五分横三寸枚二十四各長六分重三斤一兩無銘右六器並於鼓間各作山形起伏其上如篆帶狀且考諸鐘之枚或以三三為數或以兩兩為數或以三四為數以兩兩為數者今第五器與第六器是也以三四為數者六朝匾鐘是也蓋三三者數之竒兩兩者數之耦取其奇者樂由陽來陽奇故也用數之耦者耦屬隂而鐘隂屬也凡彞器多以山為飾若山尊山爵山觚山斝蓋各有意義而此六鐘皆以山飾之者山以象仁而樂者可以通人神阜萬物不其仁之至乎第一器髙七寸四分鈕髙二寸一分闊一寸四分兩舞相距四寸三分横三寸一分兩銑相距五寸三分横四寸二分枚三十六各長三分重五斤有半無銘第二器髙七寸四分鈕髙二寸闊一寸四分兩舞相距四寸三分横三寸兩銑相距五寸四分横四寸二分枚三十六各長三分重五斤四兩無銘第三器髙七寸鈕髙二寸一分闊一寸兩舞相距四寸一分横二寸九分兩銑相距五寸横三寸六分枚三十六各長三分重四斤十有二兩無銘第四器髙六寸八分鈕髙二寸闊一寸五分兩舞相距四寸一分横三寸兩銑相距五寸横三寸六分枚三十六各長三分重四斤一兩無銘第五器髙六寸二分鈕髙一寸九分闊一寸九分兩舞相距三寸八分横三寸一分兩銑相距四寸七分横二寸七分枚三十六各長三分重三斤十有二兩無銘第六器髙五寸九分鈕髙一寸九分闊一寸一分兩舞相距四寸三分横三寸五分兩銑相距四寸四分横四寸三分枚三十六各長一分重一斤十有五兩無銘第七器髙四寸六分鈕髙一寸五分闊一寸二分兩舞相距三寸六分横二寸九分兩銑相距三寸五分横一寸九分枚三十六各長二分重一斤十有五兩無銘第八器髙四寸六分鈕髙一寸五分闊一寸二分兩舞相距二寸八分横一寸九分兩銑相距三寸横二寸四分枚三十六各長二分重二斤一兩無銘第九器髙三寸七分鈕髙一寸三分闊一寸一分兩舞相距二寸四分横二寸兩銑相距二寸八分横一寸八分枚三十六各長二分重一斤五兩無銘右嘗考律吕之制自黄鍾九寸等而下之至應鍾四寸七分用以合隂陽之數至於為鐘小大增益悉考於律故聲皆協應而不乖此鐘數雖未備然其形制髙下遞殺以小蓋亦取於律也彼禮圖編鐘類皆一等未嘗參差如此蓋以厚薄取聲而不知先王以律為本惜乎甬變而為環紐枚景變而為旋螺稽之周官制度故已小異蓋其文飾氣韻與許子鐘頗相類殆晩周之物而文益勝耳重修宣和博古圖卷二十四
