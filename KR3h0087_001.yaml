body:
  text: 重修宣和博古圖卷一鼎鼒總説鼎一二十六器商父乙鼎銘三十字瞿父鼎銘二字子鼎銘一字庚鼎銘一字癸鼎銘一字乙毛鼎銘二字召夫鼎銘八字亞虎父丁鼎銘四字册命鼎銘一十一字父巳鼎銘三字持刀父巳鼎銘三字父癸鼎一銘四字父癸鼎二銘三字蠆鼎銘一字秉仲鼎銘四字素腹寶鼎銘五字若癸鼎銘八字象形叨餮鼎銘二字魚鼎銘三字伯申鼎銘五字立戈鼎銘一字立戈父甲鼎銘三字橫戈父癸鼎銘四字綦鼎銘二字象形鼎銘一字公非鼎銘一字總説周易六十四卦莫不有象而獨於鼎言象者聖人蓋有以見天下之賾而擬諸形容象其物宜是故謂之象至于近取諸身逺取諸物仰以觀於天俯以察於地擬而象之百物咸備以通神明之德以類萬物之情故圜以象乎陽方以象乎陰三足以象三公四足以象四輔黃耳以象才之中金鉉以象才之斷象叨餮以戒其貪象蜼形以寓其智作雲雷以象澤物之功著夔龍以象不測之變至於牛鼎羊鼎豕鼎又各取其象而飾焉則鼎之為器衆體具矣不特以木巽火得養人之象而已故聖人惟以鼎為象然鼎大者謂之鼐圜弇上謂之鼒附耳外謂之釴曰崇曰貫則名其國也曰讒曰刑則著其事也曰牢曰陪則設之異也曰神曰寶則重之極也士以鐵大夫以銅諸侯以白金天子以黃金飾之辨也天子九諸侯七大夫五士三數之别也牛羊豕魚臘腸胃膚鮮魚鮮臘用之殊也然歷代之鼎形制不一有腹著叨餮而間以雷紋者父乙鼎父癸鼎之類是也有錬色如金著飾簡美者辛鼎癸鼎之類是也有緣飾旋花竒古可愛者象形鼎橫戈父癸鼎之類是也有密布花雲或作雲雷迅疾之狀者晉薑鼎雲雷鼎之類是也有隱起叨餮間以夔龍或作細乳者亞虎父丁鼎文王鼎王伯鼎之類是也或如孟鼎之侈口中鼎之無文伯碩史頙鼎之至大金銀錯鼒之絶小或自方如簠或分底如鬲或設蓋如敦有大小不同而制作一體有款識雖異而形制不殊或造於一時或沿於異代按而求之若辨黑白大抵古人用意皆有規模豈特為觀美哉若乃款識名氏雖曰夏商從高陽之質以名為號配以十干而加之以父然齊有丁公乙公癸公幽公之弟曰乙齊悼之子曰壬則十干之配未必皆夏商也周大夫有嘉父宋大夫有孔父齊頃之臣有丑父召公之後有父乙則加之以父未必皆夏商也至於形之圜者如父癸季妘形之方者如文王單景其銘乃曰作尊彝作從彝何也蓋先王之時作竒技竒器者罪不容誅用器不中度者不鬻於市戒在於作為淫巧以法度為繩約要使其器可尊其度可法而後已是以沈子作盉而銘曰寶尊孟金父作敦而銘曰尊敦父己作彝而銘曰尊彝虢叔作鬲而銘曰尊鬲則於鼎曰尊者為其器可尊耳非六尊之尊也鴈婦作鬲而銘之曰彝父辛作卣而銘亦曰彝伯所作者舟也鬲也甗也皆以彝銘之單所作者舟也彝也盉也亦皆以彝銘之則於鼎曰彝者為其度可法耳非六彝之彝也故左丘明外傳稱法度之器曰彝器邢昺疏爾雅亦謂彝為法則尊彝者禮器之總名猶戈矛劍戟其用不同而總謂之兵匏土革木其音不一而總謂之樂爾然則器非尊彝而以尊彝為銘者又不可不辨也夫牛首之鑄泗水之亡雖不復見然歷代所寶為時而出者莫知其極惟考核制作參稽字畫推原而審訂之則物象之多名氏所疑與夫無款識者將大判於今日矣右髙七寸耳髙一寸二分闊一寸四分深三寸口徑五寸六分腹徑六寸容二升六合重三斤十兩三足銘三十字按友史者太史也曰友者如成王稱太史友之類所以尊之也古者太史順時覛土蓋農官耳説文曰房星為辰田候也今曰辰見則農當舉趾故命以北田四品所以授民時也昔者貨貝而寶龜曰錫賴貝者説文以賴為贏言錫貝之多也此商人作之以享父乙於寢廟而言乃及此者蓋寢廟宗廟也書曰用命賞于祖在宗廟之中作册以錫有功是亦賞于祖之意乙之號其在商也有天乙有祖乙有小乙有武乙而惟太丁之子止曰乙且此言父乙蓋不知其為何乙也右髙五寸二分耳髙一寸濶一寸二分深三寸二分口徑五寸腹徑五寸二分容二升二合重二斤十有四兩三足銘二字曰瞿父商器以父銘者多矣瞿則莫詳其為誰然瞿作兩目與商瞿祖丁卣之兩目相似固未易以名氏考也是器耳足純素無紋純緣之外作雷紋叨餮歷年滋多如碧玉色宜為商器也右髙四寸六分耳髙一寸濶一寸一分深二寸八分口徑三寸八分腹徑五寸二分容一升二合重一斤十有二兩三足銘一字曰子一説商子姓故凡商之彝器其以子銘之者為多一説銘之子者以傳子子孫孫之義是器字畫簡古必周以前物三面為叨餮狀足作垂花而古色凝緑在商器中稍加文蓋其盛時物也髙五寸六分耳髙一寸濶一寸二分深三寸五分口徑五寸三分腹徑五寸八分容二升四合重二斤十有三兩三足銘一字髙七寸八分耳髙一寸濶一寸八分深四寸九分口徑七寸六分腹徑八寸二分容八升重九斤十有二兩三足銘一字右二器其一以庚名之許慎云庚者秋時萬物庚庚有實故其字作垂實之象焉其一則為癸而癸之字今從四屮此癸則一屮三包蓋癸與丑相次物至是有紐結而未通達之象蓋萬物之出也草昧而已草者至巽而齊昧者至離而明癸正北方而冬也故一屮河圖洛書三代傳寶而夏商為近故書畫之法未分至篆法既立乃本其意而四屮焉自漢揚雄許慎博羣書窮訓詁而智不及知無此鼎則造書之精義奧旨孰得而窺之銅色燦然若金紋作龍虎班固詩曰洛修貢兮川效珍吐金景兮歊浮雲寶鼎現兮色紛縕煥其炳兮被龍文今眼角鬛尾龍事略具象物之法雅而不迫蓋如此然商有盤庚祖庚祿父庚此鼎之作不知何庚也癸則湯之父主癸也按陶隱居刀劍録云夏孔甲采牛首山鐵鑄一劍銘曰甲則一字之銘通乎夏商要非周物也右髙五寸五分耳髙一寸二分濶一寸三分深三寸六分口徑五寸二分腹徑五寸五分容二升二合重三斤七兩三足銘二字曰毛者言薦饗之物凡澗溪沼沚之毛蘋蘩藴藻之菜蓋亦無所不用故昔人謂五蔬不熟曰饉則蔬於飲食間所不可後是鼎蓋芼羮之用於是以毛目之曰乙者商之有天乙祖乙小乙武乙太丁之子乙今銘乙則太丁之子然腹有蟬紋脰飾叨餮間之雲雷亦以貪者懲也然則昔人逺取諸物良有旨哉右髙五寸九分耳髙一寸二分濶一寸深三寸二分口徑長五寸一分濶三寸九分腹徑長五寸濶三寸八分容二升三合重四斤十有二兩四足銘八字內一字不可辨召夫於經傳無所考商册命鼎亦著此銘殆一時所作然校其款識無室字而作亞形內著召夫是亦廟器也右髙六寸四分耳髙一寸二分濶一寸二分深三寸三分口徑長五寸五分濶四寸一分腹徑長五寸六分濶四寸二分容二升有半重五斤九兩四足銘四字亞形內著虎象凡如此者皆為亞室而亞室者廟室也廟之有室如左氏所謂宗祏而杜預以謂宗廟中藏主石室者是也父丁商號也飾之虎所以取其義如司尊彝用虎彝以為追享之器蓋亦見其義之至耳商以此銘鼎至周監二代而損益之以致詳辨故獨有取於彝云右髙七寸耳髙一寸五分濶一寸三分深三寸二分口徑長五寸一分濶三寸八分腹徑長五寸二分濶四寸九分容二升三合重四斤一兩四足銘一十一字昔周穆王命畢公而曰作册畢則册命者為册書以命之也亞形內召夫二字而繼之以室則為廟器也抑又明矣右髙五寸七分耳髙一寸一分濶一寸三分深三寸口徑五寸腹徑五寸二分容二升二合重三斤一兩三足銘三字一字作禾形二字曰父己後世傳習之謬而以斝彝畫禾稼其上雖一時俗學之陋固亦有自來矣父己商已也今所收父己彝而一字持戟形大抵商器類取諸物以為形似蓋書法未備而篆籀未分也是器耳足純素三面為叨餮而間之雷紋文鏤與父己彝近似之其一代物也右髙五寸一分耳髙一寸二分濶一寸四分深三寸三分口徑五寸腹徑五寸五分容二升五合重二斤六兩三足銘三字按三代之間惟商為尊神凡於祭祀必致其盡故於鼎間作子象以持刀非特鼎也尊之與卣悉著此焉蓋供子職者不如是不足以見其竭力從事之意是以先王之事親於羞嚌則執鸞刀入舞則執干戚至於藉田則秉耒焉必躬必親每每如此又况尊神之世乎迹其商世曰父己者雍已也凡鼎彝用享其父則必識以其子繼雍已者乃其弟太戊則所謂子果誰耶豈非繼其後者乃為之子耶髙五寸五分耳髙一寸三分濶一寸五分深三寸四分口徑四寸四分腹徑四寸八分容一升九合重二斤三兩三足銘四字髙五寸九分耳髙一寸四分濶一寸五分深三寸四分口徑四寸八分腹徑五寸六分容二升三合重五斤十有二兩銘三字右二器皆曰父癸第一器曰孫旁作兕形昔人嘗取兕角以為觥曰兕觥郭璞有山海圖贊曰皮充武備角助文德古人取於兕者如此又皆作持弓狀蓋九射之禮必寓之以射而弧矢者男子之事鼎之設飾豈無意乎苐二器作立戈狀蓋商有所謂父癸尊者作立戈有所謂父癸鼎者作橫戈有所謂父癸卣者作執戈器之畫戈為所取小之義此類銘戈形出一時之制也右髙九寸六分耳髙二寸濶一寸六分深六寸三分口徑八寸六分腹徑八寸七分容一斗四升一合重十有四斤二兩三足銘一字作蠆形考其蠆字取其形象至後世小篆亦作而注謂象形則為古蠆字無疑蓋姬周而上銘識簡古如魚敦叨餮鼎皆商器也悉取物以為篆今蠆亦如之蠆雖微物而善毒人亦君子之所思患而豫防之故其銘之鼎宜焉又蠆疑為人名若周恭王十三年鄭獻公蠆立又如公孫蠆之類則鼎之識殆亦商人之名也右髙六寸一分耳髙一寸濶一寸二分深三寸六分口徑五寸三分腹徑五寸六分容二升六合重四斤有半三足銘四字按王安石字説秉作從又從禾此上一字作以象禾以為又乃秉字也秉仲者索諸書傳訖無可考以其器之精錬渾厚知為商物耳右髙五寸三分耳髙一寸濶一寸二分深三寸三分口徑四寸九分腹徑五寸三分容二升有半重三斤九兩三足銘五字上一字未詳四字曰作尊寶彝此制度乃鼎而謂之彝蓋商器類以彝銘之蓋彝以言其法非六彝之謂彝是器耳為綯狀腹足無紋渾厚純質斷商器也右髙五寸八分耳髙一寸一分濶一寸三分深三寸二分口徑四寸九分腹徑五寸二分容二升二合重三斤二兩三足銘八字於亞形中上作一若字銘其作器之人也旁作旗斾之勢于左旌其位也又作兩手互執物狀于右以著薦獻之象而且昭其獲助也四隅作癸丁甲乙雜然陳布紀其日也中作父字明子職也蓋九旗名物皆以於於太常則至尊有之至於諸侯則建旗軍吏則建旗孤卿則建旜中大夫則建旟下大夫則建旐道車則建旞斿車則建旌而士預焉故旗斾所以旌其位者如此古之制字於與作以兩手交相舉明非一力也經曰四海之內各以其職來祭夫聖人之德又何以加於孝乎詩亦云駿奔走在廟不顯不承無射於人斯則得多助者所以為孝也故兩手互執物所以著薦獻之象而昭其獲助者如此天有十日地有十二辰各以其類而為配合在商言其略故凡彝器止言其日若商敦言己丁與此鼎言癸丁甲乙者止以十日也在周言其詳故凡彝器復兼言其辰若周尊言丁丑周彝言己酉者又兼其辰也昔者內事用柔日所以順其陰之入外事用剛日所以順其陽之出婚姻內祭皆內事故用柔日師田外祭皆外事故用剛日然則是器言甲者剛日也言癸丁乙者柔日也此所謂紀其日歟今所藏器有言祖有言父有言兄下以享於上也有言子有言孫子孫之所自致也此又所謂言父者所以明子職歟然其形制比商器復加文縟三足皆作叨餮氣韻頗古真商盛時器也右髙五寸七分耳髙一寸七分濶一寸五分深三寸四分口徑五寸五分腹徑五寸四分容二升三合重三斤九兩三足銘一字按此鼎款識純古髣佛叨餮之形後人觀象立名故取為號至周監二代文物大備凡為鼎者悉以此為飾遂使吕氏春秋獨謂周鼎著叨餮而不知其原實啓於古也按春秋宣公三年王孫滿對楚子問鼎之語曰昔夏之方有德也逺方圖物貢金九牧鑄鼎象物故民入川澤山林不逢不若魑魅魍魎莫能逢之則商之為法亦基於夏而已周實繼商故亦有之耳昔人即器以寓意即意以見禮即禮以示戒者如此右髙五寸五分耳髙一寸濶一寸四分深三寸三分口徑五寸二分腹徑五寸容二升三合重三斤一十兩銘三字月魚基且古者祭祀之名不一祭天於圜丘祭地於方澤祭日於王宫祭月於夜明祭星於幽禜各以其類求之則於薦獻之物豈非亦以其時耶故周有月星尊日星甗者是各以其類而為之器是鼎銘以月繼之以魚者豈祭祀之器既以其類又求其類於物爾如詩所謂季冬薦魚春獻鮪者以其時為薦獻也基者無所經見惟説文以為薦物之兀蓋象形也右髙五寸四分耳髙一寸濶一寸三分深三寸二分口徑五寸腹徑五寸七分容三升重三斤二兩三足銘五字曰伯申者於傳無見蓋不可得而考矣然是器有可得而論者凡鼎彞之屬莫不有文或飾以雷篆雲紋或錯以夔龍蟠螭之類而此獨通體純素製作朴古意商尚質其商人之為乎髙五寸五分耳髙一寸二分濶一寸深三寸七分口徑四寸八分腹徑五寸容二升四合重二斤十有四兩三足銘一字髙六寸六分耳髙一寸四分濶一寸二分深三寸口徑四寸九分腹徑五寸七分容二升四合重四斤七兩三足銘三字禹後之戈氏也蓋商人作器多著此象故於爵有立戈爵於甗有立戈甗於尊則有立戈癸尊於卣則有執戈父癸卣然則飾以戈者皆商物也王安石字説謂戈戟者刺之兵至於用戈為取小矣其取為小故當節飲食其用在刺故必戒有害雖然戈所以敵物而勝之故我之字從戈者敵物之我也非有勝物之智則不能敵物非有立我之智則至於失我古人託意兹亦深矣雖然議者謂春秋間徐子會齊侯其所賂之鼎有曰甲父者遂指父甲以為甲父是大不然夫杜氏以甲父為古國名故髙平昌邑之東南有亭亦曰甲父亭若乃父甲則商子孫追享其父者故加父於上以顯尊神之意儻以為甲父則是以國名變商號矣遷就傅會之説不可不察也右髙六寸六分耳髙一寸三分濶一寸四分深四寸四分口徑五寸九分腹徑六寸七分容四升七合重四斤六兩三足銘三字純外隱起雲雷狀按父乙商也而周有召公尊其銘亦曰父乙此豈周器乎曰不然召公尊者周王用以褒大召公之子孫而乙者其名也父者所以尊稱之也如康王命畢公而曰父師平王命文侯而曰父義和蓋示有所尊耳豈此所謂父乙者哉况周人作銘文字已備此鼎近質而字畫竒古非商器而何曰綦者按列禦寇嘗言綦衛之箭而音釋者以綦為其且援史記綦國之竹為證則綦國名也歷考商書雖不聞有國之為綦者然歸亳之際諸侯所會者至於三千安知其無綦耶大抵為史者非因事以見之則亦不能備載矣右髙六寸九分耳髙一寸六分濶一寸五分深四寸一分口徑五寸八分腹徑六寸四分容四升重三斤六兩三足銘一字製作精純與商辛鼎無異凡鼎之銘有曰尊鼎有曰尊彝而此獨以為志者考諸鼎字於雍公緘鼎作於大夫始鼎作於得鼎作字畫變易無常而漢鼎又作其下體頗與此近深意其為鼎字且鼎字上以二一而之下從析木一陰一陽之謂道鼎者器也而道寓焉一則成象一則效法故以二一以木巽火烹飪也故從析木此鼎其文雖異而下皆左右戾有析木之意深得古書之體著此銘者古人所以正名也以易考之革去故鼎取新又見其新新不窮之義右髙五寸八分耳髙一寸五分濶一寸三分深三寸口徑五寸腹徑五寸六分容二升二合重二斤十有五兩三足銘一字曰非者蓋作器人之名氏也其形制則類立戈父甲鼎實惟商器按史記有非子為周孝王主馬者其去商逺甚為不侔惟公劉五世孫公非者考其時正與祖甲相近則當為公非矣重修宣和博古圖卷一
