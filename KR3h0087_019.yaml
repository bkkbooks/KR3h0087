body:
  text: 重修宣和博古圖卷十九鬲鍑揔説鬲一十六器商二器毋乙鬲銘五字雷紋叨餮鬲周一十四器蔑敖鬲銘一十一字伯鬲銘四字帛女鬲銘五字師鬲銘五字仲父鬲銘一十六字慧季鬲銘三字丁父鬲銘三字京薑鬲銘一十一字戈足鬲直紋鬲叨餮鬲一叨餮鬲二叨餮貫珠鬲素鬲鍑二器周一器獸耳鍑漢一器獸耳鍑盉揔説盉一十四器商二器阜父丁盉銘六字執戈父癸盉銘三字周一十器單從盉銘九字嘉仲盉銘一十九字龍首盉雲雷盉三螭盉蛟螭盉麟盉螭虬盉粟紋盉細紋熊足盉漢二器鳯盉螭首虬紋盉鬲鍑揔説周官三百六十各有司存陶人之職所司之物而鬲居其一夫鬲與鼎致用則同然祀天地禮鬼神交賓客修異饌必以鼎至於常飪則以鬲是以語夫食之盛則必曰鼎盛語夫事之革則必曰鼎新而鬲則特言其器而無義焉亦猶簠所盛者稻粱簋所盛者黍稷而已故王安石以鼎鬲之字為一類釋之以謂鼎取其鼎盛而鬲言其常飪其名稱其字畫莫不有也今考其器信然且爾雅以鼎款足者謂之鬲而博雅復以䰙鏤鬲鍑鬹􅀢皆為釜則鬲鼎屬又釜類也然而五方之民言語不通則名亦隨異故北燕朝鮮之間謂之錪或謂之鉼江淮陳楚之間謂之錡或謂之鏤惟吳揚之間乃謂之鬲名稱雖異其實一也漢志謂空足曰鬲以象三德蓋自腹所容通於三足其製取夫爨火則氣由是而易以通也若鍑之為器則資以熟物而許慎謂似釡而大口蓋是器特適時所用非以載禮今考其所存則鎔範以成者似異乎許氏之説豈非不必拘於形製徒取諸適用而然乎右髙四寸七分深二寸九分口徑四寸二分容一升六合重一斤十有二兩兩耳三足銘作亞形中孫執戟字曰毋乙按天有十日以甲乙第其次商自報丁以來始以是為號至于天乙是為成湯由成湯傳二十八王至于帝辛未有不以是為稱者其間有祖乙小乙武乙帝乙則毋乙者疑為乙稱之后而後世子孫名之也商祖于契契之生實自有娀氏之女而詩於長發嘗及之則知具母道者皆得廟食也故周繼商之後亦有薑嫄之廟而後世又以為禖神焉然則商毋乙鬲豈非用於宗廟之器耶右髙九寸深五寸九分口徑八寸容一斗一升重一十斤二兩兩耳三足無銘是器鬲也與它器無小異但所受稍大三股各作一叨餮形下齧其足叨餮之間錯以雷紋純緣而下復環以夔三分其體而分之以鼻左右從橫視之皆成獸形考諸商器類多似此右髙五寸七分深三寸二分口徑四寸五分容一升九合重二斤八兩兩耳三足銘十有一字所可辨者九字而已敖上髣佛若蔑字按楚之君有霄敖若敖杜敖郟敖而其名官亦曰莫敖所謂蔑敖殆出於斯耶楚周諸侯國故其器作周之形制曰光康者古人銘意蓋未可以臆論也右髙四寸八分深三寸口徑四寸二分容三升六合重一斤十有五兩兩耳三足銘四字按寶器以伯為銘者多矣尊敦彞舟爵皆有伯作之銘觀古人或以伯為諡或以伯為名或以伯仲第其序或以侯伯列其爵所稱非一而此曰伯者殆未可以私智決也右髙四寸深二寸四分口徑四寸容一升六合重二斤一兩銘五字曰帛女作齊鬲帛女疑宮女之有職者然考周官自九嬪世婦之餘所可見者司服縫人而已初無此名也豈非自周之東典禮不存因其職而命之歟不然則諸侯不敢擬於天子而有是職歟漢廣川王以陶望卿主繒帛疑亦祖述周人之意其曰作齊鬲蓋於祭祀之齊而所用之器也右髙三寸一分深二寸二分口徑三寸五分容一升重一斤十有一兩三足銘五字曰師作寶鬲內一字未詳昔者以師稱其官則有若尹氏太師者是也以師稱其姓則有若師曠師丹者是也此器銘曰師疑以師言其姓或言其官耳製作簡古雖周之物殆有商之遺意焉右髙四寸深二寸二分口徑四寸一分容一升三合重二斤三足銘十有六字仲下一字不可辨昔有仲山父仲慶父仲考父召仲丁父仲仁父而此曰仲父者蓋未知其為誰考其製作乃與聿逺鬲稍相近耳且諸器款識有曰孫子有曰子子孫孫有曰子子孫蓋孫可以為王父尸子不可以為父尸故言孫子而以孫為先言之不足至於重復故言子子孫孫而不嫌其煩或疊言或單舉以互見故言子子孫而不嫌其略若此器再言子子人從而系之是為孫孫之義蓋孫亦子屬不待指而後著矣噫古人制器尤在於遺後世且欲傳守不失故以子孫為丁寧若乃漢器銘子孫者十無二三此所以不純乎古也右髙四寸三分深二寸六分口徑四寸二分容一升六合重二斤三兩兩耳三足銘三字按慧與惠通虢薑敦款識有惠仲春秋有惠伯惠叔而此鬲銘之為惠季豈非惠為氏而伯仲叔季者乃其序耶右髙四寸八分深三寸二分口徑四寸七分容一升七合重一斤十兩兩耳三足銘三字夫世人但知十干為商名遇款識有十干者皆歸之商故或以丁父鬲為商器蓋誤矣按商之銘於甲曰父甲丁曰父丁己曰父己辛曰父辛乙曰父乙皆尊其父而上之未見有列於下者兼商鬲皆以父丁為銘若謂丁父亦為商器則是古人於名號間有變易矣將何以示後世乎蓋在周之太公望再世而有丁公故其後世以丁為氏是鬲周物也豈其丁氏之子孫為其家廟而作耶曰孫則又以言孝孫作之以奉其祖者也右髙三寸四分深二寸二分口徑三寸四分容九合重一斤九兩三足銘十有一字按詩之思齊曰思齊太任文王之母思媚周薑京室之婦太姒嗣徽音則百斯男蓋太王之妃曰太薑王季之妃曰太任文王之妃曰太姒曰京薑者京室之婦也周有天下在武王時及其追尊祖考則以古公為大王季歷為王季於是國以京言之故謂之京薑右髙五寸一分深三寸四分口徑四寸一分容一升二合重一斤二兩兩耳三足無銘是鬲足鋭如戈按戈兵器也戡戮戰伐皆從之蓋有傷物之意故古爵悉為此狀釋者謂為酒戒今鬲以飪物而其足復作此豈非一食之間過亦為害耶則聖人之垂訓其見於製作防患何所不至也髙七寸一分深四寸四分口徑五寸三分容三升重三斤六兩兩耳三足無銘髙六寸五分深四寸口徑四寸九分容二升重二斤十有一兩兩耳三足無銘右二鬲皆甗屬款足以達水火之氣蓋熟物自下始也故其用未嘗不同但前一器差大而耳足純素於腹間止飾以叨餮後一器亦著叨餮鼻為觚稜大扺製作之工略異然俱周物也右髙一尺六寸深一尺一寸口徑一尺二寸容四斗六升重三十六斤兩耳三足無銘純緣飾以叨餮貫珠之紋復加連珠為間古之鼎彜之屬多著叨餮蓋飲食人之大欲存焉茍無以防其未然則亦何所不至耶鬲以烹飪為事故取此為象古人所以寓意者可謂深矣右髙六寸九分深四寸六分口徑六寸容三升八合重三斤一十兩兩耳三足無銘夫鬲之為用熟物器也中雖有隔而上下與氣為流通是器耳足純素無紋雖曰周器而尚有商之遺法右髙一尺一寸六分深一尺一寸三分口徑八寸六分腹徑一尺五寸五分容五斗八升重十有八斤兩耳連環無銘是器似釡而口斂口之上且載鬲焉以此熟物也體純素無紋然形制古雅蓋非後世俗工之所能到以類求之真周物耳右髙七寸六分深七寸口徑五寸腹徑一尺容一斗四升八合重七斤十有二兩兩耳連環無銘是器鍑也許慎謂似釡而大口今正如釡之有六耳腹周以隔脰旁著兩獸銜環正與漢方圜獸耳壺同然已失三代之制矣盉總説有生之氣體必資飲食以為之養故昔人以酸養骨以鹹養脈以甘養肉以辛養筋以苦養氣然五味所以養生亦所以害生者凡以不得其平而已於是或有餘或不足則必有以殘其氣體者此味所以貴乎和也夫盉盛五味之器也其制度與夫施設不見於經惟説文以謂從皿從禾為調味之器王安石以謂和如禾則從禾者蓋取和之意耳且鼎以大烹資此以薦其味也鬵以常飪資此以可於口也雖然言其器則山其口以盛物者皆皿也惟中而不盈則為盅夃而多得則為盈合而口斂則為盒曰水以澡則為盥凡制字寓意如此則盉之從禾豈無意哉昔晏子謂和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪即火均之齊之以味濟其不及以泄其過而史伯亦謂以他平他謂之和則和者以其衆味之所調也今考其器或三足而奇或四足而耦或腹圜而匾或自足而上分體闕膊有鋬以提有蓋以覆有流以注其器名或謂之彞則以法所寓也或謂之尊則以禮所尊也或謂之卣則又以其至和之所寓也夫大羮玄酒有典則薄滋味則盉也宜闕逮夫三酒具而鉶羮則自是而往闕為貴者矣右通蓋髙九寸三分深五寸二分口徑三寸六分腹徑五寸八分容三升三合共重四斤一兩三足有流有鋬蓋與器銘共六字右按商有沃丁仲丁祖丁武丁庚丁太丁凡六丁而此丁者未審為何丁也而作阜字蓋卣所以盛秬鬯至和之所寓也盉以調味而著以至和之器固其類矣若乃言阜則如詩所謂如山如阜以取髙大揚雄亦曰視天民之阜者取其富庶之意蓋民無菜色然後天子食日舉以樂則享此備味者非富盛之時可乎此所以取阜為銘也右髙七寸七分深五寸二分口徑三寸四分腹徑五寸八分容三升二合重四斤二兩闕蓋有流有鋬銘三字曰孫父癸而孫作執戈狀按商之君有曰報癸此言癸者恐其是歟既言父癸則自銘者乃子職之事今又言孫者是孫可以為王父尸而子不可以為父尸明矣作執戈形者商之鼎彞往往有之可以類求也是器兩面作叨餮周以連珠流有銘是器三面作叨餮間雷紋不得見其完器爾右通蓋髙八寸深四寸口徑四寸三分腹徑闕寸五分容二升三合共重三斤十有二兩是器有流有鋬蓋與器銘共九字周有單子繼世不絶為賢卿士其族有襄頃靖獻穆公銘之所謂冏者豈斯人之族耶然單氏之器傳世有數種有舟有鼎有彞與此之盉其形雖不同而其銘則皆曰從彞也蓋彞以言其有常從以言其有繼是器特於盉為一類耳右髙七寸六分深四寸八分口徑四寸六分腹徑六寸八分容八升三合重七斤有半三足闕蓋有流闕鋬銘一十九字腹匾而圜嘉仲索諸經傳無見考其款識已非夏商但製作有類乎周其曰諸友則知非獨擅乃與朋友共之之器也且五常之道言君臣之尊尊父子之親親而朋友亦列於其間則未有不須友以成者彝器者法度之所在其於尊君事親之義未嘗不載則於朋友之義宜有以及之兹器是也右髙七寸五分深四寸二分口徑五寸腹徑五寸五分容三升一合重五斤三足闕蓋有流有鋬無銘是器三面作叨餮間以雷紋純緣之外又狀夔龍而流作龍首方他器具三足而但逸其蓋耳右髙九寸深七寸口徑長二寸四分闊一寸九分腹徑長四寸五分闊三寸容四升二合重八斤四足有流有鋬無銘形制與匾壺相類流與腹間盡作雲雷然製作頗古也右通蓋髙六寸八分深三寸二分口徑二寸三分腹徑四寸一分容一升六合共重三斤十有一兩三足有流有提梁無銘立三螭以戲於旁凡盉流提間多著此象蓋以螭山澤之獸以示防戒之義食飲之用固宜載之取數三者獸三為羣人三為衆以一器而具三螭則其享之者可不自警焉右通蓋髙五寸深四寸一分口徑三寸腹徑六寸容三升四合共重三斤七兩三足有流有提梁無銘純緣腹足飾以蛟螭蛟螭若龍而非者無升降自如之變故飲食之器類多著之以為戒蓋平純素不加文鏤以螭為流提梁亦為螭首連環繫於提梁製作精巧實周物也右通蓋髙六寸二分深四寸口徑二寸九分腹徑六寸容三升六合共重四斤三足有流有提梁無銘蓋飾以虺純緣外著蟠虬下為綯紋而以麟為流設提梁可以挈攜周以螭形連環繫於其上三足純素不增文鏤蓋調羮之器也右通蓋髙六寸深四寸一分口徑二寸九分腹徑六寸二分容三升三合共重三斤七兩三足有流有提梁無銘通體雷紋纒糾間以粟紋以麟為流以虎為提梁獸蹄為足精巧雖後世竭智力莫能及也右通蓋髙七寸深四寸六分口徑三寸二分腹徑六寸五分容四升一合共重四斤十有一兩三足有流有提梁無銘是器以三熊為足釋字者以謂熊從能從火強毅有所堪能而可以其物火之蓋盉調味器也其取象於物則熊有火之之理而又冬蟄春出其動也時以虎為提梁以鳯咮為流時其飢飽者虎也以時隱顯者鳯也且飲食必時聖人繼之於金木水火者蓋未嘗不謹以時也可不慎歟右通蓋髙七寸深四寸七分口徑三寸腹徑五寸一分容四升四合共重四斤十有三兩兩耳三足有流有提梁無銘腹圜而匾雖與周嘉仲盉相近而腹間所飾紋瑑非古其流作鳯以鳯南方禮文之禽蓋羽蟲三百六十而鳯為之長且其治則見亂則隱出入以時無如鳯者此仲尼所以有鳯兮之歎而漢儒所以有覽德之語盉主調味而流飾如此非特取禮文之盛又欲出之有節而無失其時歟右通蓋髙六寸三分深四寸六分口徑三寸一分腹徑六寸七分容四升二合共重五斤三兩三足有流有提梁無銘盉所以調味其可於口之物戒之在得於是有以致其義焉是器以螭首虬紋為飾則螭也虬也皆以害物貪殘為可防者故於盉特形容之也重修宣和博古圖卷十九
