body:
  text: 重修宣和博古圖卷十二瓶壺總説瓶三器周一器蟠螭瓶漢二器麟瓶螭首瓶壺一二十五器商三器貫耳弓壺銘一字敆姬壺銘五字蟠夔壺周一十八器仲丁壺銘三十七字觚稜壺百獸圜壺貫耳壺一貫耳壺二貫耳壺三貫耳壺四貫耳壺五闕一器叨餮方壺盤雲壺三耳壺交螭雲雷壺螭首方壺鸚耳雷紋壺三螭壺雷紋螭首挈壺四鸚壺蓋漢五器大官壺銘三十二字綏和壺銘四十一字雙鹿壺鳧壺瓠壺總説禮器之設壺居一焉在夏商之時揔曰尊彞逮於周監二代則損益大備故蒸嘗饋獻凡用兩壺次於尊彞用於門內然壺用雖一而方圜有異故燕禮與夫大射卿大夫則皆用圜壺以其大夫尊之所有事示為臣者有直方之義故用方以其士旅食卑之所有事示為士者以順命為宜故用圜壺之方圜蓋見於此至於聘禮梁在北而八壺南陳梁在西而六壺東陳蓋東蠢以動出而有接南假以大顯而文明乃動而應物以相見之時也以壺為設豈不宜哉且詩言韓侯取妻亦曰清酒百壺壺非特宗廟之器凡燕射昏聘無適而不用焉故其制度銘刻不一蓋自三代以來禮不相襲迄於秦漢去古既久而制作愈失故有刻木繪漆皆出諸儒一時之臆論夫尊以壺為下蓋盛酒之器而瓶者亦用之以盛酒者也此周人有瓶之罄矣之詩然後知瓶亦古人之所用者然其字從瓦所以貴其質而此皆以銅復作螭麟鸚鵡之飾蓋古人大體至漢益雕鏤矣然賈至稱漢雜三代之政而王通亦謂捨兩漢安之則制作有出於此者宜亦可觀也已右髙一尺八分深一尺一分口徑一寸七分容四升八合重六斤無銘蓋瓶之為用久矣易言羸其瓶詩曰瓶之罄矣是也腹作蟠螭首尾糾結形若麟瓶之狀周有一壺其著象亦蛟螭此瓶也其飾如此亦以壺類故也右髙八寸六分深七寸五分口徑九分容一升八合重三斤四兩有鋬無銘書曰左右攜僕韓子曰供給之人各執其物此古提攜供給之器也走趨雖遽滿而不溢口兼流用坐無繁飾周身甲錯若麒麟然蓋炎漢已來物也右髙七寸二分深七寸口徑八分容一升三合重一斤十兩有流無銘是器純素惟流作螭首昔人飲器多取螭為飾蓋君子之於酒交之以仁制之以威者凡欲如此然製作浮薄而無古意視三代之器未可同日而語也右髙一尺一寸八分深一尺五分口徑長三寸七分濶四寸五分腹徑長八寸九分闊七寸五分容一斗二升重十有二斤八兩兩耳此器以弓銘之壺酒之下尊也商之飲器如爵者類銘之弓蓋射者未嘗不繼之飲以其禮難所以強世者也故必寓於人情之所易此記禮者之於鄉飲以謂吾觀於鄉則知王道之易易者其在是歟觀其兩耳可以貫繩是必繫而挈之者制作簡朴比周器則質勝之右通蓋髙一尺四寸六分深一尺一寸五分口徑二寸八分腹徑四寸四分容五升四合共重五斤四兩兩耳銘五字曰敆姬者蓋其氏族也古之氏族或以王父字或以諡或以世系所封之地於是後世子孫以之女子皆得以通稱之若曰有娀氏之女者蓋以娀國為言也若曰孟薑者蓋以薑姓為言也若曰䜌女者蓋以䜌公之諡為言也此言敆姬凡此類耳是器則壺也制樣典古略不加雕鏤之飾而曰作寶彞真所謂法度之器也右髙一尺四寸二分深一尺二寸三分口徑長五寸闊三寸五分腹徑長九寸二分闊五寸五分容一斗五升五合重十六斤十有五兩兩耳連環無銘腹作蟠夔勢若飛動比商甲壺設飾少異而體制頗同渾厚之風昭然可見右髙一尺五寸二分深一尺三寸四分口徑七寸七分腹徑一尺一寸一分容二斗有半重二十一斤十有二兩兩耳連環銘三十七字小篆壺字其上為蓋中為耳下為足正皆象形而此壺字其省文更竒體類大篆年已加千周宣已後物也召仲丁雖無見於傳記然周有召伯召虎最為聞家令姓豈其功臣之世賢者之類耶而文曰用祀用饗多福滂語極典古周禮朝踐用兩壷尊用祀之謂也左傳周景王燕晉文伯尊以魯壷用饗之謂也許慎曰渥衍沛滂言多福與渥澤也坊記有曰恭則用祭器故知此壺之設祀饗兼用也是器耳為叨餮紋結蟲獸此周器之重大完好者也右髙一尺六寸八分深一尺四寸八分口徑長五寸四分闊四寸三分腹徑長八寸八分闊六寸五分容三斗二升二合重二十五斤十有四兩兩耳連環有鼻無銘嘗觀漢方壺數品皆澆薄凡陋此器渾厚端雅體方而觚稜四出腹著叨餮間以夔龍郁郁之文焜耀人目益知後世淳風掃地而不能倣佛周之萬一也右髙一尺六寸五分深一尺四寸五分口徑五寸八分腹徑一尺二寸八分容四斗二升重二十二斤有半兩耳連環無銘是器紋鏤如縈絲髮諦視之則百獸形也兩耳挾腹復作獸首齧環為提挈之具純緣作垂花足間實以穟草考它器所飾竒巧無過於是壺者雖曰周物亦出乎其類耳第一器髙一尺一寸三分深九寸七分口徑長五寸二分濶四寸二分腹徑長七寸七分闊五寸六分容八升有半重七斤十有二兩兩耳無銘第二器髙一尺一分深八寸八分口徑長四寸八分闊四寸腹徑長七寸闊五寸三分容六升七合重四斤二兩兩耳無銘第三器髙一尺一寸五分深一尺口徑長五寸二分闊四寸腹徑長八寸一分闊五寸六分容八升有半重五斤十有五兩兩耳無銘第四器髙一尺九分深九寸六分口徑長四寸九分闊三寸六分腹徑長七寸四分闊五寸五分容七升二合重七斤二兩兩耳無銘第五器髙一尺一寸三分深九寸八分口徑長五寸闊四寸三分腹徑長七寸五分闊五寸八分容九升重八斤兩耳無銘右五器皆兩耳通貫上下可繫以挈而其為耳之形制則稍異或飾之以夔首或著之以角獸或聳起作叨餮之狀或通上下蹙為獸面然中空均可以貫繩而腹足間類飾以雲雷叨餮文鏤精巧實周物也右通蓋髙一尺六分深六寸七分口徑二寸一分腹徑八寸八分容四升共重六斤一兩有提梁無銘古者用壺亞於尊彞雖為用則一而其制則有方圜之異此方壺者蓋燕禮與大射卿大夫所用器也以其卿大夫臣子所用之器故示以直方之理觀其形制若卣而周身為叨餮間以雲雷必周之器也右髙一尺一寸六分深一尺一分口徑三寸六分腹徑七寸二分容一斗一升重十斤六兩兩耳連環無銘耳作犧首仰上雙角之間飾以人首脰足盤雲形制大概頗類周仲丁壺非近世規模之所能及也夫飲養陽食養隂壺所以盛酒養陽之物於是以犧首人首飾之首者衆陽之所會故也右髙九寸三分深八寸八分口徑長三寸六分闊二寸腹徑長五寸三分闊三寸二分容三升一合重一斤十有一兩三耳無銘是器壺也其為用雖一而方圜或異今所藏壺之形制圜者若周之仲丁圜而修者若周之敆姬方者若漢之獸耳此特體匾而橢三耳純素不加設飾比他壺形制為小異然比漢器則竒古勝之比周器庶幾近似焉疑晚周之物也右通蓋髙一尺六分深九寸八分口徑三寸一分腹徑七寸一分容八升重四斤有半兩耳蓋上連環無銘脰腹飾以蛟螭間起雲雷旁列三耳昔揚雄言螭虎桓桓而釋者以為仁威夫壺所以盛酒其用莫急於食饗而食饗者所以仁賔客也至於威則又欲其剛制於酒而不流耳右髙一尺二寸二分深一尺一分口徑長四寸九分闊二寸八分腹徑長六寸三分闊三寸二分足徑長六寸四分闊四寸五分容六升五合重九斤四兩兩耳連環無銘是器土花漬潤溷斑成暈純緣下設螭紋腹身間隱起繚絡形耳為螭狀各銜圜環然規模典古製作精緻此器比之它壺但方而微匾耳右髙九寸三分深八寸口徑三寸腹徑六寸八分容六升三合重三斤一十兩兩耳連環無銘是器通腹上下作蛟螭糾結之狀錯以雷紋兩耳為鸚鵡狀貫之圜環今所藏壺蓋亦以鸚鵡為飾昔之記禮者以鸚鵡能言為不知禮者之刺是器之設特取此者豈無謂乎右通蓋髙一尺四寸二分深一尺二寸一分口徑五寸五分腹徑一尺四分容三斗一升二合共重一十三斤十有二兩無銘是器自蓋頂及脰間皆鏤以蟠螭又别為三圈飾以三螭戲珠之狀蓋上設四小圈環仰以著地則如敦之有會焉中分四體各綴以環為提挈之具周官壺氏掌挈壺然致挈者非其環則不可此壺蓋體皆設四環是其所以為貫而挈之之所耳右通蓋髙三寸六分深二寸六分口徑三寸容一升三合共重二斤五兩兩耳有提梁無銘是器圈其足紋以夔龍叨餮周於腹間而間以雷紋蓋設三環旁貫小連環綴於提梁之右提梁作方斜文下為兩螭首以齧其耳考其規模與他壺略不相侔然此器製作加勝歸之周器無疑右髙一寸八分四方各三寸七分重一斤二兩無銘四垂隆起作鈿玉古紋交結糾錯雖刻削之所不及旁有四鸚勢若飛動覆之可以為蓋仰之可以為足文鏤加勝惜其器之不完頃所藏鸚耳壺兩耳作鸚形義亦取諸此右髙一尺五寸五分深一尺三寸口徑五寸八分腹徑一尺一寸容二斗九升五合重二十一斤二兩兩耳連環銘三十二字按建武者漢之年號也東漢之盛惟建武永平號為極治而光武之初歲稱建武歷三十一年復稱建武中元而此曰建武者蓋即位之年號非建武中元之年也二十年歲在甲辰乃東夷率衆內附正極治之時自伍輿至蒼省蓋其工造輿大監掾之姓名耳此器體制類壺而銘曰鍾者王安石以鍾字從金從重以止為體蓋飲無以節之則流而生禍所以銘鍾者欲其止而不流也蓋壺以取形鍾以示成故説文以鍾為酒器其義如之右髙八寸七分深七寸四分口徑三寸七分腹徑六寸四分容六升二合重五斤有半銘四十三字按漢成帝即位二十有六年始改元綏和而此壺作於是嵗也凡漢器必謹其歲月與夫造器之官如曰護級掾臨主守右丞同守令寶省者是矣右髙一尺四寸六分深一尺三寸九分口徑四寸二分容二斗八升三合重十有三斤八兩兩耳無銘此壺填金作羣龍雙鹿之象而耳飾獸面此漢壺之工者也右髙一尺二寸六分深一尺一寸四分口徑一寸腹徑七寸八分容六升重三斤八兩無銘鳧之為物出入於水而不溺水以況習於禮者如是也蓋詩人以水譬禮謂水玩之則溺犯之則濡然則取以飾飲器者蓋以示習禮之義若夫彞之有舟爵之設戈盞之用戔雖取理不同亦示其不由於禮則有殘傷覆溺之患矣古人警其過者大率如此右通蓋長一尺二寸六分闊五寸口徑一寸五分容五升共重四斤六兩兩鼻有提梁無銘範作瓠形螭首為提束以綯紋嘗謂上古土尊瓦瓿而公劉之詩亦曰酌之用匏則瓠壺之制蓋取諸此云重修宣和博古圖卷十二
