body:
  text: 重修宣和博古圖卷二十六磬四器總説周雷磬一雷磬二琥磬雲雷磬錞一十九器總説周虎龍錞山紋錞圜花錞縶馬錞龜魚錞魚錞雙魚錞鳳錞虎錞一虎錞二虎錞三虎錞四虎錞五虎錞六虎錞七蜼錞一雖錞二蜼錞三蜼錞四鐸鉦鐃戚總説周一十一器鐸二器栖鳳鐸銘一字雷柄鐸鉦九器穟草鉦龜純鉦瑞草鉦隧鉦雲雷鉦一雲雷鉦二雷紋鉦雲目鉦通甬鉦漢四器鐃二器舞鐃一舞鐃二戚二器舞戚片雲戚磬總説古之為樂者有黄鍾之磬則特垂其一而為一簴若特鐘焉凡十有二數以為律之正聲而應月者也至於編磬則每簴所垂之數十六蓋倍八音而成數者也夫作磬之始記禮者謂叔之離磬蓋出於上古莫知其時而古史考又以帝堯之世有所謂無句者為之也後代相因而周官則磬氏出焉其制則中髙而上大者為股其下而小者於所當擊則為鼓上股下鼓分為倨句之勢以成磬而屬之於簨簴凡特磬編磬小大雖殊其制一也然書曰泗濵浮磬則磬以石為之必取諸泗水之濵者其見於堯舜之時然也春秋傳謂魯饑而臧文仲以玉磬告糴于齊則又知其用玉矣厥後逮于隋唐間凡設於天地之神則用石其在宗廟朝廷則用玉考其器之制作與夫所用如是而已矣今兹之磬非玉非石乃鑄金而為之或成象如獸之形或又加以雲雷之紋及觀其勢則無倨句磬氏之法以謂先王之制作耶則求諸經傳而無所考證以謂非先王之制作耶則煎金鎔範精緻莫及固非漢氏以來所能為也扣之鏗然非以立辨在八音之内去石與玉而取此是未可知也姑歸諸磬以待夫博識之士噫夫豈典籍焚於秦氏而泯滅其説者歟第一器長一尺四寸五分闊八寸三分厚五分五釐重十有五斤第二器長一尺六寸闊八寸四分厚六分八釐重十有八斤四兩右二器周官鼓人之職有雷鼓雷鼗則雷者取象其聲之無以過也若磬之為器方其制作則必求合乎律吕非若鼓焉姑用為節儉而擊之則無適而不宜也然其名磬以雷者特取致飾其體有回旋之紋如此蓋非主乎聲也右通長一尺五寸四分闊八寸七分厚六分重十有七斤無銘是磬體作琥形故目之曰琥昔人以白琥禮西方其形象虎是器亦作虎形而於虎之内又包一虎比肩而行以示物得其性然也虎金屬而磬西北方之器故以是飾之右通長一尺七寸二分闊八寸四分厚九分重二十斤無銘且磬以立辨詩曰笙磬同音則非止於立辨乃所以合樂也春秋魯饑臧文仲以玉磬告糴于齊書言泗濵浮磬則磬者以玉石為之是磬復以銅為豈金磬之謂歟盖銅者五金之數得非取其久而不變耶其形制状獸鼓與股盡飾雲雷制作典古實周物也錞總説古之作樂者鑄金以為器而鐘居其首焉夫鐘之類求合乎律吕則特鐘也其次設十有二鎛以應律而依辰位仍復有編鐘焉率十有六數而同一􅂒則與夫石磬相依以諧其韻兼之簫管竽瑟髙下清濁並舉而樂由是以成矣有所謂錞于者則作樂之時擊為節檢若晉鼓鼓人所職不必求合於律吕者也周官謂鼓人以金錞和鼓釋音以金錞即錞于正謂是耳其製中虚椎首而殺其下後世去古既遠斯器蔑聞知之蓋寡至六朝江左之宋方有得於蜀者以獻始興王鑑其上為銅馬係而垂之用器盛水以置其下注以芒而手振之與水相應聲若雷發自兹復有傳其器者所以當時備充庭之樂而錞于遂與鼓相鐃鐸用為次列焉及觀之近代竇儼撰為禮圖當時未覩前製徒取諸昔人傳註之學而臆度以成式則有如盃盂之狀仰而係其兩傍以屬于簨􅂒固自以為得矣今觀斯器一出以照映其陋吁可笑已惜夫世之相後不得而見焉使其見之寧不愧哉右髙一尺一寸七分上徑長七寸二分闊五寸九分下口俓長六寸一分闊五寸一分鈕蝕剥不完重一十三斤十有四兩無銘錞專以和鼓王安石釋其字以謂錞者隂與陽和而孰是器乃特飾以虎龍蓋以虎龍之交遘隂陽相和之義也故於錞有之然而又著以風雲者則亦以雲從龍風從虎也昔人之設飾豈徒然哉右髙一尺二寸五分上徑長八寸四分闊七寸七分下口徑長六寸三分闊五寸八分鈕髙八分闊二寸重十有一斤無銘是器以虺為鈕前後倣鐘之制作隧攠狀上有雲雷間錯純縁縻之以繩又有山紋聳然而起文鏤增華寔晚周精工之製也右髙一尺三寸四分上徑長八寸四分闊八寸一分下口徑長七寸闊六寸五分鈕髙八分闊一寸五分重有有一斤十兩無銘是器中設圜花下飾雲雷製作純古蓋周物也非若漢儒禮圖之陋特取象於盂器者不其謬哉右髙一尺五寸五分上徑長九寸六分闊八寸下口徑長七寸闊六寸鈕髙三寸八分闊一寸五分重十有六斤無銘凡三代之器或象饕餮或著蟠䕫或龍或虎或螭或虺類皆不一然未有以馬為飾者是錞鈕特作縶馬形蓋馬性奔逸縶以羈絡則惟人之従而疾徐有節錞以和鼓為事懼其過於淫樂也故有取於縶馬焉蓋與舟錞同義舟欲其樂不流馬欲其樂有節舟惡覆溺而馬戒奔逸故也王黼云古金錞重一十五斤十有四兩上為縶馬齊書始興王鑑傳廣漢什邡人叚祚以錞于獻上有銅馬以繩繫馬去地尺餘灌之以水又以器盛水於下以芒當心跪注錞于以手振芒則如雷清響此錞與叚祚所獻無少異今樂府金錞就擊於地灌水之制不復考矣右髙一尺四寸五分上徑長八寸四分闊七寸三分下口徑長六寸五分闊五寸七分鈕髙二寸三分闊一寸一分重十有五斤無銘是器以獸為鈕頂間作龜魚形蓋介蟲三百六十龜為之長人用之以斷吉㐫以别是非魚亦鱗之屬以其類從則鑄器尚象寓以㣲意莫不有法焉右髙一尺二寸八分上徑長七寸一分闊六寸二分下口徑長五寸五分闊四寸七分鈕髙八分闊二寸一分重九斤四兩無銘錞佐鼓之器鼓陽也錞陰也此錞獨飾以魚者魚陰物柔㢲隠伏随陽上下亦取夫陽唱隂和之義耳右髙一尺四寸二分上徑長八寸四分闊七寸二分下口徑長六寸闊四寸五分鈕髙二寸四分闊一寸三分重一十斤九兩無銘古之制器以魚飾者多矣商有魚敦周有魚尊又有魚簠考其意不過柔弱和順朝夕無寐以勤其事而已是錞以雙魚為飾鈕作螭虎者魚則取其和順而螭虎則取其制節作樂之道如斯而已右髙一尺四分上徑長六寸七分闊五寸一分下口徑長五寸八分闊四寸七分鈕髙一寸三分闊五分重一十斤無銘書曰簫韶九成鳳凰來儀蓋以簫韶形聲類鳳故各以其類而應之考錞之形聲其實象獸然是錞乃以鳳為鈕則知樂成而感格者舉可以互見也以是知一音不調一物不格皆非所以為樂成矣第一器髙二尺二寸三分上徑長一尺七寸六分闊一尺四寸下口徑長一尺闊九寸一分鈕髙四寸一分闊二寸八分重五十一斤無銘第二器髙二尺四寸三分上徑長一尺七寸七分闊一尺四寸七分下口徑長一尺闊九寸一分鈕髙三寸九分闊二寸二分重四十斤無銘第三器髙一尺五寸三分上徑長一尺五分闊八寸下口徑長七寸一分闊五寸八分鈕髙二寸七分闊一寸五分重十有六斤無銘第四器髙一尺二寸一分上徑長七寸三分闊六寸五分下口徑長五寸三分闊四寸八分鈕髙二寸一分闊一寸五分重七斤無銘第五器髙一尺二寸三分上徑長七寸四分闊六寸五分下口徑長五寸四分闊四寸七分鈕髙二寸一分闊一寸七分重六斤四兩無銘第六器髙一尺三寸上徑長一尺闊八寸八分下口徑長六寸七分闊六寸鈕髙二寸五分闊一寸五分重八斤無銘第七器闕尺寸斤兩右七器形制皆同大小則異鈕俱作虎狀按虎西方義獸金屬也故於錞有之王安石釋周官鼓人云以錞和鼓蓋鼓則進進則為陽用事之時隂出佐之而已然則取義獸者其在兹歟第一器髙一尺三寸五分上徑長九寸六分闊八寸下口徑長六寸三分闊五寸七分鈕髙三寸一分闊一寸重十有一斤二兩無銘第二器髙一尺一寸五分上徑長七寸六分闊六寸四分下口徑長五寸八分闊四寸九分鈕髙一寸八分闊一寸三分重八斤十有二兩無銘第三器髙一尺六寸上徑長九寸八分闊八寸六分下口徑長七寸闊六寸五分鈕蝕剥不完重二十斤無銘第四器髙一尺三寸五分上徑長一尺一寸闊八寸五分下口徑長八寸三分闊六寸八分鈕髙三寸一分闊一寸六分重二十一斤無銘右四器皆以蜼為鈕蜼用鼻禦雨智獸也周官司服宗彞謂虎蜼蓋以飾之於宗廟彞器之間以為法焉錞之為用其鳴必以時智者之道也鐸鉦鐃戚總説凡樂之作皆所以象成者也若昔王業之興自湯武已來蓋未嘗不先於以武定天下之亂也方其定亂之初揔兵之事咸掌於司馬而軍旅之行與夫臨陣對敵則有坐作進退之方進退坐作者必齊之以金鼓鳴鼓以進鳴金而退由是有鐸鉦鐲鐃之用焉及其叛者服暴者亡櫜弓束矢戢干戈而散馬牛則功成矣斯有象成之樂則取彼所以成功之事而形于歌詠由是鐸鉦鐲鐃復施於作樂之際也夫鐘磬必調於律吕而合奏則繫之絲木越之匏竹小大清濁雜比而為和凡此所主者樂之均也若夫鐸鉦鐲鐃則非假調乎律吕鏘然並作特用以為節儉而與鼓相間故周官鼓人之職以金鐸通鼓是也執而振之舞者視而為容焉如鐲之用乃其一類耳鐲即鉦也特器同而名異至若鐃則又為止鼓之器樂記曰復亂以武武即鐃也以其舞畢而鳴鐃以治理之為亂也且舞有文舞焉干羽所以象文有武舞焉干戚所以象武詩稱值其鷺羽者謂析其羽而持之以舞乃文舞也其謂朱干玉戚則武舞也武舞執戚用示其威故耳凡兹數器原其始要其終合為一類故宜兼收以備古人之制可考而知其法右髙六寸八分柄長四寸七分上徑長三寸九分横三寸下徑長四寸四分横三寸六分重七斤三兩銘作鳯栖木形是器鐸也周官鼓人以金鐸通鼓凡樂舞必振鐸以為之節銘之以鳳亦取其鳯凰來儀之象而為栖木形如詩所謂鳯凰鳴矣于彼髙岡梧桐生矣于彼朝陽盖鐸者樂之節取其樂調而物以類應之也右髙六寸八分柄長三寸八分徑一寸上徑長三寸三分闊二寸八分下徑長四寸一分闊三寸六分重四斤十有一兩無銘古者以木鐸振文教以金鐸奮武衛故書言每嵗孟春遒人以木鐸狥于路而鼓人以金鐸通鼔則鐸雖㣲物其為用亦大矣後世不知所重往往倣之以為柴車之警然其音聲猶有暗合於律者故晉荀勉作樂詔天下上牛鐸而出於龍德太一宫養種園之地豈其潛邸之符有應於是耶且自古在晉凡所以揆文教和樂律一本之於鐸然惟天下文明然後有此今鐸出於龍德太一固知不徒然也其有半兩錢一百三十有九異布錢二十有三與夫六花小鑑馬勒環同時而出豈非其應於明時為錢流地上控制蠻夏之兆耶右髙一尺一寸八分柄長六寸徑二寸二分上徑長九寸七分闊六寸四分下徑長一尺一寸九分闊八寸六分重六十三斤無銘古之田役令其目以旗幟令其耳以鼓鉦於是聞鼓則知進以鼓陽也聞鉦則知止以鉦隂也蓋鉦亦不止用於節鼓而已是鉦所飾篆畫突起兩面狀獸首而中象黄目周以穟草其製作為周物無疑也右髙一尺七寸八分柄長八寸九分徑四寸三分上徑長一尺七寸闊一尺八寸下徑長一尺九寸五分闊一尺四寸二分重二百五十四斤無銘夫是器鉦也其純飾以龜蓋鉦以止鼓為義龜位壬癸於方則止而靜而其為物又性隠伏故取之以為飾按周官公司馬執鐲鐲即鉦也然則司馬掌兵固隂類耳先王之於彞器或飾之或司之者莫不各有其意飾之則覩器而能知所用司之則用器而必稱其職豈茍然哉右髙二尺一寸二分柄長一尺二寸上徑長一尺七寸二分闊一尺一寸五分下徑長二尺一寸八分闊一尺四寸重三百斤無銘觀此形制上出柄而中空正許慎所謂似鈴柄中上下通者是也然慎又以鉦為鐃按周官鼓人以金鐃止鼓而釋者亦云鐃如鈴無舌與慎之説蓋合又許子銘鐘謂之鈴鐘疑古之鈴制與鐘同而此鉦也雖無枚篆之飾大槩與鐘相類則知似鈴之説亦不謬矣其兩面隠起皆作瑞草蓋連理芝草蓂莢嘉禾皆草之為瑞者故瑞應圖曰八方合為一家則木連理古瑞命記云王者慈仁則芝草生白虎通亦曰德至地則嘉禾生蓂莢起而是數者皆德之所致則取以飾鉦亦見王者之兵禁暴除害以德天下耳故異詩人何草不黄之刺也右髙一尺三寸三分柄長七寸九分上徑長一尺八寸闊四寸七分下徑長一尺五寸二分闊一尺九寸重七十八斤有半無銘柄中空以夔為飾兩面又作蟠夔縈紆糾結之狀目曰隧鉦者有鳧氏言鐘之隧攠制耳然鉦之為用非若鐘之下垂植其柄於座而鳴之則鐘之隧當在下而鉦之隧當在上也前一器髙一尺五寸五分柄長七寸九分上徑長一尺二寸六分闊八寸下徑長一尺五寸闊一尺二分重一百五十斤無銘後一器髙八寸五分柄長五寸八分上徑長七寸九分闊五寸下徑長一尺二分闊七寸重四十斤無銘右二器皆以雲雷為飾按詩之常武美宣王能立武事而曰如雷如霆徐方震驚則兵所貴者在能震服而已不特如此雷為天威而兵者所以將天威者也雷之收發必以其時而兵者貴乎戢而時動者也雖然雷之所作澤必従之則吾之兵非以毒天下也乃所以利之耳又況止戈為武而鉦又取夫止于一而已右髙九寸五分柄長六寸二分徑二寸一分上徑長八寸九分闊五寸四分下徑長一尺一寸四分闊七寸六分重五十一斤無銘是器通體周以雷紋毎面作兩黄目獨柄純素無紋其規模復少變於它鉦耳右髙七寸五分柄長四寸八分徑一寸八分上徑長六寸九分闊四寸三分下徑長九寸四分闊五寸四分重二十五斤四兩無銘是器内外遍飾雲紋或輕或重兩面各設兩目上為雲翳四邊帀以連珠比百寶鉦為稍純質然形制大槩相類蓋一時物耳右髙一尺一寸二分柄長六寸徑一寸八分上徑長九寸四分闊五寸二分下徑長一尺一寸七分闊七寸八分重四十五斤無銘是器兩面作獸形突起蟠夔中設二目純縁間飾以雷篆正取其節鼓之義且其柄中通若鐘甬然故目曰通甬鉦云第一器長六寸九分徑四寸重一斤四兩無銘第二器長六寸六分徑三寸九分重一斤無銘右許慎謂鐃小鉦也如鈴無舌鳴之以止擊鼓者也是器頗近其制而特有舌焉蓋欲便於作止不待擊而後鳴也然不獨卒長職此而已且舞人亦用之樂記曰復亂以武則以武為鐃謂舞人鳴此以治理之而又以為退卻之節也右長六寸闊三寸重十有三兩無銘夫戚蓋司殺者之所秉用以為舞則以象其武安柄處作蟬紋柄之外作兩目中作饕餮垂花之飾紋鏤精妙非漢不能為也右長七寸六分闊四寸三分重一斤無銘形戚也戚斧屬又為樂之器此若片雲狀而兩端㣲卷中作三圜竅容柄處為三耳蓋戚以玉為柲柲即柄也所謂朱干玉戚者此其戚歟重修宣和博古圖卷二十六
