body:
  text: 重修宣和博古圖卷九總説卣一一十五器商持刀祖乙卣銘一十四字執戈父癸卣銘六字言卣銘六字田卣銘二字世毋辛卣銘五字卦象卣銘二字祖辛卣銘七字立戈卣銘作立戈形兕卣銘二字執爵父丁卣銘三字寶卣一銘四字寶卣二銘八字瞿祖丁卣銘一十二字兄癸卣銘五十字册卣銘二字總説卣之為器中尊也夏商之世揔謂之彜至周則鬱鬯之尊獨謂之卣蓋周官尊彜皆有司所以辨其用與其實所謂六彜者雞鳥斝黃蜼虎也六尊者獻象著壺泰山也而祫祭則合諸神而祭之者也故用五齊三酒通鬱鬯各二尊而尊之數合十有八禘祭則禘祖之所自出者也故用四齊三酒闕二尊而尊之數合十有六是則通於鬱鬯二尊者其所以為卣也何以言之成王寧周公之功而錫之以秬鬯二卣平王命文侯之德而錫之以秬鬯一卣皆實以鬱鬯知其為卣明矣蓋秬者取其一稃二米和氣所生鬯則取芬香條達而和暢發於外卣之所以為中者惟其備天地中和之氣非有事於形器之末而已凡所以錫有功賞有德是亦使其強不過中怠不鞭後不失夫至中之道故爾然彝也尊也卣也皆盛酒之器用有所宜則名有所不同賈公彥以謂上尊曰彜中尊曰卣下尊曰壺爾雅亦曰卣中尊也故取其中中也者天下之大本以其德足以成天地而配之者也故卣所以實之鬱鬯者義在兹歟右通蓋髙一尺二寸四分深七寸五分口徑長四寸八分闊三寸六分腹徑長八寸六分闊七寸二分容六升九合共重九斤十有二兩兩耳有提梁蓋與器銘共十四字曰祖乙者河亶甲之子也孫象形而手執刀蓋孫又疑其為子字子蓋商姓也先王之事親於藉則必秉耒於牲則必執系於羞嚌則執鸞刀於入舞則執干戚凡于祭饗未嘗不竭力從事以職其勞則卣之持刀不亦宜乎禮記云袒而割烹義取於此觀其字畫竒古形制瓌異可以為諸卣之冠右通蓋髙一尺一寸六分深七寸五分口徑長四寸四分闊三寸二分腹徑長七寸三分闊五寸六分容六升三合共重十有五斤六兩兩耳有提梁蓋與器銘共六字父癸者商天乙父主癸也上作人形手執一戈按諸銘􅍁多為戈狀或立之或橫之至此乃執焉蓋戈所以戒其過茍念於須臾而忽於持久謹于憂勤而失於懈怠則戈之戒將忘矣非特戈也蓋有所謂執鸞刀有所謂執一金敦黍或曰執玉或曰執爵皆因其事而有執焉觀其器悉以鳯鳥為飾而鳯之為物因時而隱顯覽德輝而下者也器以藏禮而取飾于是非禮文之盛曷以稱此昔周官掌六彝有以鳥彝為名者鄭玄所謂刻而畫之為鳯皇之形其法蓋取于此然後世但知歸美於周而不知商實有以肇之也右通蓋髙九寸八分深六寸二分口徑長四寸闊三寸三分腹徑長七寸闊六寸三分容四升二合共重七斤十有一兩兩耳有提梁蓋與器銘共六字其篆畫不少異惟中一字與銘意皆未可詳此器制作純厚而不雕巧銘復簡略規模與商夔龍卣相類定一時物也右通蓋髙八寸深四寸九分口徑長四寸一分闊二寸九分腹徑長七寸闊五寸一分容三升五合共重五斤九兩兩耳蓋與器銘共一字飾以雲雷夔龍之形紋鏤華巧切近人意其銘曰田耳間連環以為提梁而今乃殘缺不見其完亦可惜也且田者粢盛之所自出而卣之為器中尊也詩書所謂秬鬯者正一稃二米之謂焉銘田者豈非追本而為言耶右通蓋髙九寸七分深六寸五分口徑長四寸一分闊三寸腹徑長七寸闊四寸三分容五升七合共重八斤六兩兩耳有提梁蓋與器銘共五字器上一字作三乂按説文世字從三十故以此為世字以世為銘者蓋欲世世傳之子孫不絶而已且三乂又意其為五字從二一而交之象陰陽交午之義天數窮于九地數中於六九六之數為十五而天地之數備三乂者十五也古之聖人極其數遂定天下之象故以之制器而天地之數寓焉是則制字之妙未易以一理推也且􅉝為商號而曰毋辛即商史所謂􅉝毋者是也蓋古人命辭或上或下其變易類多如此右通蓋髙一尺四分深六寸口徑長二寸八分闊三寸腹徑長五寸七分闊四寸八分容三升六合共重六斤十有四兩兩耳有提梁蓋與器銘共二字作卦象觀古人畫卦竒以象乎陽耦以配乎陰一奇一耦而陰陽之道全一虛一實而消息之理備然易始八卦而文王重之為六十四卦夏曰連山商曰歸藏周曰易是卦也上下爻皆陽有乾之象中二爻皆陰有坤之象虛其中亦取象於器所謂黃流在中者義或在焉雖不見于書惟漢楊雄作太玄八十一首以擬易曰方州部家今爭首一方三州三部一家與此卣卦象正同雄于漢最號博聞殆玄之所自而作耶右髙九寸三分深七寸五分口徑長四寸五分闊三寸三分腹徑長八寸闊七寸一分容六升九合重十有三兩兩耳闕蓋有提梁銘七字曰祖􅉝作彝尊又象人形右執木左執戟按商十四代君曰祖􅉝蓋祖乙之子沃甲之兄祖丁之父也其象人形而執木執戟者殆是其武舞也木當是朱干戟當是兵舞昔舜之時舞干羽于兩階以格有苗則五帝之前其武舞亦所不廢武王之樂曰大武而舞如之則三王之後其用以濟時者又所不敢忘武也豈商之時獨不然耶考商有天下至祖乙而政復興祖􅉝繼之而善述其事則干以自衛戟以攘敵者于祖辛有之也宜銘是器以旌之又嘗求其用舞之由固有文舞有武舞凡山川之祀社稷之祀四方之祀與其持盈守文之君皆以羽旄之舞而文舞是也若以武得天下故于是有干舞焉武舞是也祖辛之迹不見于書傳而特有此武舞固可以類求矣右通蓋髙九寸二分深六寸二分口徑長四寸五分闊三寸八分腹徑長七寸五分闊六寸容五升三合共重八斤六兩兩耳有提梁銘作立戈形書稱四人綦辨執戈又曰兊之戈在東房則戈于五兵為利器王安石字書戈從一不得已而用欲一而已以是銘其器蓋亦示戒之義按商有立戈鼎有立戈父甲鼎與此意同是器通體兩面狀叨餮間以雷紋提梁為乕首蓋皆示其防間之理右通蓋髙一尺三寸深六寸四分口徑長三寸八分闊三寸五分腹徑長七寸闊六寸五分容五升七合共重一十斤十有二兩兩耳有提梁蓋與器銘共二字作兕形語云虎兕出於柙則兕非馴獸有害于人者故昔人用以為罰爵曰稱彼兕觥是也觥既曰兕則宜卣亦有兕是器提梁之兩端亦象兕首而通體作叨餮狀豈不有所示其戒耶商尚質于是銘諸器者或以其形此所以與周器異耳右髙八寸四分深七寸七分口徑長三寸七分闊二寸七分腹徑長五寸六分闊三寸五分容三升六合重四斤十有三兩兩耳闕蓋有提梁銘三字上象手執爵形考之狀口引如流下列三足有爵之象旁畫以説文謂手也按禮記曰孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之則以手附爵者蓋見于如將失之之意非盡其欽而欽者孰能臻此商之君以丁為號者六曰父丁則未詳其何丁也前一器髙五寸深四寸五分口徑長三寸八分腹徑長六寸四分容三升四合重三斤十有三兩兩耳闕蓋有提梁銘四字後一器通蓋髙六寸八分深四寸八分口徑長三寸六分闊二寸七分腹徑長六寸八分闊五寸五分容一升九合共重二斤十有二兩兩耳闕提梁蓋與器銘共八字右二器皆卣也不書作者之名而揔謂之尊彝一無蓋一闕提梁然製作渾厚而飾以牛形牛之為物能興民功致民力出作入息而服畎畝之事先王于器用之間所寓自有理致周司尊彜春祠夏禴所用獻尊以牛為飾其原蓋出于此右通蓋髙六寸四分深四寸四分口徑長三寸一分闊二寸三分腹徑長四寸八分闊三寸五分容一升五合共重二斤十兩兩耳闕提梁蓋與器銘共十二字曰瞿者質諸經傳無所見而商有瞿父鼎亦作兩目相並正與此卣同實一時之制曰祖丁者商十四世君祖􅉝之子也中為犧形下為兩册皆取象於物而書畫未分至周官司尊彜有曰犧尊者飾以犧牛蓋所因者商之遺意耳畫以兩册所以為册命也亦猶康王命畢公而曰册畢制器尚象其義如此右通蓋髙七寸三分深五寸三分口徑二寸一分腹徑四寸容一升六合共重二斤十有二兩兩耳有提梁蓋與器銘共五十字曰丁子王者按商無諡號皆以天之十日配之王則三代之同稱也兄癸者則兄弟相承之辭故祀其先王或稱祖丁卣之類或稱父若招父丁爵之類或稱兄若此卣之類又曰惟王九祀者爾雅云唐虞曰載夏曰嵗商曰祀周曰年其言祀則知此卣之出于商也其末曰世昌者蘄世世昌盛有如此銘也他器有曰子子孫孫萬年無疆之類也著以鬲形者古人于酒器多以此為飾故尊也爵也皆作此狀蓋欲如鬲之炊氣上下交通而已右通蓋髙六寸五分深三寸六分口徑長二寸三分闊一寸八分腹徑長四寸四分闊三寸二分容一升共重二斤五兩兩耳有提梁蓋與器銘共二字曰册且卣所以承君之錫然後享于祖廟之器故必言册以紀君之命商之辭略故一言而足是器頂中作爵柱以為舉持之具又以綯紐為提梁而其乏與蓋皆著飛鳯相嚮之狀蓋之旁又作山形間以蟬紋純緣外則以獸首為鼻之飾以夔龍左右環之蓋商器多此類也重修宣和博古圖卷九
