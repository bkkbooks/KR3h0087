body:
  text: 重修宣和博古圖卷六尊罍總説尊一一十八器商一十四器持刀父癸尊銘三字祖戍尊銘五字蜼尊銘八字父已尊銘三字􅉝尊銘三字父乙尊銘五字父丁尊銘二字立戈癸尊銘四字從尊銘三字祖丁尊銘五字兄丁尊銘八字持刀父已尊銘七字諫尊銘七字龍鳯方尊周四器月星尊銘四字召公尊銘七十二字髙克尊銘五十八字師艅尊銘三十二字總説在昔三代盛時凡酌獻祼將通用於人神之際故酌獻用於人亦用於神祼將所以禮神亦所以禮人是以尊罍彞舟相為先後而行之然周官羃人先尊以尊尊而彞卑小宗伯先彞以言其用則先彞耳彝用以祼既祼則已尊用以飲飲則必有繼之者故繼之必資諸罍此詩所謂缾之罄矣維罍之恥之義也於司尊彞之職有六尊言其數復言其名酒正之職有八尊言其數不言其名者蓋八尊所以廣六尊之數也至于罍則一種而已有六罍所以副六尊耳夫尊有六而在周則設官以司之辨其用與其實故有謂之獻謂之象則凡春祀夏禴其朝踐再獻之所用也謂之著謂之壺則凡秋嘗冬烝其朝獻饋獻之所用也謂之泰謂之山則凡追享朝享其朝踐再獻之所用也若夫爾雅不言尊而曰彞卣罍器也者謂彞卣罍皆盛酒尊意其尊必有罍亦猶彞之有舟此又一家之説也且尊之用于世久矣泰尊虞氏之尊也山罍夏后氏之尊也著商尊也犧象周尊也合而言之總謂之尊彞以周兼四代之禮故皆有之周官言六尊者兼得而用之也捨周官而見於他傳則分而言之故有所謂上尊曰彞中尊曰卣下尊曰壺凡以彞之為常也故曰上尊而已在商之世以質為尚而法度之所在故器之所載皆曰彞至周之文武制作未備商制尚或存者則尊彞之名間未易焉今召公尊文考尊皆周時器而亦謂之彞蓋本諸此右髙九寸二分深八寸口徑七寸八分腹徑七寸五分容六升重七斤十有二兩銘三字是尊狀觚形而所容則倍之設飾雖華而字畫極古銘之父癸癸者成湯之父號且銘者自名自名以稱揚其先祖之美而明著之後世者也故於父癸而言孫者亦自名之而已所謂身比焉順也者是歟右髙一尺一寸七分深八寸六分口徑八寸三分腹徑四寸容五升八合重八斤五兩銘五字此尊為太戊作不書名尊其祖也太戊之廟在商稱中宗蓋九世君也是器字畫位置不拘於偏旁之陋或左而右或右而左㸃畫或繁或省故以謂之祖謂之尊而純質未鑿於世俗之習渾厚端雅若有道之士觀是器者豈不改觀歛袵耶右通蓋髙六寸二分深四寸一分口徑三寸三分腹徑三寸五分容一升一合共重一斤二兩蓋器銘共八字周官謂四時之間祀追享朝享祼用乕蜼􅉓皆有舟其朝踐用兩大尊今尊也而以蜼豈非商之蜼彝所配之尊耶今考禮圖蜼彝之制蜼尾長數尺似獺尾末有岐是器款識旁刻獸形其尾長而末有岐正蜼也蓋銘曰五紀其器之數曰周作父乙者蓋商有太史周任乙則商之君名乙者也豈非作之者周任耶右髙八寸六分深七寸口徑六寸六分腹徑四寸八分容三升二合重三斤十有二兩銘三字上有畫作鬲狀夫鬲炊器也尊以盛酒而取銘於鬲者王安石謂鬲空二足氣自是通上下則鬲之為用欲其通而已用鬲識尊凡欲交通而無間耳曰父已者商之雍已也凡器之銘有曰祖曰父曰伯曰叔各因其人而銘之也鬲作畫形殆河圖洛書之遺意非書家八法所可議也右髙八寸五分深七寸口徑六寸八分腹徑三寸七分容三升一合重三斤銘三字曰亞者次也或主於獻或主於器蓋未可以定論也商之君以􅉝名者多矣曰祖辛曰小􅉝曰廪􅉝而此言人􅉝者按商立戈癸尊其銘亦稱曰人則人􅉝者乃商君之號􅉝者耳且此君也而謂之人蓋二帝而上體天以治人故謂之帝帝也者天道也三代而下修人以奉天故謂之王王也者人道也故記禮者稱商曰商人周曰周人者蓋如此觀是器不銘功不載誓宜其後世泯滅而無聞矣今也千萬世而下人得而想見之此所謂其人亡而其政存者類矣且夫政存猶得而考之矧乃託之金石而禮之所藏正在於是則考之固不謬矣右髙八寸八分深七寸口徑六寸八分腹徑四寸五分容三升重三斤十有二兩銘五字凡人君錫有功必為冊書以命之此孫為父乙作而亦曰冊者蓋為孫者有勤王之功焉然後得作彝器而銘之祖此所以言冊命也既謂之孫其視乙也當尊為祖而此曰父者蓋祖考雖殊謂之父則一所謂大父者是也夫商以乙為號者六曰執乙曰天乙曰祖乙曰小乙曰武乙曰太乙而父乙者未知其為何乙觀其刻作兩冊切於形似非尚質無以及此若夫周人務為簡約而忽於取象為之形雖有内史策命之臣以掌之而商之純古固已變矣右髙八寸三分深七寸口徑六寸七分腹徑四寸容三升六合重三斤九兩銘二字父丁作是尊特載銘而不侈其文商世質有餘故宜如此純足皆素當中為從理即兩端分寫䕫龍形若相追逐以為先後色幾渥赭而緑花萍綴其古意最為觀美與商父乙尊無異也右髙八寸九分深七寸六分口徑六寸九分腹徑四寸一分容三升九合重四斤八兩銘四字文飾甚簡而腹間有雲雷之狀上一字作立戈形王安石云戈从一不得已而用欲一而止今尊酒器也而畫立戈之狀不特如鼎之節飲食又欲一而止之不至於流湎也故凡酒器制字之義必示其戒曰人癸則謂商之主癸也主癸子天一是為成湯乃知是尊為湯宗廟孝享之器明矣於癸曰人癸蓋與􅉝尊言人􅉝之意同右髙六寸三分深五寸一分口徑五寸四分腹徑三寸五分容二升二合重一斤九兩銘三字曰作從謂從器也曰單謂姓也周之單族最為大姓則知其原有出於此蓋昔人作器有以名姓書諸銘文之上者如曰單作從彞有以名姓書其下者如曰甚作父戊寶尊沈子與夫此器曰作從單皆以姓書其下也商之時尚質故其語略耳右髙八寸三分深六寸九分口徑六寸四分腹徑三寸五分容三升重二斤銘五字曰孫作祖丁旁一字畫旗狀商畫類取諸物以為形此作旗亦取其書功太常之義銘孫者蓋孫可以為王父尸而是器又知其為祭享之用祖丁者商祖􅉝之子觀其器質渾厚文鏤純簡知所以為商物故不待考其銘載而後辨也右通蓋髙七寸二分深四寸六分口徑長四寸二分闊三寸七分腹徑長四寸六分濶四寸容二升一合共重二斤十有五兩蓋器銘共八字曰兄丁大其一字作雞形銘兄丁者當是其弟為兄作此尊也按商有沃丁仲丁武丁庚丁太丁之别然以兄弟傳國者獨有太庚外壬而太庚之兄曰沃丁外壬之兄曰仲丁蓋不知其太庚與外壬作也銘雞者按周官司尊彞六彞有雞六尊無雞此尊也而以雞銘之者恐商之世其制未分耳周之禮樂庶事備則於是尊彞析而為二焉以理求之則尊與彞是或一道也右髙六寸四分深五寸六分口徑六寸一分腹徑四寸容二升有半重二斤三兩銘七字曰作父已寶尊彞其上復作子字狀持刀形蓋商器固有執㦸荷戈與此持刀之狀者豈其耆定武功而後世享於宗廟者必銘諸器如樂之武舞也父已者雍已也雍已之子是為太戊為其父作是器耳然而商器復有曰祖已者又因其孫而言之蓋莫不有謂也商尚簡嚴故其詞如此右髙三寸八分深三寸一分口徑長三寸四分闊二寸七分腹徑長三寸八分闊二寸容八合重十有二兩銘七字上一字未詳曰諫作父已尊彞諫當是其父己之子名言諫得以作是器以薦於考廟也然是器在尊為特小比觶則加闊而不類且歸之尊者以其形制則然又其名曰尊彞也豈往古彞器亦固有小大輕重之别以稱其人之所享歟右髙九寸八分深八寸一分口徑五寸六分腹徑七寸四分容一斗四升六合重一十斤無銘是器尊也製造純古其上為龍首四稜為鳯形周以雲雷盖龍以取其升降自如鳯以取其因時隱顯雷取其奮豫雲取其需澤飲食燕樂而節文之禮有在其中其狀近類方壺盖周官尊有六而饋獻用兩壺尊故下尊亦有謂壺者是尊所以比他器而方其取象於壺制焉右髙一尺二寸五分深九寸一分口徑七分腹徑二寸七分容三升三合重五斤八兩銘四字作月星狀而上下為禾稼之形攷周官司尊彞祼用斚彞禮圖以斚讀為稼而以禾為飾此尊也疑祭饗之禮昔人所嚴而六尊用於祭饗者自有定名也若夫祭饗之外或用於講禮示情文之際則亦無所不致其義月有遡明之道星有拱北之理禾有養人之實凡取以為飾者當以是為義焉蓋銘之斯所以戒之也按薛尚功亦作月季尊右通蓋髙六寸七分深四寸一分口徑長四寸五分闊三寸八分腹徑長五寸四分闊四寸二分容一升七合共重二斤有半蓋器銘共七十二字内一字未詳按召公奭在成王時作保封于燕其國僻小不通諸夏至簡公已二十九世乃齒諸侯又十一世而燕始亡此器乃周王襃大召公之族于其廟之器也又旅陳其王所錫之馬駪駪衆多也錫馬蕃庶駪于南宫南宫亦廟也此所謂襃大之也乙者父之名王襃大於廟為其父作此寶器乃周家召公子孫之酒彞也古人恭慎凡酒器執之恐墜觚亦酒器也為稜以礙手狀如今之屋脊故後人以屋脊謂之觚稜者是也此彞有五指痕執之而不墜失以示其謹於禮今此指痕以蠟為模以指按蠟所成也其曰王大字當為召又疑作見字蓋象形之意古文馬作而文􅀈字旁作此小異變體爾其間王字下畫差重蓋尊王有土之意諸鼎㪟中王字多如此或大於别字右髙一尺五寸五分深一尺三寸三分口徑四寸六分腹徑一尺容二斗二升有半重二十一斤兩耳連環銘五十八字曰克敢對揚天佑用作朕穆考後仲尊髙克用丐眉壽髙克者不見於他傳惟周末衛文公時有髙克將兵後䘚奔於陳疑克者廼斯人歟若爾則是器蓋衛物也其曰作朕穆考則又言宗廟之制也蓋天子有三昭三穆與太祖之廟而七諸侯有二昭二穆與太祖之廟而五至於言考則不特止其父而已故謂其大父曰王考謂其曾祖曰皇考謂其髙祖曰顯考此其言穆考之法也周室至於春秋諸侯分裂之時其世雖衰而至於典刑文物者尚在於是立言有如此者右髙六寸七分深六寸五分口徑六寸三分腹徑三寸八分容二升六合重三斤六兩銘三十二字曰汝上侯者上侯猶上公以言其官曰師艅以言其人師艅既有王功於是王乃錫艅金而俾作彞以薦家廟故又曰錫師艅金艅則對揚乃徳用作乃文考寶彞其言文考與詩言文人同字書徳从行而此器从辵蓋徳出於道从辵亦篆籀之本意由此於金石遺文每得以攷正其字畫之謬重修宣和博古圖卷六
