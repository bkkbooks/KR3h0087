body:
  text: 重修宣和博古圖卷二十三鐘二四十器周徧地雷紋鐘夔首鐘特鐘雙夔鐘一雙夔鐘二雙夔鐘三雙夔鐘四雙螭鐘素乳蟠夔鐘素乳鐘龍鐘立夔鐘一立夔鐘二立夔鐘三篆帶鐘一篆帶鐘二篆帶鐘三挾耳鐘一挾耳鐘二星帶鐘一星帶鐘二輔乳鐘一輔乳鐘二碎乳鐘一碎乳鐘二碎乳鐘三碎乳鐘四大編鐘一大編鐘二大編鐘三大編鐘四大編鐘五大編鐘六大編鐘七大編鐘八素帶鐘素篆鐘雙鳳鐘通甬鐘一面蛟螭鐘右髙一尺八寸四分甬長九寸二分徑二寸五分有旋兩舞相距一尺横七寸三分兩銑相距一尺一寸八分横九寸枚三十六各長二寸一分重七十九斤無銘是器遍體飾以夔首按周官鳧氏論鐘之制惟篆帶之外略無它飾而此飾以夔首者蓋後世變易而為之也夔著之鼎彞為食飲之節然則狀之於鐘亦所以節樂耳右髙二尺三寸甬長一尺二寸六分徑三寸兩舞相距一尺三寸横一尺一寸一分兩銑相距一尺五寸三分横一尺一寸六分枚三十六各長二寸五分重一百二十八斤有半無銘此特鐘也按禮圖以十六枚同在一簨簴謂之編鐘至於特鐘則獨垂而已蓋比它鐘而黄鍾律倍半枚極脩大衡甬窒實自于而上至於篆帶間皆作雲氣非文盛之世曷能底此第一器髙一尺二分甬長四寸六分徑一寸三分有旋兩舞相距五寸八分横三寸四分兩銑相距七寸二分横三寸九分枚三十六各長一寸二分重十有四斤三兩無銘第二器髙一尺二分甬蝕剝不完兩舞相距七寸二分横五寸四分兩銑相距八寸五分横六寸一分枚三十六各長一寸五分重二十四斤無銘第三器髙一尺五寸二分甬長七寸五分徑二寸二分有旋兩舞相距九寸六分横六寸七分兩銑相距一尺六分横七寸六分枚三十六各長二寸三分重五十斤八兩無銘第四器髙一尺七分甬長四寸七分徑一寸三分有旋兩舞相距六寸二分横五寸兩銑相距七寸一分横五寸四分枚三十六各長一寸二分重一十八斤有半無銘右四器髙下重輕雖不同而至于作雙夔之飾則一也蓋雙夔取其以類相從之義大抵鐘之為樂類取象於獸以明堂下萬物之治則雙夔之飾殆得此理爾右髙一尺六寸二分甬長七寸八分徑二寸七分有旋兩舞相距九寸横七寸三分兩銑相距一尺一寸横八寸四分枚三十六各長二寸一分重六十四斤無銘而體中為雙螭之狀夫雲雷螭龍之物昔人每以為鐘鼎之飾蓋不獨是器有也然是器又特為雙螭以取其類從正如詩所謂鳳凰于飛翽翽其羽而從之者衆夫鳥獸之屬從之者衆非得其性何以致此樂以象治故取象如此右髙七寸甬長四寸徑一寸一分兩舞相距四寸四分横三寸二分兩銑相距五寸二分横四寸枚三十六各長六分重五斤四兩無銘是鐘乳素自鼓至舞間隠起細紋作蟠夔狀器雖小而擊之則其聲洪大蓋亦出於精工之所冶者右髙一尺一寸二分甬長四寸九分徑二寸兩舞相距八寸横六寸五分兩銑相距一尺一分横七寸八分枚三十六各長一寸重二十七斤十有二兩無銘是鐘通體與甬皆周以繁乳鉦間特闊而不狹篆帶亦頗近古而鼓間復作雷紋但無隊攠之形耳然三十六枚與他鐘雖相似略無致飾故以素乳名之右髙一尺七分甬長四寸八分徑二寸五分兩舞相距七寸五分横五寸兩銑相距九寸九分横六寸五分枚三十六各長九分重二十一斤八兩無銘是器其枚鋭而不圜旋以花紋為飾每面作八龍循緣相向狀其騰躍之勢枚間間以雷紋觀其製作與它鐘稍異特晩周物也前一器髙八寸三分甬長三寸八分徑一寸二分有旋兩舞相距五寸横三寸七分兩銑相距六寸横四寸二分枚三十六各長一寸一分重九斤無銘次一器髙九寸六分甬長四寸三分徑一寸二分有旋兩舞相距五寸六分横四寸二分兩銑相距六寸五分横四寸六分枚三十六各長一寸重十有六斤六兩無銘後一器髙八寸甬長三寸七分徑一寸有旋兩舞相距五寸横三寸四分兩銑相距五寸五分横三寸八分枚三十六各長九分重九斤無銘右三器皆作立夔之飾而舞上復為雷紋無小異者特前一器一面有之此其不同考諸物理天之有雷世之作樂莫不因時而起而鼓鐘又音之巨者故以雷況之夔者山澤之獸所難制者今起而為率舞之狀則先王之咸若鳥獸蓋可知矣故其飾如此前一器髙一尺一寸六分甬長六寸七分徑一寸六分有旋兩舞相距七寸六分横六寸三分兩銑相距九寸八分横六寸二分枚三十六各長五分重十有六斤無銘次一器髙一尺一寸六分甬長五寸六分徑一寸五分有旋兩舞相距七寸横五寸兩銑相距八寸横六寸枚三十六各長一寸四分重二十斤無銘後一器髙一尺九分甬長三寸七分徑一寸四分兩舞相距六寸横四寸四分兩銑相距七寸一分横五寸三分枚三十有六各長一寸二分重一十斤一十二兩無銘右前一器甬特長大約以圜環者三旋蟲則為鳳形枚景之間别分畦畛而中縈篆帶又狀蟠䕫於鼓隧之上次一器枚鼓與頂間皆作篆帶糾結之勢其小異者特為一面之飾後一器成體切相類而甬虚旋素此為差别耳詳視三鐘濡金凝質精純一致非有周鳧工莫能到前一器髙一尺一寸二分甬長五寸二分徑一寸四分有旋兩舞相距六寸六分横四寸九分兩銑相距七寸四分横五寸七分枚三十六各長一寸三分重十有七斤無銘後一器髙九寸二分甬長四寸二分徑一寸四分有旋兩舞相距五寸一分横四寸二分兩銑相距六寸横四寸二分枚三十六各長一寸重一十二斤十有四兩無銘右二器大槩頗同其稍異處惟巨細不等然所飾特各一面甬皆實而不通其鼓鉦與舞間一律作篆帶比它鐘亦略相似但舞之兩旁有垂帶若鼎彞中兩耳狀故以挾耳名之疑因時製作變易而設飾之巧以至此焉前一器髙八寸四分甬長四寸四分徑一寸四分兩舞相距六寸三分横四寸八分兩銑相距七寸八分横五寸二分枚三十六各長四分重十有七斤無銘後一器髙八寸五分甬長三寸九分徑一寸四分有旋兩舞相距六寸二分横四寸兩銑相距六寸七分横四寸三分枚三十六各長八分重十有一斤二兩無銘右二器皆飾以星紋按舜之象服十有二章而日月星辰最為繪衣之首又彞器中多著以星象者如月星尊是也但前一器甬作雲紋鼓間著以雷篆後一器所飾尤加繁縟然觀其煎金凝冶之工殆出一時耳髙九寸五分甬長四寸四分有旋兩舞相距六寸九分横五寸一分兩銑相距八寸二分横五寸九分枚三十六各長七分重十有七斤四兩無銘髙一尺五分甬長五寸六分有旋兩舞相距七寸横五寸三分兩銑相距八寸横六寸一分枚三十六各長一寸三分重一十六斤十有一兩無銘右二器鐘大者為特而鎛次之其㝡小則為編鐘今此鐘視其量數蓋特鐘也而環體被枚乳凡三十有六焉宋李照號為知樂其論枚乳則以謂用節餘聲蓋聲無以節則鍠鍠成韻而隆殺雜亂其理然也是鐘之名曰輔乳亦即其實而已耳髙七寸四分甬長四寸徑一寸一分有旋兩舞相距五寸横二寸五分兩銑相距五寸六分横四寸枚三十六各長九分重七斤有半無銘髙七寸五分甬長五寸徑一寸五分兩舞相距六寸二分横四寸四分兩銑相距七寸二分横五寸二分枚三十六各長一寸二分重一十六斤有半無銘髙九寸五分甬長四寸六分徑一寸六分有旋兩舞相距七寸横五寸六分兩銑相距八寸四分横六寸枚三十六各長七分重二十五斤有半無銘髙九寸二分甬長五寸一分徑一寸五分有旋兩舞相距七寸横五寸五分兩銑相距七寸八分横六寸枚三十六各長六分重二十斤無銘右四器於三十六枚之外皆飾以碎乳此其大同者前二器鉦上作篆帶而鼓間有雲雷之狀後二器枚間鼓上皆作夔形此其異者然文鏤典雅俱周器也第一器髙一尺六寸甬長八寸徑一寸二分兩舞相距七寸九分横五寸三分兩銑相距一尺八寸横八寸枚三十六各長一寸六分重四十六斤二兩無銘第二器髙一尺四寸二分甬長七寸徑一寸一分兩舞相距八寸四分横六寸三分兩銑相距九寸九分横六寸八分枚三十六各長一寸五分重三十九斤三兩無銘第三器髙一尺二寸七分甬長六寸三分徑一寸兩舞相距八寸横五寸四分兩銑相距九寸横五寸八分枚三十六各長一寸四分重二十五斤七兩無銘第四器髙一尺一寸八分甬長五寸七分徑一寸六分兩舞相距七寸三分横五寸兩銑相距八寸二分横五寸枚三十六各長一寸五分重二十三斤有半無銘第五器髙一尺五寸六分甬長七寸二分徑一寸二分兩舞相距七寸五分横五寸七分兩銑相距八寸六分横五寸四分枚三十六重三十八斤五兩無銘第六器髙一尺四寸七分甬長七寸二分徑一寸二分兩舞相距八寸二分横五寸七分兩銑相距八寸五分横六寸一分枚三十六重二十九斤一十二兩無銘第七器髙一尺六寸甬長六寸五分徑一寸五分兩舞相距八寸七分横六寸一分兩銑相距八寸四分横六寸枚三十六重三十一斤有半無銘第八器髙一尺四寸甬長四寸六分徑一寸二分兩舞相距七寸二分横五寸五分兩銑相距七寸六分横四寸九分枚三十六重三十斤四兩無銘右八器凡編鐘小於鎛而今此數器為特大豈其律數加倍而成之者歟篆帶之上皆有盤夔而攠隧之間亦復如此衡甬旋蟲同於質素若出一體惟三與八二器自兩舞循而下翼然如觚之有稜為特異耳且古之樂鐘形範非圜屬幹於簴而扣之則牢結不動後世圜其製而虚係以直垂值其考擊則搖曳而生餘韻失之逺矣觀此數鐘誠為得法右髙一尺三寸五分甬長六寸四分徑一寸七分有旋兩舞相距七寸三分横五寸三分兩銑相距八寸五分横六寸四分枚三十六各長一寸四分重二十九斤十有二兩無銘是器甬旋皆近周制獨旋作綯紐狀無復蟲幹之飾蓋變古法也又唯一面有枚分畦畛而鼓間復作兩山旁為雲紋於篆帶間則特純素不飾自是一類鐘耳然考之亦周物也右髙五寸一分甬長三寸一分徑七分兩舞相距三寸七分横三寸一分兩銑相距四寸二分横二寸九分枚三十六各長五分重五斤一兩無銘此鐘當篆間純素而無它飾又實其甬枚㬌脩銳而製鍊稍精亦古制也右髙九寸六分甬長四寸九分有旋兩舞相距六寸八分横五寸六分兩銑相距七寸六分横五寸九分枚三十六各長九分重十有七斤五兩無銘是鐘甬幹純素鼓間以雙鳳為飾頂上復作八鳳有徊翔之狀鳳瑞世之物此所以取象者蓋本諸此右髙一尺三分甬長五寸五分徑二寸三分兩舞相距八寸三分横五寸兩銑相距一尺二分横六寸九分枚三十六各長七分重三十二斤無銘是器篆帶作雲紋鼓間亦如之甬上特無旋蟲而出六乳瑩若星然形質渾厚而于之中作線紋狀非它鐘之比以其甬與體貫通故以通甬名之右髙一尺六分甬長五寸三分徑一寸六分有旋兩舞相距六寸八分横四寸二分兩銑相距七寸四分横五寸枚三十六各長一寸四分重十有六斤無銘考之它器兩面各有所飾而此乃一面有之昔鳧氏為鐘惟篆於枚鉦間致飾焉是器乃為蛟螭之狀則知昔人隨時而損益之也然而或損之不見其不足或益之不見其有餘此所以能名世耳詳其制度形器蓋有周一類物也重修宣和博古圖卷二十三
