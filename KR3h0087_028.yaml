body:
  text: 重修宣和博古圖卷二十八鑑總説鑑一三十六器乾象門漢一十七器十二辰鑑一銘五十五字十二辰鑑二銘三十七字十二辰鑑三銘一十六字四神鑑一銘一十二字四神鑑二銘四字四神鑑三銘二字三神鑑銘五十六字神人鑑銘一十八字神像鑑銘一十二字神人三獸鑑銘一十二字百神鑑四神鑑一四神鑑二四神鑑三四靈鑑四靈三瑞鑑三神八衛鑑唐二器十二辰鑑銘一十一字五嶽真形鑑水浮門漢六花水浮鑑一器詩辭門漢一十二器册禮鑑銘四十八字尚方鑑一銘五十三字尚方鑑二銘三十五字長生鑑銘四十字仙人不老鑑銘三十七字青蓋鑑銘三十四字服羌鑑銘二十八字豳頌周商鑑銘二十字始青鑑銘一十六字清白鑑銘三十四字清眀鑑一銘四十一字清明鑑二銘一十四字唐四器萬春鑑一銘四十字萬春鑑二銘四十字瑩質鑑一銘四十字瑩質鑑二銘三十二字鑑總説昔黃帝氏液金以作神物於是為鑑凡十有五採陰陽之精以取乾坤五五之數故能與日月合其眀與鬼神通其意以防魑魅以整疾苦厯萬斯年而獨常存今也去古既逺不可盡考世有得其一者載其制度則以四靈位四方以八卦定八極十有二辰以環其外二十四氣以布其中而妙萬物運至神者蓋託於形數之表故其為器雖囿於有形而不隨形盡雖拘於有數而不與數終且能變化不測與造物者為友也其在有周冶鑑之數亦十有三蓋體諸閏月以其十二則投十二野其一則為鎮於中州世言其象亦云列五嶽布七神為十五獸間十四方而方有四篆字且不載其所以施設之方獨周官之書以謂鑑取眀水於月以其足以感格者然也唐開元間李太者進水心鑑背負蟠龍蜿蜒舌生太仍表其鑑曰龍護所作真龍託於是焉久之歲大旱眀皇引葉法善即鑑祈禱而雲生鑑龍之口於是甘霈七日而足不其神哉西漢高祖受命之初入咸陽得方鑑洞燭腸胃此帝王之世神物護持其不誣之典足以信後世者今所藏特漢唐之器然其規模大抵皆法逺古是以圜者規天方者法地六出所以象諸物八方所以定其位左右上下則有四靈錯綜經緯則有五星具一日之數則載之以十有二辰具一歲之數則載之以十有二月周其天者有二十八宿拱其位者有三神八衛或象玉女之起舞或肖五嶽之真形凡九天之上九地之下所主治者莫不咸在則其取象未嘗不有法也是以製作之妙或中虛而謂之夾鑑或形蛻而名以浮水以龍蟠其上者取諸龍護之象也以鳳飾其後者取諸舞鸞之説也以至或為異花竒卉海獸天馬羽毛鱗甲之屬或為嘉禾合壁比目連理瑞世之珍或乳如鐘或華如菱至於銘其背則又有作國史語而為四字有效柏梁體而為七言或單言之不足或長言之有餘或以紀其姓名或以識其歲月如言尚方玉堂者用於奉御也如言宜官宜侯王者用之百執也如言宜子孫者用以藏家也若千秋萬歲之語則所以美頌者如此作十六符篆則所以辟邪者如此然則雖曰漢唐之物其稽古必自此始耳於是列序其次而録之於後焉凡五金之序黃金為上白金次之銅又次之而鐵錫為下故斯鑑以銅先焉鐵次之若夫造化之夲莫先於天地故首之以乾象乾象者百神之主故以百神附之夫參造化主百神則可以造形器故次之以異質之物如蛻形浮水者是也為器如是夫然後可以歌頌其美故次之以詩辭可以被聲詩則必享多宜故次之以善頌頌必有致養之道故次之以枚乳而乳者養人之道也有所養則鳥獸草木莫不咸若而來儀為瑞者有之故又次之以龍鳳花鳥海獸也然而大巧者若拙繪事者後素則純素者其本也于是又以純素終焉此其序也乾象門漢十二辰鑑一徑七寸重二斤四兩銘五十五字漢十二辰鑑二徑六寸重一斤三兩銘三十七字漢十二辰鑑三徑六寸一分重一斤三兩銘一十六字漢四神鑑一徑三寸八分重七兩三分銘十二字漢四神鑑二徑三寸一分重三兩一錢銘四字漢四神鑑三徑三寸五分重五兩有半銘二字漢三神鑑徑五寸重一十兩有半銘五十六字漢神人鑑徑四寸二分重七兩有半銘十八字漢神像鑑徑三寸七分重六兩一分銘十二字漢神人三獸鑑徑三寸六分重五兩三分銘十二字漢百神鑑徑五寸五分重一斤三兩無銘漢四神鑑一徑四寸五分重一十兩一分無銘漢四神鑑二徑三寸六分重九兩有半無銘漢四神鑑三徑三寸五分重四兩一分無銘漢四靈鑑徑五寸一分重一斤一兩無銘漢四靈三瑞鑑徑六寸重一斤九兩無銘漢三神八衛鑑徑六寸八分重二斤四兩無銘唐十二辰鑑徑四寸九分重十有五兩一分銘一十二字唐五嶽真形鑑徑八寸重三斤無銘右一十九鑑天之道運而不積于是通乎晝夜者有五星為之緯有二十八宿為之經以十日為之干以十有二辰為之支也所謂至神不測則斡旋于是乎以育萬物融江河結山嶽主百神而為造化之本冶鑑之象莫先于此故以乾象先焉而百神附之右一器徑三寸九分重三兩無銘物之理輕清者在上重濁者在下於是蛻形羽化則為萬物之靈况出乎罏錘之間而不纍於形器之重脫去滓穢輕清如蛻此所謂異質者故於乾坤造化之後以水浮者次之詩辭門漢册禮鑑徑四寸五分重一十二兩有半銘四十八字漢尚方鑑一徑六寸重一斤四兩銘五十三字漢尚方鑑二徑四寸三分重一十二兩有半銘三十五字漢長生鑑徑五寸三分重十有五兩一分銘四十字漢仙人不老鑑徑五寸八分重十兩三分銘三十七字漢青蓋鑑徑四寸八分重十兩三分銘三十四字漢服羌鑑徑六寸重一斤三兩銘二十八字漢豳頌周商鑑徑四寸六分重九兩三錢銘二十字漢始青鑑徑四寸一分重八兩銘一十六字漢清白鑑徑五寸八分重一斤四兩銘三十四字漢清眀鑑一徑四寸八分重一十二兩銘四十一字漢清眀鑑二徑三寸七分重七兩三分銘一十四字唐萬春鑑一徑八寸八分重八斤銘四十字唐萬春鑑二徑八寸八分重七斤四兩銘四十字唐瑩質鑑一徑七寸八分重三斤七兩銘四十字唐瑩質鑑二徑四寸五分重一斤有半銘三十二字右一十六器言之不足故嗟歎之嗟歎之不足故永歌之然則言而至於永歌則美之至也蓋物之美則詩亦美焉故水浮之後又次以詩辭也重修宣和博古圖卷二十八
