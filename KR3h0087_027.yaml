body:
  text: 重修宣和博古圗卷二十七弩機鐓奩錢硯滴托轅承轅輿輅飾表座刀茟杖頭等總說漢弩機七器書言府弩機銘二十七字銀錯弩機一銀錯弩機二銀錯弩機三銀錯弩機四銀錯弩機五銀錯弩機六鐓三器金銀錯鐓鳩杖首鐓鉞鐓奩五器鳳奩獸奩四神奩蟠虬攜奩連環攜奩錢九器厭勝錢一厭勝錢二厭勝錢三厭勝錢四厭勝錢五藕心錢一藕心錢二藕心錢三藕心錢四硯滴二器龜蛇硯滴一龜蛇硯滴二周托轅二器辟邪車輅托轅一辟邪車輅托轅二承轅一器輅飾虎首承轅漢輿輅飾周雙螭表座漢五器表座旂鈴刀筆蟠龍杖頭蟠螭杖頭唐蹲龍漢鳩車六朝鳩車漢龍提梁弩機鐓奩錢硯滴托轅承轅輿輅飾表座刀筆杖頭等總說百工之事皆聖人作故凝土鑠金載諸傳記莫不由夫智者創巧者述後世因之以為天下用而取法以成焉不然則兊之戈和之弓垂之竹矢藏乎王府時出而陳之復何意耶夫弩生於弓謂夫出自於越與呉讎敵而為之則爾然在商書固已有曰若虞機張往省括于度則釋之語足見弩機之設其來久矣今此則有機焉詩所謂厹矛鋈鐓則已嘗見於成周之世矣今此則有鐓焉古之貴老為其近於親也老者其食多噎而鳩為不噎之鳥則賜之鳩杖今此鳩杖乃其遺制也奩者閨房脂澤之器自漢盖有之矣錢則或鑄厭勝藕心之異硯滴則或具龜蛇之形各出一時之巧製也且一器而百工備焉者車為多則托轅承轅與夫致飾之物猶可觀也立表以測影則表之遺座猶足用也旂則有鈴在上刀則與筆相副杖若靈夀而以龍首冠之以至蹲龍充乘輿之物鳩車戯兒童之樂銅梁備提挈之要事雖末務器則精工凡此諸物煎鍊鎔範塗金錯銀雕鎪詰曲若蛟螭蟲魚之紋與夫竒葩異卉雲盤而水折者細若馬氂縈如蛛絲極天下之妙而為其觀美焉是雖異夫鐘鼎禮樂之器亦或可以取法故宜繼其後者也右高三寸八分長四寸三分闊二寸一分重一斤一十兩銘二十七字曰延光三年閏月書言府作按延光三年盖東漢孝安皇帝即位之十九年也是年歳在甲子閏在十月不言十月而言閏月舉閏則知十月也書言府者所謂言則左史書之之義天祿石渠之屬也盖漢之武庫隨府有之如盾省是也又若工若令若丞若史皆銘之於機則知除戎器戒不虞昔人尤在所慎者是機之形方且密而紋鏤細若絲縷綰結則可賴此以固邦國者非特於前書孝宣之際以示後人也第一器長五寸闊一寸二分重一斤一兩無銘第二器長四寸八分闊一寸一分重一斤一兩無銘第三器長四寸六分闊一寸一分重一斤一十兩無銘第四器長五寸一分闊一寸二分重一斤七兩無銘第五器長五寸一分闊一寸二分重一斤十有三兩無銘第六器長五寸七分闊一寸四分重二斤二兩無銘右六器皆飾以銀錯細紋獨後二器復著飛鳥之形如詩之常武言如飛如翰而大眀稱尚父亦曰維時鷹揚以取擊搏飛揚之勢則弩機之飾此古人豈無意哉至於機間立度以銀約之為分寸正所謂機有度以准望者也右長二寸九分圜徑二寸一分重三兩無銘是器為圜筩起節如竹一端中空可以置幹一端為頂作方稜是必古人用以飾物柄者鈿以黄金間以白銀花雲之狀燦然可愛雖非古亦近世所不能到右通長七寸五分徑長一寸闊六分共重九兩無銘是杖之端獨狀鳩形蹲伏其上復回其喙以理左翼錯以金銀其管處又飾之以山雲鷹隼􅎷兎之狀僅若毫髮宛然畫筆耳其鐓則専以銀飾花草雖精巧而韻古也右通長三寸九分上闊一寸二分下闊八分重七兩有半無銘其鐓平而不銳鐓之上通闕稜又其上授鉞柄處作小竅横簮以固之猶冠之有簮導也按司馬法三代之斧在夏執𤣥鉞在商執白戚在周杖黄鉞盖夏商周所尚之色不同而所以為斧則一也漢之鉞鐓有古遺法歟通盖高六寸深三寸五分口徑長三寸二分闊二寸六分容九合有半共重一斤十有闕兩無銘通盖高六寸深二寸七分口徑長三寸四分闊二寸四分容七合共重二斤一兩無銘右按許慎以奩為鑑觀古人貯物之器多以奩稱不獨為鑑而設昔丁度以奩為香器意其有得於是考其形方若檻盖如屋栱一飾以鳳一飾以獸所飾雖異制度大槩相若右通盖高六寸八分深四寸三分口徑七寸五分容六升八合共重六斤九兩無銘是器奩也盖起三羊回頸相向頂間以四神為飾且四神乃在天之象昔人於軍陳已嘗取此然奩乃妝鑑之具飾以此者古人制器尚象至於冕旒服飾未有不取象於天者也此器純間為方斜雷紋三足作熊狀然熊者男子之祥著為妝鑑之飾深有旨也右通盖高八寸四分深七寸三分口徑三寸二分容三升共重二斤無銘奩盖閨房脂澤之具按是器狀若截筩盖頂飾以蟠虬上下純素三足為熊形而耳作獸狀連環龍首以為提梁取其便於攜挈右通盖高六寸八分深五寸二分口徑三寸九分容三升共重二斤七兩無銘是器狀如截筩以揜其上提梁作連環可以舒卷其體則純素無紋而承以三足盖漢物之製中深以有納而連環又便於提攜必昔人用以為従逰之具故以攜奩名之自中古以降所謂尚象之器已掃地矣其足以適用周急者或多出于一時私意耳第一錢通長六寸八分闊二寸一分重六兩有半無銘第二錢通長五寸六分闊一寸七分重三兩有半無銘第三錢通長五寸七分闊一寸七分重三兩有半無銘第四錢通長五寸七分闊一寸八分重三兩有半無銘第五錢通長五寸七分闊一寸八分重三兩有半無銘右按封演錢譜漢武造銅錫白金為三品一曰其文龍二曰其文馬三曰其文龜而小橢之謂其圜而長也今此錢一體之間龍馬並著形長而方意有類扵此然下體蟠屈隠起粟文似非漢武之制者又李孝美圗譜有永安五男錢體勢雖圜輪郭皆著要文與此少類然孝美號之曰厭勝錢則是錢殆亦用之為厭勝者邪且錢謂之泉布則取其流行無窮之義而此著龍馬者盖行天莫如龍行地莫如馬亦泉布流行之謂歟第一錢長一寸二分闊九分重二兩一錢無銘第二錢長一寸一分濶七分重一兩三錢無銘第三錢長一寸二分闊七分重一兩二錢無銘第四錢長一寸二分闊三分重二錢有半無銘右四者大小雖殊皆若破藕狀按李孝美錢譜稱世有藕心錢不著出於何時及觀其畫像與此雖異然其說以謂上下通缺若藕挺中破狀與此乃正相合但未知其何世物耳前一器高一寸五分深一寸二分口徑三分有半容半合重六兩無銘後一器髙一寸四分深一寸一分口徑三分容半合重四兩三分無銘右二器硯席中竒玩也作龜負蛇而有行勢背為圜空可以納水其一製小獸如指大以立背上皆口銜物若盃狀遇水出則吐盃中製作精妙宛有生意非古人不能為也按龜蛇北方獸主水用以飾此盖取其類耳前一器高二寸三分通長六寸重一斤無銘後一器高二寸三分通長六寸重一斤無銘右二器輿輅飾也盖古人輿服未嘗無制結旌綏旌有見於車之别如輊如軒有見於車之容衡則有鸞和則在軾而輿輅之設取象為備焉是物作辟邪蹲伏之狀復飾以螭虺其圜空可以容横梁盖所謂車之托轅也右長七寸三分闊一寸九分容􅀈徑一寸二分重一斤一兩無銘古之車制行一車者有輈駕一輈者有梁服馬則出於梁下而兩驂又所以佐服馬耳故輈一謂之承轅為銜梁之具是器作虎首侈口則口銜其梁也然其上間錯金銀復飾以鸞鵲回舞之態固知昔人於輿服每有法度此特一轅之飾耳盖工之所聚於車為多則求其他可知也右高二寸五分闊五分長二寸七分重三兩無銘按車輅之制陶唐氏制彤車有虞氏制鸞車夏因鸞車而為鉤車商因鉤車而為大輅至周而後五輅備焉唯制度略存而文采之詳皆莫考據也秦漢間輿服號稱甚盛而史亦闕其制唯後漢光武平公孫述始𫉬葆車輿輦遂因舊制金根車以擬周之玉輅輪皆朱斑重牙貳轂兩轄文虎伏軾龍首衘軛與其弛虎飾皆備見於史是物弛曲作鵞頸形匾而方下為鐓可以植於欄楯上有螭紋而為斧刃狀然其兩旁皆以行虎飾之考其形制疑為伏軾所用之物而此得之為不完不能盡䆒其設施之所惜哉右高一尺三寸七分下徑一尺九寸二分重五十五斤無銘周官置𣙗晝以參諸日中測景𣙗即表也是器形若大盤上蟠雙螭而仰其首於兩螭間又出一筩中通上下是為表座中通所以植𣙗無欹側以取其端焉右高四寸六分深四寸二分闊七寸一分口徑一寸一分重三斤九兩無銘是器表座也作三圜筩相合為一體措之地則一筩端立可以立表周官所謂𣙗者是其所以為測日之具也右長五寸徑一寸三分重六兩有半無銘按左氏曰錫鸞和鈴昭其聲也盖錫在馬額鸞在鑣和在衡鈴在旂皆動而有和聲今此雖作鈴狀然未知其所設果如何今觀鈴之為飾其數有七而九旂名物其斿數盖亦有等是以交龍之旂其斿有九鳥隼之旟其斿有七熊虎之旗其斿有六龜蛇之旐其斿有四然則鈴之多寡若擬旂之斿數當是旟之數耶右長七寸四分闊六分重六兩有半無銘形制全若刀匕而柄間可以置纓結正攜佩之器也盖古者用簡牒則人皆以刀筆自隨而削書詩云豈不懐歸畏此簡書盖在三代時固已有削書矣西漢書贊蕭何曺參謂皆起秦刀筆吏則自秦抵漢亦復用之然在秦時蒙恬已嘗造筆而於漢尚言刀筆者疑其時未能全革猶有存者耳右長五寸闊一寸四分厚五分重六兩無銘杖頭為一龍蟠屈而下衘其柄蜿蜒若飛動勢且以金鋈之非近世物也昔漢費長房従壷公之逰及其歸以杖投葛陂澤中化龍而去則以龍蟠杖頭豈其取法耶為漢物固宜有之且九章之服龍居其最以龍者升降自如不見制蓄神而變者也於是惟尊者得専有之耳右長六寸闊一寸五分厚六分重五兩無銘按是器與蟠龍杖頭略相似但以土花所蝕見其彷彿比之龍而無角故以螭名之螭於鼎彞間無所不用宜杖頭亦或有之夏官伊祁氏供王之齒杖謂賜老者漢文以優老臣故賜吴王濞几杖其後靈夀杖亦為大臣孔光之賜是則蟠螭當錫臣下之物其於龍頭杖非一等物也盖若古之衣服車馬制度之等級同焉右高三寸闊一寸七分重四兩無銘且昔人於欄楯帷幄車輅間毎有所飾故或作水芝或為鬭鴨種種不同考之亦無意義惟龍之飾則非臣下可得用凡衣服器用著以龍者皆表其人君所用之物是器作龍狀而蹲之疑宫廟乘輿以為之飾考其器則唐物也前一器高二寸二分長三寸二分闊一寸七分輪徑各二寸二分重一十兩無銘後一器高一寸八分長三寸二分闊一寸二分輪徑各一寸三分重三兩無銘右二器狀鳲鳩形置兩輪間輪行則鳩從之前一器漢物也其禽背負一子有鈕置之前以貫䋲盖縶維之所也後一器六朝物也其禽前後負二子亦有鈕以貫䋲焉尾際又有小輪以助之盖制度略相似但増損不同耳按鳲鳩之詩以况毋道均一故象其子以附之因以為兒童戯若杜氏幽求子所謂兒年五歳有鳩車之樂七歳有竹馬之歡者是也右高二寸三分長六寸三分闊八分重八兩七錢無銘通作龍形蜿蜒之狀角鬛𤓰足燦然備足真提梁也盖鱗蟲三百六十龍為之長故舜之時觀古人之象而繪龍於衣周為九章而登龍於山厯代尊之以為差等扵是後世人臣服飾皆不得而有之此提梁漢物也而狀以龍形宜非臣下所有者重修宣和博古圗卷二十七
